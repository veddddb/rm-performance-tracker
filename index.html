<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Team Piyush | FY 2026–27</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233d5af1'/><stop offset='1' stop-color='%237c3aed'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-size='15' font-weight='700' fill='white'>TP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#3d5af1;--blue-l:rgba(61,90,241,.12);--blue-g:rgba(61,90,241,.06);
  --green:#15803d;--green-l:rgba(21,128,61,.11);
  --amber:#b45309;--amber-l:rgba(180,83,9,.11);
  --red:#b91c1c;--red-l:rgba(185,28,28,.09);
  --purple:#6d28d9;--purple-l:rgba(109,40,217,.11);
  --cyan:#0e7490;--cyan-l:rgba(14,116,144,.11);
  --text:#141629;--sub:#454878;--muted:#8890b8;
  --gb:rgba(255,255,255,.78);--gb2:rgba(200,210,240,.42);
  --gs:0 4px 24px rgba(80,90,180,.09),0 1px 0 rgba(255,255,255,.9) inset;
  --gsm:0 12px 44px rgba(80,90,180,.15),0 1px 0 rgba(255,255,255,.95) inset;
  --gsl:0 20px 64px rgba(80,90,180,.20),0 1px 0 rgba(255,255,255,.98) inset;
  --tb:52px;--r:16px;--rs:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Outfit',sans-serif;
  background:linear-gradient(145deg,#d8e8ff 0%,#e8deff 30%,#fce4f6 60%,#ffebd8 100%);
  background-attachment:fixed;
  color:var(--text);-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── BLOBS ── */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;will-change:transform;filter:blur(1px)}
.b1{width:620px;height:620px;top:-180px;left:-160px;background:radial-gradient(circle,rgba(160,192,255,.72) 0%,rgba(192,165,255,.35) 52%,transparent 72%);animation:bm1 22s ease-in-out infinite}
.b2{width:540px;height:540px;bottom:-140px;right:-110px;background:radial-gradient(circle,rgba(255,180,235,.62) 0%,rgba(255,175,200,.30) 52%,transparent 72%);animation:bm2 28s ease-in-out infinite}
.b3{width:380px;height:380px;top:38%;left:40%;background:radial-gradient(circle,rgba(160,220,255,.45) 0%,transparent 65%);animation:bm3 19s ease-in-out infinite}
.b4{width:260px;height:260px;top:12%;right:16%;background:radial-gradient(circle,rgba(255,218,162,.42) 0%,transparent 65%);animation:bm4 25s ease-in-out infinite}
@keyframes bm1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(52px,36px) scale(1.06)}67%{transform:translate(-28px,50px) scale(.95)}}
@keyframes bm2{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-48px,-40px) scale(1.07)}70%{transform:translate(34px,-50px) scale(.93)}}
@keyframes bm3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(38px,-28px) scale(1.11)}}
@keyframes bm4{0%,100%{transform:translate(0,0) scale(1)}42%{transform:translate(-30px,22px) scale(1.09)}}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#080820 0%,#150830 45%,#082050 100%);
  transition:opacity .9s ease,visibility .9s ease;
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.sp-orb{
  width:110px;height:110px;border-radius:28px;
  background:linear-gradient(135deg,#3d5af1 0%,#7c3aed 60%,#c026d3 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;font-weight:900;color:#fff;letter-spacing:-.03em;
  box-shadow:0 0 60px rgba(61,90,241,.8),0 0 120px rgba(124,58,237,.5),0 0 200px rgba(192,38,211,.25);
  animation:orbIn .8s cubic-bezier(.34,1.56,.64,1) both, orbPulse 2.2s .8s ease-in-out infinite;
  margin-bottom:28px;position:relative;overflow:hidden;
}
.sp-orb::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.28) 0%,transparent 55%);border-radius:inherit}
@keyframes orbIn{from{opacity:0;transform:scale(.3) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes orbPulse{0%,100%{box-shadow:0 0 60px rgba(61,90,241,.8),0 0 120px rgba(124,58,237,.5)}50%{box-shadow:0 0 90px rgba(61,90,241,1),0 0 180px rgba(124,58,237,.7),0 0 260px rgba(192,38,211,.35)}}
.sp-title{
  font-size:28px;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(90deg,#a5bfff 0%,#d4a5ff 50%,#ffb3e8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:6px;
  animation:spIn .9s .3s cubic-bezier(.4,0,.2,1) both;
}
.sp-fy{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:.08em;text-align:center;animation:spIn .9s .45s cubic-bezier(.4,0,.2,1) both}
.sp-prop{font-size:11px;color:rgba(255,255,255,.22);letter-spacing:.04em;text-align:center;margin-top:4px;animation:spIn .9s .6s cubic-bezier(.4,0,.2,1) both}
.sp-bar{width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:36px;overflow:hidden;animation:spIn .9s .7s cubic-bezier(.4,0,.2,1) both}
.sp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#3d5af1,#7c3aed,#c026d3);animation:spFill 2.4s .8s cubic-bezier(.4,0,.2,1) forwards;width:0}
@keyframes spIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes spFill{to{width:100%}}

/* ── TOPBAR ── */
.topbar{
  height:var(--tb);flex-shrink:0;position:relative;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,255,255,.60);
  backdrop-filter:blur(28px) saturate(2);-webkit-backdrop-filter:blur(28px) saturate(2);
  border-bottom:1.5px solid var(--gb);
  box-shadow:0 2px 20px rgba(80,90,180,.08);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#3d5af1,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
  box-shadow:0 3px 12px rgba(61,90,241,.42);
  position:relative;overflow:hidden;
}
.brand-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.26) 0%,transparent 60%)}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.01em}
.brand-sep{width:1px;height:13px;background:var(--gb2)}
.brand-sub{font-size:11px;color:var(--muted)}
.tbr{display:flex;align-items:center;gap:7px}
.chip{font-size:9px;font-weight:700;padding:3px 11px;border-radius:99px;letter-spacing:.06em;text-transform:uppercase}
.chip-blue{background:var(--blue-l);color:var(--blue);border:1px solid rgba(61,90,241,.22)}
.chip-amber{background:var(--amber-l);color:var(--amber);border:1px solid rgba(180,83,9,.22)}
.chip-glass{background:rgba(255,255,255,.65);color:var(--sub);border:1.5px solid var(--gb);backdrop-filter:blur(8px)}
.live-dot{width:5px;height:5px;border-radius:50%;background:#16a34a;animation:ldPulse 2.4s ease-in-out infinite;display:inline-block;margin-right:3px;vertical-align:middle}
@keyframes ldPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}

/* ── DESKTOP GRID AREA ── */
.desk{
  flex:1;overflow:hidden;display:flex;align-items:stretch;
  position:relative;z-index:1;
  padding:16px 20px;
  gap:14px;
}

/* The 3×3 grid, fills all available height exactly */
.rm-grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:12px;
  /* Rows fill remaining viewport */
  height:100%;
}

/* ── RM CARD ── */
.rm-card{
  border-radius:var(--r);
  background:rgba(255,255,255,.48);
  backdrop-filter:blur(20px) saturate(1.7);-webkit-backdrop-filter:blur(20px) saturate(1.7);
  border:1.5px solid var(--gb);
  box-shadow:var(--gs);
  cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;
  transition:all .28s cubic-bezier(.4,0,.2,1);
  position:relative;
  animation:cIn .4s cubic-bezier(.4,0,.2,1) both;
}
/* Color accent bar */
.rm-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--c,#3d5af1),rgba(255,255,255,.25),transparent);
  z-index:1;
}
/* Glass sheen */
.rm-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,.20) 0%,transparent 55%);
  pointer-events:none;transition:opacity .28s;
}
/* Hover glow */
.rm-card:hover{
  box-shadow:
    var(--gsm),
    0 0 0 1.5px var(--gc,rgba(61,90,241,.35)),
    0 0 36px var(--gc,rgba(61,90,241,.16));
  transform:translateY(-3px) scale(1.012);
  background:rgba(255,255,255,.70);
}
.rm-card:hover::after{opacity:0}
@keyframes cIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}

/* Card header */
.rc-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px 10px;
  flex-shrink:0;
}
.rc-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text);line-height:1.2}
.rc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.rm-card:hover .rc-dot{transform:scale(1.5)}

/* Target grid on collapsed card */
.rc-targets{
  display:grid;grid-template-columns:1fr 1fr;
  gap:7px 10px;padding:0 16px;flex:1;
  align-content:start;
}
.rct-l{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:1px}
.rct-v{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:-.02em;line-height:1.1}
.rct-u{font-size:8px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.rct-a{font-size:9.5px;font-family:'DM Mono',monospace;margin-top:1px;font-weight:500}

/* AUM bar */
.rc-bar-wrap{padding:8px 16px 13px;flex-shrink:0}
.rc-bar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rc-bar-l{font-size:8.5px;color:var(--muted);font-weight:500}
.rc-bar-p{font-size:9.5px;font-family:'DM Mono',monospace;font-weight:700}
.rc-track{height:4px;background:rgba(180,190,230,.28);border-radius:2px;overflow:hidden}
.rc-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* Open hint */
.rc-hint{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px;border-top:1px solid var(--gb2);flex-shrink:0;
  font-size:9.5px;color:var(--muted);font-weight:500;
  background:rgba(255,255,255,.28);
}
.rc-arrow{
  width:18px;height:18px;border-radius:50%;
  background:rgba(255,255,255,.7);border:1px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;font-size:10px;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),background .18s,color .18s;
  color:var(--muted);
}
.rm-card:hover .rc-arrow{
  transform:rotate(45deg) scale(1.15);
  background:var(--blue-l);color:var(--blue);
  border-color:rgba(61,90,241,.3);
}

/* ── BOSS / PIYUSH CARD (center) ── */
.boss-card{
  border-radius:var(--r);
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(36px) saturate(2.4);-webkit-backdrop-filter:blur(36px) saturate(2.4);
  border:2px solid rgba(255,255,255,.94);
  box-shadow:0 16px 56px rgba(61,90,241,.16),0 1px 0 rgba(255,255,255,.98) inset,0 0 0 1px rgba(61,90,241,.09);
  cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;
  transition:all .32s cubic-bezier(.4,0,.2,1);
  position:relative;
  animation:cIn .4s .05s cubic-bezier(.4,0,.2,1) both;
}
.boss-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#3d5af1,#7c3aed,#c026d3,#7c3aed,#3d5af1);
  background-size:300%;
  animation:gradShift 3.5s linear infinite;z-index:1;
}
@keyframes gradShift{to{background-position:300% 0}}
.boss-card:hover{
  box-shadow:0 24px 72px rgba(61,90,241,.24),0 1px 0 rgba(255,255,255,.99) inset,0 0 0 2px rgba(61,90,241,.38),0 0 60px rgba(61,90,241,.12);
  transform:translateY(-4px) scale(1.015);
}
.boss-badge{
  position:absolute;top:12px;right:12px;z-index:2;
  font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 9px;border-radius:99px;
  background:linear-gradient(90deg,rgba(61,90,241,.14),rgba(124,58,237,.14));
  color:var(--blue);border:1px solid rgba(61,90,241,.24);
}
.bc-head{padding:14px 16px 8px;flex-shrink:0}
.bc-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--sub);margin-bottom:2px}

/* Boss big KPIs */
.bc-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;margin-bottom:10px;flex-shrink:0}
.bk{border-radius:var(--rs);padding:8px 10px;background:rgba(255,255,255,.55);border:1px solid var(--gb2)}
.bk-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
.bk-v{font-size:17px;font-weight:900;font-family:'DM Mono',monospace;letter-spacing:-.03em}
.bk-u{font-size:9px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}

/* Boss targets */
.bc-targets{
  margin:0 16px 8px;
  background:linear-gradient(135deg,rgba(61,90,241,.08) 0%,rgba(124,58,237,.06) 100%);
  border:1.5px solid rgba(61,90,241,.16);border-radius:var(--rs);padding:10px 12px;flex-shrink:0;
}
.bc-t-label{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.bc-t-label::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--blue);animation:ldPulse 2s infinite}
.bc-t-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.bti-l{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:1px}
.bti-v{font-size:12px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:-.02em}
.bti-u{font-size:7.5px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.bti-rr{font-size:8px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}

/* Boss progress bars */
.bc-progs{display:flex;flex-direction:column;gap:6px;padding:0 16px;flex:1;justify-content:center}
.bp-row{display:flex;align-items:center;gap:8px}
.bp-l{font-size:9px;font-weight:600;color:var(--sub);width:52px;flex-shrink:0}
.bp-t{flex:1;height:5px;background:rgba(180,190,230,.25);border-radius:3px;overflow:hidden}
.bp-f{height:100%;border-radius:3px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.bp-p{font-size:9.5px;font-family:'DM Mono',monospace;font-weight:700;width:30px;text-align:right;flex-shrink:0}

.bc-hint{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px;border-top:1px solid var(--gb2);flex-shrink:0;
  font-size:9.5px;color:var(--muted);font-weight:500;
  background:rgba(255,255,255,.32);
}

/* ── DETAIL OVERLAY ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(8,6,28,.58);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  overflow-y:auto;padding:20px;
}
.overlay.open{display:block;animation:ovIn .24s ease both}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.modal{
  max-width:1060px;margin:0 auto;
  background:rgba(252,252,255,.96);
  backdrop-filter:blur(40px) saturate(2.5);-webkit-backdrop-filter:blur(40px) saturate(2.5);
  border:1.5px solid rgba(255,255,255,.98);
  border-radius:22px;
  box-shadow:0 28px 90px rgba(20,22,60,.22),0 1px 0 rgba(255,255,255,.98) inset;
  overflow:hidden;
  animation:modIn .34s cubic-bezier(.34,1.1,.64,1) both;
}
@keyframes modIn{from{opacity:0;transform:scale(.93) translateY(22px)}to{opacity:1;transform:none}}
.modal-bar{
  padding:16px 22px;border-bottom:1px solid rgba(200,210,240,.45);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:rgba(252,252,255,.94);z-index:10;
  backdrop-filter:blur(20px);
}
.modal-name{font-size:14px;font-weight:800;letter-spacing:.03em;text-transform:uppercase}
.modal-sub{font-size:10.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px}
.modal-actions{display:flex;align-items:center;gap:8px}
/* Share button */
.share-btn{
  display:flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:7px 14px;border-radius:99px;
  background:linear-gradient(135deg,rgba(61,90,241,.12),rgba(124,58,237,.12));
  color:var(--blue);border:1.5px solid rgba(61,90,241,.28);
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.share-btn:hover{background:linear-gradient(135deg,rgba(61,90,241,.20),rgba(124,58,237,.20));box-shadow:0 4px 16px rgba(61,90,241,.22);transform:translateY(-1px)}
.share-btn svg{transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.share-btn:hover svg{transform:translateY(-2px) rotate(-5deg)}
.close-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(200,210,240,.28);border:1px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted);
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
}
.close-btn:hover{background:var(--red-l);color:var(--red);border-color:rgba(185,28,28,.3);transform:rotate(90deg) scale(1.1)}
.modal-body{padding:20px 22px;display:grid;grid-template-columns:1fr 236px;gap:16px}
.modal-main{display:flex;flex-direction:column;gap:14px}
.modal-side{display:flex;flex-direction:column;gap:12px}

/* ── SECTION CARD ── */
.sec{
  border-radius:14px;overflow:hidden;
  background:rgba(255,255,255,.78);
  border:1.5px solid rgba(200,210,240,.5);
  box-shadow:0 3px 18px rgba(80,90,180,.07);
  transition:box-shadow .2s,transform .2s;
  animation:fadeUp .26s cubic-bezier(.4,0,.2,1) both;
}
.sec:hover{box-shadow:0 7px 28px rgba(80,90,180,.11);transform:translateY(-1px)}
.sec-head{padding:11px 16px;background:rgba(255,255,255,.58);border-bottom:1px solid rgba(200,210,240,.4);display:flex;justify-content:space-between;align-items:center}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
.sec-badge{font-size:9.5px;font-family:'DM Mono',monospace;color:var(--muted)}
.sec-body{padding:13px 16px}
.sec-flush{padding:0}

/* ── JOURNEY TABLE ── */
.jt-wrap{overflow-x:auto;padding:0 16px}
.jt-wrap::-webkit-scrollbar{height:3px}
.jt-wrap::-webkit-scrollbar-thumb{background:rgba(200,210,240,.5);border-radius:3px}
.jt{width:100%;border-collapse:collapse;min-width:520px}

<script>
/* ═══ STATE ═══ */
let data=[], activeLedger=[], openRMIdx=-1;
const COLORS=['#3d5af1','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];
const MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
const now=new Date(), curM=MO[now.getMonth()], curY=now.getFullYear();
const BOSS='Piyush Dungarpuria';

/* ═══ HELPERS ═══ */
const n=(v,d=2)=>Number(v||0).toFixed(d);
const pct=(v,t)=>(!t?0:Math.min(100,Math.round(v/t*100)));
function pc(p){return p>=90?'var(--green)':p>=60?'var(--amber)':'var(--red)'}
function pb(p){return p>=90?'var(--green-l)':p>=60?'var(--amber-l)':'var(--red-l)'}
function probCls(p){return p>=70?'p-hi':p>=40?'p-md':'p-lo'}
function short(nm){const p=nm.trim().split(' ');return p.length>1?p[0]+' '+p[p.length-1][0]+'.':nm}
function fJ(j,kw){return(j||[]).find(m=>m.label.toLowerCase().includes(kw.toLowerCase()))||{target:0,actual:0,monthlyRunRate:0,newRunRate:0}}
function unit(l){const s=l.toLowerCase();if(s.includes('sip'))return 'L';if(s.includes('m50')||s.includes('mission'))return '';return 'Cr'}
function mRem(){const m=now.getMonth();return m>=3?3+12-m:3-m}
function projYE(a,rr){return a+rr*mRem()}
function actComp(acts){const v=acts.filter(a=>a.param!==''&&Number(a.target||0)>0);return v.length?Math.round(v.filter(a=>Number(a.gap||0)<=0).length/v.length*100):0}
function flags(rm){
  const f=[];
  const acts=(rm.activity||[]).filter(a=>a.param!==''&&Number(a.target||0)>0);
  const pend=acts.filter(a=>Number(a.gap||0)>0).length;
  if(pend>=3) f.push(`${pend} activity gaps pending`);
  const j=rm.journey||[];
  const nrr=fJ(j,'aum').newRunRate||0, orr=fJ(j,'aum').monthlyRunRate||0;
  if(orr>0&&nrr>orr*1.5) f.push(`AUM run rate at ${Math.round(nrr/orr*100)}% of original`);
  const ap=pct(fJ(j,'aum').actual||rm.aum,fJ(j,'aum').target||rm.aumTarget||0);
  if(ap<40) f.push(`AUM at only ${ap}% of annual target`);
  return f;
}

/* ═══ SPLASH ═══ */
setTimeout(()=>document.getElementById('splash').classList.add('gone'), 2900);

/* ═══ QUARTER ═══ */
function buildQtr(){
  const m=now.getMonth();
  let q,qEnd;
  if(m>=3&&m<=5){q='Q1';qEnd=new Date(curY,5,30)}
  else if(m>=6&&m<=8){q='Q2';qEnd=new Date(curY,8,30)}
  else if(m>=9&&m<=11){q='Q3';qEnd=new Date(curY,11,31)}
  else{q='Q4';qEnd=new Date(curY,2,31)}
  const dLeft=Math.max(0,Math.ceil((qEnd-now)/(1000*60*60*24)));
  document.getElementById('qtr-chip').textContent=q+' · '+dLeft+'d';
}

/* ═══ RM CARD HTML ═══ */
function rmCardHTML(rm,i){
  const col=COLORS[i%COLORS.length];
  const j=rm.journey||[];
  const aj=fJ(j,'aum'), p=pct(aj.actual||rm.aum, aj.target||rm.aumTarget||0);
  const rj=fJ(j,'rev'), nj=fJ(j,'net'), sj=fJ(j,'sip'), m5j=fJ(j,'m50');
  const targets=[
    {l:'AUM Target',  v:aj.target||rm.aumTarget||0,  u:'Cr', a:aj.actual||rm.aum},
    {l:'Revenue',     v:rj.target||rm.revTarget||0,   u:'Cr', a:rj.actual||rm.revenue},
    {l:'Net Mob',     v:nj.target||0,                 u:'Cr', a:nj.actual||rm.netMob},
    {l:'SIP',         v:sj.target||0,                 u:'L',  a:sj.actual||rm.sip},
  ];
  return `<div class="rm-card" style="--c:${col};--gc:${col}44" onclick="openDetail(${i})">
    <div class="rc-head">
      <div class="rc-name">${short(rm.name)}</div>
      <div class="rc-dot" style="background:${col};color:${col}"></div>
    </div>
    <div class="rc-targets">
      ${targets.map(t=>{
        const tp=pct(t.a,t.v);
        return `<div>
          <div class="rct-l">${t.l}</div>
          <div class="rct-v">${n(t.v)}${t.u?`<span class="rct-u">${t.u}</span>`:''}</div>
          <div class="rct-a" style="color:${pc(tp)}">${n(t.a)}${t.u} · ${tp}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="rc-bar-wrap">
      <div class="rc-bar-row">
        <span class="rc-bar-l">AUM vs Target</span>
        <span class="rc-bar-p" style="color:${pc(p)}">${p}%</span>
      </div>
      <div class="rc-track"><div class="rc-fill" style="width:${p}%;background:${pc(p)}"></div></div>
    </div>
    <div class="rc-hint"><span>View dashboard</span><div class="rc-arrow">+</div></div>
  </div>`;
}

/* ═══ BOSS CARD HTML ═══ */
function bossCardHTML(rm,i){
  const col=COLORS[i%COLORS.length];
  const j=rm.journey||[];
  const aj=fJ(j,'aum'), rj=fJ(j,'rev'), nj=fJ(j,'net'), sj=fJ(j,'sip'), m5j=fJ(j,'m50');
  const progs=[
    {l:'AUM',    p:pct(aj.actual||rm.aum,   aj.target||rm.aumTarget||0)},
    {l:'Revenue',p:pct(rj.actual||rm.revenue,rj.target||rm.revTarget||0)},
    {l:'Net Mob',p:pct(nj.actual||rm.netMob, nj.target||0)},
  ];
  const targets=[
    {l:'AUM',  v:aj.target||rm.aumTarget||0, rr:aj.monthlyRunRate||0, u:'Cr'},
    {l:'Rev',  v:rj.target||rm.revTarget||0,  rr:rj.monthlyRunRate||0, u:'Cr'},
    {l:'Net',  v:nj.target||0,                rr:nj.monthlyRunRate||0, u:'Cr'},
    {l:'SIP',  v:sj.target||0,                rr:sj.monthlyRunRate||0, u:'L'},
    {l:'M50',  v:m5j.target||fJ(j,'mission').target||0, rr:0, u:''},
  ];

/* ═══ BUILD 3×3 GRID ═══ */
function buildGrid(){
  const bIdx=data.findIndex(r=>r.name===BOSS);
  // 9 cells; center = index 4
  // Slot arrangement: 0 1 2 / 3 [4=boss] 5 / 6 7 8
  // Fill non-boss slots with other RMs
  const others=data.map((_,i)=>i).filter(i=>i!==bIdx);
  // 8 non-boss slots (0..3, 5..8), fill with available RMs
  const slots=new Array(9).fill(null);
  slots[4]=bIdx>=0?bIdx:null;
  others.forEach((rmIdx,si)=>{
    const target=[0,1,2,3,5,6,7,8][si];
    if(target!==undefined) slots[target]=rmIdx;
  });

  const cells=slots.map((rmIdx,slot)=>{
    if(rmIdx===null) return `<div style="border-radius:var(--r);background:rgba(255,255,255,.18);border:1.5px dashed rgba(200,210,240,.5)"></div>`;
    const rm=data[rmIdx];
    const isBoss=slot===4;
    return isBoss?bossCardHTML(rm,rmIdx):rmCardHTML(rm,rmIdx);
  }).join('');

  document.getElementById('rm-grid').innerHTML=cells;
}

/* ═══ SPARKLINE ═══ */
function sparkHTML(ledger){
  if(!ledger||!ledger.length) return '';
  const byM={};
  ledger.forEach(l=>{if(l.month&&l.month!=='Unspecified') byM[l.month]=(byM[l.month]||0)+Number(l.net||0)});
  const mos=Object.keys(byM);
  if(mos.length<2) return '';
  const recent=mos.slice(-6),vals=recent.map(m=>byM[m]);
  const maxV=Math.max(...vals.map(Math.abs),1);
  return `<div class="spark-sec">
    <div class="spark-lbl">Net Mobilization Trend (Cr)</div>
    <div class="spark-wrap">
      ${vals.map((v,i)=>{const h=Math.round(Math.abs(v)/maxV*26)||2;return`<div class="spark-bar" style="height:${h}px;background:${v>=0?'var(--green)':'var(--red)'};opacity:.78"><span class="spark-tip">${recent[i]}: ${n(v)}Cr</span></div>`;}).join('')}
    </div>
    <div class="spark-ml-row">${recent.map(m=>`<span class="spark-ml">${m.substring(0,3)}</span>`).join('')}</div>
  </div>`;
}

/* ═══ LEDGER RENDER ═══ */
function renderLedger(filter,btn){
  if(btn) btn.closest('.mf').querySelectorAll('.mp').forEach(b=>b.classList.toggle('on',b===btn));
  const rows=filter==='ALL'?activeLedger:activeLedger.filter(l=>l.month===filter);
  const totP=rows.reduce((s,l)=>s+Number(l.purchase||0),0);
  const totR=rows.reduce((s,l)=>s+Number(l.redemption||0),0);
  const totN=rows.reduce((s,l)=>s+Number(l.net||0),0);
  const html=rows.map(l=>{const net=Number(l.net||0);return`<tr><td class="l">${l.client}</td><td class="l2">${l.asset}</td><td class="l2">${l.month}</td><td class="gn">${n(l.purchase)}</td><td class="gr">${n(l.redemption)}</td><td class="${net>=0?'gpos':'gneg'}">${n(net)}</td></tr>`;}).join('')

}

/* ═══ SHARE MONTHLY PLAN AS JPEG ═══ */
function shareMonthlyPlan(e){
  e.stopPropagation();
  if(openRMIdx<0) return;
  const rm=data[openRMIdx];
  const col=COLORS[openRMIdx%COLORS.length];
  const plan=rm.plan||[];
  const netMob=Number(rm.netMob||0);

  const W=800, ROW=36, HEADER=160, FOOTER=60;
  const H=HEADER+(plan.length?plan.length*ROW+ROW:ROW)+FOOTER+20;

  const canvas=document.getElementById('share-canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');

  // Background gradient
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#dce8ff');bg.addColorStop(.4,'#ece4ff');
  bg.addColorStop(.7,'#fce8f6');bg.addColorStop(1,'#ffe8d6');

  roundRect(ctx,24,24,W-48,H-48,16);ctx.fill();

  const accentGrad=ctx.createLinearGradient(24,0,W-24,0);

  link.href=canvas.toDataURL('image/jpeg',0.94);
  link.click();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

/* ═══ MOBILE TABS ═══ */
function buildTabs(){
  document.getElementById('mob-tabs').innerHTML=data.map((rm,i)=>
    `<button class="mob-tab ${i===0?'active':''}" id="tab-${i}" onclick="openMobRM(${i})">
      <span class="mob-tab-dot" style="background:${COLORS[i%COLORS.length]}"></span>${short(rm.name)}
    </button>`).join('');
}

function openMobRM(idx){
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.mob-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('mob-content').innerHTML=buildMobDetail(data[idx],idx);
  document.getElementById('mob-scroll').scrollTo({top:0,behavior:'smooth'});
  renderLedger('ALL',null);
  const tab=document.getElementById('tab-'+idx);
  if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

/* ═══ LOAD ═══ */
async function load(silent=false){
  try{
    const res=await fetch('data/performance.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    data=Array.isArray(json)?json:(json.rms||[]);
    if(!data.length) throw new Error('Empty');
    buildQtr();
    buildGrid();
    buildTabs();
    if(!silent) openMobRM(0);
    const d=data[0]?.lastUpdated?new Date(data[0].lastUpdated):new Date();
    document.getElementById('updated-tag').innerHTML=`<span class="live-dot"></span>${isNaN(d)?'Live':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){console.error(e)}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay()});
load();
setInterval(()=>load(true),300000);
</script>
