<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Piyush | Private Banking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   TOKENS
═══════════════════════════════ */
:root {
  /* gradient mesh bg */
  --grad: linear-gradient(135deg, #e0e9ff 0%, #f0e7ff 35%, #e7f4ff 65%, #fff0e7 100%);
  /* glass */
  --glass:        rgba(255,255,255,0.55);
  --glass-hover:  rgba(255,255,255,0.72);
  --glass-active: rgba(255,255,255,0.85);
  --glass-border: rgba(255,255,255,0.75);
  --glass-shadow: 0 8px 32px rgba(80,80,160,0.10), 0 1.5px 0 rgba(255,255,255,0.7) inset;
  --glass-shadow-md: 0 12px 40px rgba(80,80,160,0.14), 0 1.5px 0 rgba(255,255,255,0.8) inset;
  --glass-shadow-lg: 0 20px 60px rgba(80,80,160,0.18), 0 1.5px 0 rgba(255,255,255,0.9) inset;
  /* surface for tables / non-glass */
  --surface:  rgba(255,255,255,0.9);
  --surface2: rgba(255,255,255,0.5);
  --border:   rgba(180,190,230,0.35);
  --border2:  rgba(160,170,220,0.5);
  /* text */
  --text:  #18193a;
  --sub:   #4a5080;
  --muted: #8890b8;
  /* accent */
  --blue:     #3d5af1;
  --blue-l:   rgba(61,90,241,0.12);
  --green:    #16a34a;
  --green-l:  rgba(22,163,74,0.12);
  --amber:    #d97706;
  --amber-l:  rgba(217,119,6,0.12);
  --red:      #dc2626;
  --red-l:    rgba(220,38,38,0.10);
  --purple:   #7c3aed;
  --purple-l: rgba(124,58,237,0.12);
  --cyan:     #0891b2;
  --cyan-l:   rgba(8,145,178,0.12);
  /* sizes */
  --sidebar-w: 240px;
  --topbar-h:  56px;
  --r:  14px;
  --rs: 9px;
}

/* ═══════════════════════════════
   RESET
═══════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  background: var(--grad);
  background-attachment: fixed;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  position:relative;
  overflow-x:hidden;
}
/* Decorative blobs */
body::before,body::after{
  content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(80px);opacity:.45;
}
body::before{
  width:520px;height:520px;
  background:radial-gradient(circle, #c7d5ff 0%, #e5ceff 100%);
  top:-120px;left:-100px;
}
body::after{
  width:420px;height:420px;
  background:radial-gradient(circle, #ffd6b0 0%, #ffc7e8 100%);
  bottom:-80px;right:-80px;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ═══════════════════════════════
   GLASS MIXIN
═══════════════════════════════ */
.glass{
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.6);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1.5px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
}
.glass-md{
  background:var(--glass-hover);
  backdrop-filter:blur(24px) saturate(1.8);
  -webkit-backdrop-filter:blur(24px) saturate(1.8);
  border:1.5px solid var(--glass-border);
  box-shadow:var(--glass-shadow-md);
}
.glass-strong{
  background:var(--glass-active);
  backdrop-filter:blur(30px) saturate(2);
  -webkit-backdrop-filter:blur(30px) saturate(2);
  border:1.5px solid rgba(255,255,255,0.9);
  box-shadow:var(--glass-shadow-lg);
}

/* ═══════════════════════════════
   TOPBAR
═══════════════════════════════ */
.topbar{
  position:sticky;top:0;z-index:200;
  height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  border-bottom:1.5px solid var(--glass-border);
  box-shadow:0 2px 20px rgba(80,80,160,0.08);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#3d5af1,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;letter-spacing:-.02em;
  box-shadow:0 4px 12px rgba(61,90,241,.35);
  flex-shrink:0;
}
.brand-name{font-size:15px;font-weight:700;color:var(--text)}
.brand-sep{width:1px;height:16px;background:var(--border2)}
.brand-sub{font-size:12px;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:8px}
.tag{
  font-size:10px;font-weight:600;padding:4px 12px;
  border-radius:99px;letter-spacing:.06em;text-transform:uppercase;
}
.tag-blue{background:var(--blue-l);color:var(--blue);border:1px solid rgba(61,90,241,.2)}
.tag-glass{
  background:rgba(255,255,255,.6);color:var(--sub);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(8px);
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:#16a34a;
  animation:pulse 2s infinite;display:inline-block;
  margin-right:4px;vertical-align:middle;
}

/* ═══════════════════════════════
   SHELL (desktop)
═══════════════════════════════ */
.shell{
  display:flex;
  height:calc(100vh - var(--topbar-h));
  position:relative;z-index:1;
}

/* ═══════════════════════════════
   SIDEBAR (desktop)
═══════════════════════════════ */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(20px) saturate(1.6);
  -webkit-backdrop-filter:blur(20px) saturate(1.6);
  border-right:1.5px solid var(--glass-border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-top{
  padding:16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-sec-label{
  font-size:9px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;
}
.mini-grid{display:flex;flex-direction:column;gap:5px}
.mini-row{display:flex;justify-content:space-between;align-items:center}
.mini-l{font-size:11px;color:var(--sub)}
.mini-v{font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text)}

.rm-list{flex:1;overflow-y:auto;padding:10px}
.rm-list::-webkit-scrollbar{width:3px}
.rm-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.rm-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 12px;border-radius:var(--rs);
  margin-bottom:4px;cursor:pointer;
  transition:all .18s;width:100%;text-align:left;
  background:transparent;border:1.5px solid transparent;
}
.rm-item:hover{
  background:rgba(255,255,255,.55);
  border-color:var(--glass-border);
  box-shadow:0 4px 16px rgba(80,80,160,.08);
}
.rm-item.active{
  background:rgba(255,255,255,.82);
  border-color:rgba(61,90,241,.25);
  box-shadow:0 6px 20px rgba(61,90,241,.12);
  backdrop-filter:blur(10px);
}
.rm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rm-info{flex:1;min-width:0}
.rm-n{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rm-a{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.rm-pct{font-size:10px;font-family:'DM Mono',monospace;font-weight:600;flex-shrink:0}

/* ═══════════════════════════════
   DETAIL PANEL (desktop)
═══════════════════════════════ */
.detail{flex:1;overflow-y:auto;padding:24px 28px;position:relative}
.detail::-webkit-scrollbar{width:5px}
.detail::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}

.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:12px;
}
.empty-icon{font-size:48px;opacity:.15}
.empty-text{font-size:14px;color:var(--muted)}

/* ═══════════════════════════════
   MOBILE LAYOUT (≤640px)
═══════════════════════════════ */
.mobile-shell{display:none;flex-direction:column;height:calc(100vh - var(--topbar-h));position:relative;z-index:1}

/* RM Tab strip */
.rm-tabs{
  display:flex;overflow-x:auto;gap:0;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1.5px solid var(--glass-border);
  padding:0 12px;flex-shrink:0;
  scrollbar-width:none;
}
.rm-tabs::-webkit-scrollbar{display:none}
.rm-tab{
  flex-shrink:0;padding:0 16px;
  height:48px;display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:500;color:var(--muted);
  border-bottom:2.5px solid transparent;
  transition:all .18s;white-space:nowrap;
}
.rm-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.rm-tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Mobile detail scroll area */
.mob-detail-scroll{flex:1;overflow-y:auto;padding:14px 12px;-webkit-overflow-scrolling:touch}
.mob-detail-scroll::-webkit-scrollbar{display:none}

/* Mobile scorecard banner */
.mob-scorecard{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin-bottom:14px;
}
.mob-sc-card{
  border-radius:var(--rs);padding:12px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1.5px solid var(--glass-border);
  box-shadow:0 4px 16px rgba(80,80,160,.07);
}
.mob-sc-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.mob-sc-v{font-size:14px;font-weight:700;font-family:'DM Mono',monospace}
.mob-sc-u{font-size:9px;color:var(--muted);font-family:'DM Sans',sans-serif}

/* ═══════════════════════════════
   SHARED DETAIL CONTENT
═══════════════════════════════ */
.detail-content{display:none}
.detail-content.on{display:block}

/* Header glass card */
.dh{
  border-radius:var(--r);padding:22px 24px;
  margin-bottom:18px;
  background:var(--glass-active);
  backdrop-filter:blur(30px) saturate(2);
  -webkit-backdrop-filter:blur(30px) saturate(2);
  border:1.5px solid rgba(255,255,255,.9);
  box-shadow:var(--glass-shadow-lg);
}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.dh-name{font-size:20px;font-weight:700;letter-spacing:-.02em}
.dh-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px;line-height:1.6}
.dh-tag{font-size:9px;font-weight:600;padding:4px 12px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;background:rgba(255,255,255,.7);border:1px solid var(--glass-border)}
.dh-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--border);padding-top:14px}
.dh-kpi{}
.dh-kpi:not(:first-child){padding-left:16px;border-left:1px solid var(--border);margin-left:16px}
.dh-kpi-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.dh-kpi-v{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.dh-kpi-u{font-size:10px;color:var(--muted);font-family:'DM Sans',sans-serif;margin-left:2px}

/* Two-col grid */
.dgrid{display:grid;grid-template-columns:1fr 250px;gap:16px}
.dcol{display:flex;flex-direction:column;gap:16px}

/* ═══════════════════════════════
   SECTION GLASS CARDS
═══════════════════════════════ */
.sec{
  border-radius:var(--r);overflow:hidden;
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.6);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1.5px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
  transition:box-shadow .2s;
}
.sec-head{
  padding:14px 20px;
  background:rgba(255,255,255,.45);
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  backdrop-filter:blur(4px);
}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
.sec-badge{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.sec-body{padding:16px 20px}
.sec-body-flush{padding:0 20px}

/* ═══════════════════════════════
   JOURNEY TABLE
═══════════════════════════════ */
.jt{width:100%;border-collapse:collapse}
.jt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 12px 0;border-bottom:1.5px solid var(--border);text-align:left;white-space:nowrap}
.jt th.r{text-align:right}
.jt td{padding:13px 10px 13px 0;border-bottom:1px solid var(--border);vertical-align:middle}
.jt tr:last-child td{border-bottom:none}
.j-label{font-size:13px;font-weight:500}
.j-target{font-size:12px;font-family:'DM Mono',monospace;color:var(--sub)}
.j-rr{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.j-actual{font-size:15px;font-weight:700;font-family:'DM Mono',monospace}
.j-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:6px}
.j-bar-track{height:4px;border-radius:2px;overflow:hidden;margin-bottom:3px;background:rgba(180,190,230,.25)}
.j-bar-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.j-newrr{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.r{text-align:right}

/* ═══════════════════════════════
   PLAN TABLE
═══════════════════════════════ */
.pt{width:100%;border-collapse:collapse}
.pt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 12px 0;border-bottom:1.5px solid var(--border);text-align:right}
.pt th:first-child{text-align:left}
.pt td{padding:11px 10px 11px 0;border-bottom:1px solid var(--border);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.pt td:first-child{text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);font-weight:500;font-size:13px}
.pt td:nth-child(2){text-align:left;font-family:'DM Sans',sans-serif;font-size:12px}
.pt tr:last-child td{border-bottom:none}
.pt tfoot td{font-weight:700;color:var(--text);font-family:'DM Mono',monospace;border-top:1.5px solid var(--border);padding-top:12px;border-bottom:none}
.pt tfoot td:first-child{font-family:'DM Sans',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.prob-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:5px}
.p-hi{background:rgba(22,163,74,.15);color:var(--green)}
.p-md{background:rgba(217,119,6,.15);color:var(--amber)}
.p-lo{background:rgba(220,38,38,.12);color:var(--red)}

/* ═══════════════════════════════
   ACTIVITY TABLE
═══════════════════════════════ */
.at{width:100%;border-collapse:collapse}
.at th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 12px 0;border-bottom:1.5px solid var(--border);text-align:right}
.at th:first-child{text-align:left}
.at td{padding:10px 10px 10px 0;border-bottom:1px solid var(--border);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.at td:first-child{text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);font-weight:500;font-size:13px}
.at tr:last-child td{border-bottom:none}
.g-neg{color:var(--red);font-weight:700}
.g-pos{color:var(--green);font-weight:700}

/* ═══════════════════════════════
   COLLAPSIBLE
═══════════════════════════════ */
.ch{
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;padding:14px 20px;
  background:rgba(255,255,255,.35);
  border-top:1px solid var(--border);
  user-select:none;transition:background .15s;
}
.ch:hover{background:rgba(255,255,255,.55)}
.ch-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub)}
.ch-icon{font-size:18px;color:var(--muted);line-height:1;font-weight:300}
.cb{display:none}
.cb.open{display:block}

/* ═══════════════════════════════
   LEDGER
═══════════════════════════════ */
.mf{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.mp{font-size:10px;font-weight:500;padding:4px 12px;border-radius:99px;border:1.5px solid var(--border2);color:var(--sub);transition:.15s;background:rgba(255,255,255,.4)}
.mp:hover{background:rgba(255,255,255,.7);color:var(--text)}
.mp.on{border-color:rgba(61,90,241,.5);color:var(--blue);background:var(--blue-l);font-weight:600}
.lt{width:100%;border-collapse:collapse}
.lt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 0 12px;border-bottom:1.5px solid var(--border);text-align:right}
.lt th:first-child,.lt th:nth-child(2),.lt th:nth-child(3){text-align:left}
.lt td{padding:9px 0;border-bottom:1px solid var(--border);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:11px}
.lt td:first-child{text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);font-size:12px}
.lt td:nth-child(2),.lt td:nth-child(3){text-align:left;font-family:'DM Sans',sans-serif}
.lt tr:last-child td{border-bottom:none}
.lt .tot td{font-weight:700;color:var(--text);font-family:'DM Mono',monospace;border-top:1.5px solid var(--border);padding-top:12px;border-bottom:none}
.lt .tot td:first-child{font-family:'DM Sans',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em}

/* ═══════════════════════════════
   SNAPSHOT + LEVERAGE
═══════════════════════════════ */
.snap-item{display:flex;flex-direction:column;gap:4px;padding:12px 0;border-bottom:1px solid var(--border)}
.snap-item:last-child{border-bottom:none}
.snap-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.snap-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:2px}
.snap-v{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.snap-pct{font-size:10px;font-family:'DM Mono',monospace;font-weight:600}
.snap-bar-track{height:4px;border-radius:2px;overflow:hidden;margin-top:6px;background:rgba(180,190,230,.25)}
.snap-bar-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.lev-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.lev-row:last-child{border-bottom:none}
.lev-l{font-size:11px;color:var(--sub)}
.lev-v{font-size:12px;font-family:'DM Mono',monospace;font-weight:600}

/* ═══════════════════════════════
   SKELETON
═══════════════════════════════ */
@keyframes shimmer{0%,100%{opacity:.3}50%{opacity:.6}}
.skel{border-radius:var(--rs);background:rgba(180,190,230,.4);animation:shimmer 1.6s infinite}

/* ═══════════════════════════════
   ANIMATIONS
═══════════════════════════════ */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeSlide .22s ease both}

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.scroll-x::-webkit-scrollbar{height:3px}
.scroll-x::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══════════════════════════════
   RESPONSIVE
═══════════════════════════════ */
@media(max-width:900px){
  :root{--sidebar-w:190px}
  .dgrid{grid-template-columns:1fr}
  .detail{padding:18px}
}
@media(max-width:640px){
  /* Switch layouts */
  .shell{display:none}
  .mobile-shell{display:flex}
  .brand-sep,.brand-sub{display:none}
  /* Tighten detail on mobile */
  .dh{padding:16px}
  .dh-name{font-size:17px}
  .dh-kpi-v{font-size:15px}
  .dh-kpis{grid-template-columns:repeat(3,1fr)}
  .dh-kpi:not(:first-child){padding-left:12px;margin-left:12px}
  .dgrid{grid-template-columns:1fr}
  /* Table scroll */
  .jt{min-width:500px}
  .pt{min-width:480px}
  .at{min-width:340px}
}
@media(max-width:380px){
  .mob-scorecard{grid-template-columns:1fr 1fr}
  .rm-tab{padding:0 12px;font-size:11px}
}
</style>
</head>
<body>

<!-- ═══════════════════════════
     TOPBAR
═══════════════════════════ -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">TP</div>
    <span class="brand-name">Team Piyush</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">Private Banking</span>
  </div>
  <div class="topbar-right">
    <span class="tag tag-blue">FY 2026–27</span>
    <span class="tag tag-glass" id="updated-tag">
      <span class="live-dot"></span>Loading…
    </span>
  </div>
</div>

<!-- ═══════════════════════════
     DESKTOP SHELL
═══════════════════════════ -->
<div class="shell">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-sec-label">Team Totals</div>
      <div class="mini-grid" id="mini-grid">
        <div class="skel" style="height:13px;margin-bottom:4px"></div>
        <div class="skel" style="height:13px;margin-bottom:4px"></div>
        <div class="skel" style="height:13px;margin-bottom:4px"></div>
        <div class="skel" style="height:13px"></div>
      </div>
    </div>
    <div class="rm-list" id="rm-list">
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px"></div>
    </div>
  </div>

  <!-- Detail panel -->
  <div class="detail" id="desktop-detail">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◎</div>
      <div class="empty-text">Select an RM to view their dashboard</div>
    </div>
    <div id="desktop-content"></div>
  </div>

</div><!-- /shell -->

<!-- ═══════════════════════════
     MOBILE SHELL
═══════════════════════════ -->
<div class="mobile-shell">

  <!-- RM Tabs -->
  <div class="rm-tabs" id="rm-tabs">
    <div class="skel" style="width:80px;height:36px;margin:6px 4px;flex-shrink:0"></div>
    <div class="skel" style="width:80px;height:36px;margin:6px 4px;flex-shrink:0"></div>
    <div class="skel" style="width:80px;height:36px;margin:6px 4px;flex-shrink:0"></div>
  </div>

  <!-- Mobile detail scroll -->
  <div class="mob-detail-scroll" id="mob-detail-scroll">
    <div id="mob-content"></div>
  </div>

</div><!-- /mobile-shell -->

<script>
// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
let data = [], activeLedger = [], activeRM = -1;

const COLORS      = ['#3d5af1','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];
const COLOR_NAMES = ['blue','purple','green','amber','red','cyan'];
const MONTHS_LIST = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const curMonth    = MONTHS_LIST[new Date().getMonth()];
const curYear     = new Date().getFullYear();

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════
const n   = (v,d=2) => Number(v||0).toFixed(d);
const pct = (v,t)   => (!t ? 0 : Math.min(100, Math.round(v/t*100)));

function pc(p)      { return p>=90?'var(--green)':p>=60?'var(--amber)':'var(--red)'; }
function pb(p)      { return p>=90?'rgba(22,163,74,.15)':p>=60?'rgba(217,119,6,.15)':'rgba(220,38,38,.12)'; }
function probCls(p) { return p>=70?'p-hi':p>=40?'p-md':'p-lo'; }
function short(nm)  {
  const p = nm.trim().split(' ');
  return p.length > 1 ? p[0]+' '+p[p.length-1][0]+'.' : nm;
}
function findJ(j, kw) {
  return (j||[]).find(m => m.label.toLowerCase().includes(kw.toLowerCase()))
      || {target:0, actual:0, monthlyRunRate:0, newRunRate:0};
}

// ═══════════════════════════════════
//  MINI SCORECARD
// ═══════════════════════════════════
function buildMini() {
  const tot = f => data.reduce((s,r)=>s+Number(r[f]||0),0);
  const rows = [
    {l:'AUM',    v:n(tot('aum'))+'Cr'},
    {l:'Revenue',v:n(tot('revenue'))+'L'},
    {l:'Net Mob',v:n(tot('netMob'))+'Cr'},
    {l:'M50',    v:tot('m50')},
    {l:'SIP',    v:n(tot('sip'))+'L'},
  ];
  document.getElementById('mini-grid').innerHTML =
    rows.map(r=>`<div class="mini-row">
      <span class="mini-l">${r.l}</span>
      <span class="mini-v">${r.v}</span>
    </div>`).join('');
}

// ═══════════════════════════════════
//  DESKTOP RM LIST
// ═══════════════════════════════════
function buildRMList() {
  document.getElementById('rm-list').innerHTML = data.map((rm,i) => {
    const j  = rm.journey||[];
    const aj = findJ(j,'aum');
    const p  = pct(aj.actual||rm.aum, aj.target||rm.aumTarget||0);
    return `<button class="rm-item" id="rmi-${i}" onclick="openRM(${i})">
      <div class="rm-dot" style="background:${COLORS[i]}"></div>
      <div class="rm-info">
        <div class="rm-n">${short(rm.name)}</div>
        <div class="rm-a">${n(rm.aum)} Cr</div>
      </div>
      ${(aj.target||rm.aumTarget)?`<span class="rm-pct" style="color:${pc(p)}">${p}%</span>`:''}
    </button>`;
  }).join('');
}

// ═══════════════════════════════════
//  MOBILE TABS
// ═══════════════════════════════════
function buildTabs() {
  document.getElementById('rm-tabs').innerHTML = data.map((rm,i) =>
    `<button class="rm-tab ${i===0?'active':''}" id="tab-${i}" onclick="openMobRM(${i})">
      <span class="rm-tab-dot" style="background:${COLORS[i]}"></span>
      ${short(rm.name)}
    </button>`
  ).join('');
}

// ═══════════════════════════════════
//  BUILD DETAIL HTML (shared)
// ═══════════════════════════════════
function buildDetailHTML(rm, i) {
  const col = COLORS[i];
  const j   = rm.journey||[];

  const journeyRows = j.length ? j : [
    {label:'AUM',     target:rm.aumTarget||0, monthlyRunRate:0, actual:rm.aum,     newRunRate:0},
    {label:'Revenue', target:rm.revTarget||0, monthlyRunRate:0, actual:rm.revenue, newRunRate:0},
    {label:'Net Mob', target:0,               monthlyRunRate:0, actual:rm.netMob,  newRunRate:0},
    {label:'M50',     target:0,               monthlyRunRate:0, actual:rm.m50||0,  newRunRate:0},
    {label:'SIP',     target:0,               monthlyRunRate:0, actual:rm.sip,     newRunRate:0},
  ];

  const plan     = rm.plan||[];
  const activity = (rm.activity||[]).filter(a=>a.param!=='');
  const leverage = (rm.leverage||[]).filter(l=>l.label!=='');
  const ledger   = rm.ledger||[];
  const ledMonths= [...new Set(ledger.map(l=>l.month))].filter(m=>m&&m!=='Unspecified').sort();

  const snaps = [
    {l:'AUM',     v:n(rm.aum)+'Cr',     t:findJ(j,'aum').target||rm.aumTarget||0,     a:rm.aum,     c:'var(--blue)'},
    {l:'Revenue', v:n(rm.revenue)+'L',   t:findJ(j,'rev').target||rm.revTarget||0,     a:rm.revenue, c:'var(--purple)'},
    {l:'Net Mob', v:n(rm.netMob)+'Cr',   t:findJ(j,'net').target||0,                   a:rm.netMob,  c:'var(--green)'},
    {l:'M50',     v:String(rm.m50||0),   t:findJ(j,'m50').target||findJ(j,'mission').target||0, a:rm.m50||0, c:'var(--amber)'},
    {l:'SIP',     v:n(rm.sip)+'L',       t:findJ(j,'sip').target||0,                   a:rm.sip,     c:'var(--cyan)'},
  ];

  return `
  <!-- Header -->
  <div class="dh fade-in">
    <div class="dh-top">
      <div>
        <div class="dh-name" style="color:${col}">${rm.name}</div>
        <div class="dh-sub">Ledger Net ₹${n(rm.ledgerTotal||0)}Cr &nbsp;·&nbsp; Plan ₹${n(rm.planTotalAmt||0)}Cr &nbsp;·&nbsp; Wtd ₹${n(rm.planWeighted||0)}Cr</div>
      </div>
      <span class="dh-tag" style="color:${col}">${curMonth} ${curYear}</span>
    </div>
    <div class="dh-kpis">
      <div class="dh-kpi">
        <div class="dh-kpi-l">Net Mob</div>
        <div class="dh-kpi-v" style="color:var(--green)">${n(rm.netMob)}<span class="dh-kpi-u">Cr</span></div>
      </div>
      <div class="dh-kpi">
        <div class="dh-kpi-l">Mission 50</div>
        <div class="dh-kpi-v" style="color:var(--amber)">${rm.m50||0}</div>
      </div>
      <div class="dh-kpi">
        <div class="dh-kpi-l">SIP Book</div>
        <div class="dh-kpi-v" style="color:var(--cyan)">${n(rm.sip)}<span class="dh-kpi-u">L</span></div>
      </div>
    </div>
  </div>

  <div class="dgrid">
    <!-- Left -->
    <div class="dcol">

      <!-- Journey -->
      <div class="sec fade-in">
        <div class="sec-head">
          <span class="sec-title">FY 2026–27 · Annual Journey</span>
        </div>
        <div class="sec-body-flush">
          <div class="scroll-x">
            <table class="jt">
              <thead><tr>
                <th style="width:80px">Metric</th>
                <th>Annual Target<br><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px">Monthly RR</span></th>
                <th class="r">YTD Actual</th>
                <th class="r">vs Target</th>
                <th style="width:110px">Progress</th>
                <th class="r">New RR</th>
              </tr></thead>
              <tbody>
                ${journeyRows.map(m=>{
                  const p=pct(m.actual,m.target),c=pc(p),bg=pb(p);
                  return `<tr>
                    <td><span class="j-label">${m.label}</span></td>
                    <td>
                      <div class="j-target">${n(m.target)}</div>
                      <div class="j-rr">${n(m.monthlyRunRate)}/mo</div>
                    </td>
                    <td class="r"><span class="j-actual" style="color:${c}">${n(m.actual)}</span></td>
                    <td class="r"><span class="j-pill" style="background:${bg};color:${c}">${p}%</span></td>
                    <td>
                      <div class="j-bar-track"><div class="j-bar-fill" style="width:${p}%;background:${c}"></div></div>
                      <div class="j-newrr">New RR: ${n(m.newRunRate)}/mo</div>
                    </td>
                    <td class="r"><span class="j-target">${n(m.newRunRate)}</span></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Plan -->
      <div class="sec fade-in">
        <div class="sec-head">
          <span class="sec-title">${curMonth} ${curYear} — Monthly Plan</span>
          <span class="sec-badge">${plan.length?'Wtd ₹'+n(rm.planWeighted||0)+'Cr':''}</span>
        </div>
        <div class="sec-body-flush">
          <div class="scroll-x">
            <table class="pt">
              <thead><tr>
                <th>Client</th><th>Asset</th>
                <th>Exp Amt</th><th>Exp Redemp</th><th>Net Plan</th><th>Prob</th>
              </tr></thead>
              <tbody>
                ${plan.map(p=>`<tr>
                  <td>${p.client}</td>
                  <td>${p.asset}</td>
                  <td>${n(p.expectedAmt||p.amt||0)}</td>
                  <td>${n(p.expectedRedemption||0)}</td>
                  <td>${n(p.netPlan||0)}</td>
                  <td><span class="prob-pill ${probCls(p.prob)}">${p.prob}%</span></td>
                </tr>`).join('')}
              </tbody>
              ${plan.length?`<tfoot><tr>
                <td>Total</td><td></td>
                <td>${n(rm.planTotalAmt||0)}</td>
                <td>${n(rm.planTotalRedemption||0)}</td>
                <td>${n(rm.planNetTotal||0)}</td>
                <td></td>
              </tr></tfoot>`:''}
            </table>
          </div>
        </div>
      </div>

      <!-- Activity -->
      <div class="sec fade-in">
        <div class="ch" onclick="toggleSec(this)">
          <span class="ch-title">Monthly Activity Tracker</span>
          <span class="ch-icon">+</span>
        </div>
        <div class="cb">
          <div class="sec-body">
            <div class="scroll-x">
              <table class="at">
                <thead><tr><th>Parameter</th><th>Target</th><th>Actual MTD</th><th>Gap</th></tr></thead>
                <tbody>
                  ${activity.map(a=>{
                    const gap=Number(a.gap||0);
                    return `<tr>
                      <td>${a.param}</td>
                      <td>${a.target}</td>
                      <td style="color:var(--text);font-weight:600">${a.actual}</td>
                      <td class="${gap<0?'g-neg':gap>0?'g-pos':''}">${gap>0?'+':''}${gap}</td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Ledger -->
      <div class="sec fade-in">
        <div class="ch" onclick="toggleSec(this)">
          <span class="ch-title">Transaction Ledger</span>
          <span class="ch-icon">+</span>
        </div>
        <div class="cb">
          <div class="sec-body">
            <div class="mf">
              ${['ALL',...ledMonths].map(m=>
                `<button class="mp ${m==='ALL'?'on':''}" data-m="${m}" onclick="filterLedger('${m}',this)">${m==='ALL'?'All':m}</button>`
              ).join('')}
            </div>
            <div class="scroll-x">
              <table class="lt">
                <thead><tr><th>Client</th><th>Asset</th><th>Month</th><th>Purchase</th><th>Redemption</th><th>Net</th></tr></thead>
                <tbody class="led-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /left -->

    <!-- Right -->
    <div class="dcol">

      <!-- Snapshot -->
      <div class="sec fade-in">
        <div class="sec-head"><span class="sec-title">Snapshot</span></div>
        <div class="sec-body">
          ${snaps.map(s=>{
            const p=s.t?pct(s.a,s.t):null;
            return `<div class="snap-item">
              <div class="snap-l">${s.l}</div>
              <div class="snap-row">
                <span class="snap-v" style="color:${s.c}">${s.v}</span>
                ${p!==null?`<span class="snap-pct" style="color:${pc(p)}">${p}%</span>`:''}
              </div>
              ${p!==null?`<div class="snap-bar-track"><div class="snap-bar-fill" style="width:${p}%;background:${pc(p)}"></div></div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>

      ${leverage.length?`<div class="sec fade-in">
        <div class="sec-head"><span class="sec-title">Leverage</span></div>
        <div class="sec-body-flush sec-body">
          ${leverage.map(l=>{
            const isP=String(l.label).toLowerCase().includes('penetration')||String(l.label).includes('%');
            const raw=Number(l.value||0);
            const val=isP?(raw<=1?(raw*100).toFixed(2):raw.toFixed(2))+'%':l.value;
            return `<div class="lev-row">
              <span class="lev-l">${l.label}</span>
              <span class="lev-v" style="${isP?'color:var(--green)':''}">${val}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`:''}

    </div><!-- /right -->
  </div><!-- /dgrid -->`;
}

// ═══════════════════════════════════
//  LEDGER FILTER
// ═══════════════════════════════════
function filterLedger(filter, btn) {
  // toggle pills
  if (btn) {
    btn.closest('.mf').querySelectorAll('.mp').forEach(b=>b.classList.toggle('on',b===btn));
  }
  const rows = filter==='ALL' ? activeLedger : activeLedger.filter(l=>l.month===filter);
  const totP = rows.reduce((s,l)=>s+Number(l.purchase||0),0);
  const totR = rows.reduce((s,l)=>s+Number(l.redemption||0),0);
  const totN = rows.reduce((s,l)=>s+Number(l.net||0),0);
  const html = rows.map(l=>`<tr>
    <td>${l.client}</td><td>${l.asset}</td><td>${l.month}</td>
    <td>${n(l.purchase)}</td><td>${n(l.redemption)}</td>
    <td style="color:var(--green);font-weight:600">${n(l.net)}</td>
  </tr>`).join('') +
  `<tr class="tot">
    <td colspan="3">${filter==='ALL'?'Grand Total':filter+' Total'}</td>
    <td>${n(totP)}</td><td>${n(totR)}</td>
    <td style="color:var(--green)">${n(totN)}</td>
  </tr>`;
  document.querySelectorAll('.led-tbody').forEach(el=>el.innerHTML=html);
}

// ═══════════════════════════════════
//  COLLAPSIBLE
// ═══════════════════════════════════
function toggleSec(hdr) {
  const body = hdr.nextElementSibling;
  const icon = hdr.querySelector('.ch-icon');
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  icon.textContent = open ? '+' : '−';
}

// ═══════════════════════════════════
//  OPEN RM — DESKTOP
// ═══════════════════════════════════
function openRM(idx) {
  if (activeRM===idx) return;
  activeRM = idx;
  activeLedger = data[idx].ledger||[];
  document.querySelectorAll('.rm-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('empty-state').style.display='none';
  document.getElementById('desktop-content').innerHTML = buildDetailHTML(data[idx], idx);
  document.getElementById('desktop-detail').scrollTo({top:0,behavior:'smooth'});
  filterLedger('ALL', null);
}

// ═══════════════════════════════════
//  OPEN RM — MOBILE TAB
// ═══════════════════════════════════
function openMobRM(idx) {
  activeRM = idx;
  activeLedger = data[idx].ledger||[];
  document.querySelectorAll('.rm-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('mob-content').innerHTML = buildDetailHTML(data[idx], idx);
  document.getElementById('mob-detail-scroll').scrollTo({top:0,behavior:'smooth'});
  filterLedger('ALL', null);

  // Scroll active tab into view
  const tab = document.getElementById(`tab-${idx}`);
  if (tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

// ═══════════════════════════════════
//  LOAD
// ═══════════════════════════════════
async function load(silent=false) {
  try {
    const res  = await fetch('data/performance.json?t='+Date.now());
    if (!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    data = Array.isArray(json) ? json : (json.rms||[]);
    if (!data.length) throw new Error('Empty data');

    buildMini();
    buildRMList();
    buildTabs();

    if (!silent) {
      openRM(0);      // desktop auto-open first
      openMobRM(0);   // mobile auto-open first
    }

    const d   = data[0]?.lastUpdated ? new Date(data[0].lastUpdated) : new Date();
    const t   = isNaN(d) ? 'Live' : d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('updated-tag').innerHTML = `<span class="live-dot"></span>${t}`;

  } catch(e) {
    document.getElementById('rm-list').innerHTML =
      `<div style="padding:16px;font-size:12px;color:var(--red)">Failed to load</div>`;
    document.getElementById('rm-tabs').innerHTML =
      `<div style="padding:14px 16px;font-size:12px;color:var(--red)">Failed to load data</div>`;
    document.getElementById('empty-state').innerHTML =
      `<div style="font-size:13px;font-weight:600;color:var(--red)">⚠ Could not load data</div>
       <div style="font-size:12px;color:var(--muted)">Check <code>data/performance.json</code></div>
       <button onclick="load()" style="margin-top:8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;border:1.5px solid rgba(220,38,38,.3);color:var(--red);padding:7px 18px;border-radius:99px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px)">Retry</button>`;
    console.error('Load error:', e);
  }
}

load();
setInterval(()=>load(true), 300000);
</script>
</body>
</html>
