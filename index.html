<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Piyush | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: #1e293b; border: 1px solid #334155; transition: all 0.2s; cursor: pointer; }
        .glass-card:hover { border-color: #3b82f6; }
        .modal-container { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); z-index: 100; overflow-y: auto; padding: 20px; }
        .stat-box { background: #0f172a; border: 1px solid #1e293b; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto py-10 px-4">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-800">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">TEAM PIYUSH</h1>
            <div id="current-month" class="text-slate-400 font-bold uppercase text-sm tracking-widest"></div>
        </header>
        <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="modal-container">
        <div class="max-w-6xl mx-auto bg-[#1e293b] rounded-xl border border-slate-700 shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between bg-slate-800/50">
                <h2 id="modal-name" class="text-xl font-bold">RM Name</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white font-bold">CLOSE [ESC]</button>
            </div>
            
            <div class="flex flex-col lg:flex-row">
                <div class="flex-1 p-8 space-y-10 border-r border-slate-700">
                    
                    <section>
                        <h3 class="text-xs font-bold text-blue-400 uppercase mb-3 tracking-wider">Leverage Tracker</h3>
                        <table class="w-full text-xs text-left">
                            <tbody class="divide-y divide-slate-700">
                                <tr id="leverage-rows"></tr>
                            </tbody>
                        </table>
                    </section>

                    <section>
                        <h3 class="text-xs font-bold text-blue-400 uppercase mb-3 tracking-wider">Activity Tracker</h3>
                        <table class="w-full text-xs text-left border-collapse">
                            <thead><tr class="text-slate-500 border-b border-slate-700"><th class="py-2">Parameter</th><th>Target</th><th>Actual</th></tr></thead>
                            <tbody id="activity-rows" class="divide-y divide-slate-700/50"></tbody>
                        </table>
                    </section>

                    <section class="bg-slate-900/50 p-4 rounded-lg">
                        <div class="flex justify-between items-center cursor-pointer" onclick="toggleLedger()">
                            <div>
                                <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-wider">Net Mobilization Ledger</h3>
                                <p class="text-[10px] text-slate-500">Total Net Mob till date: <span id="ledger-summary-total" class="text-white font-bold"></span></p>
                            </div>
                            <span id="ledger-toggle-icon" class="text-lg">⊕</span>
                        </div>
                        <div id="ledger-content" class="hidden mt-6 overflow-x-auto">
                            <table class="w-full text-[10px] text-left">
                                <thead class="text-slate-500 border-b border-slate-700"><tr><th class="py-2">Client</th><th>Asset</th><th>Purchase</th><th>Redemp</th><th>Net</th></tr></thead>
                                <tbody id="ledger-rows" class="divide-y divide-slate-700/30"></tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <div class="w-full lg:w-80 bg-slate-900/50 p-8">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-6 tracking-widest">Performance Stats</h3>
                    <div class="space-y-4">
                        <div class="stat-box"><p class="text-[10px] text-slate-500 uppercase">AUM Actual</p><p id="stat-aum" class="text-xl font-bold"></p></div>
                        <div class="stat-box"><p class="text-[10px] text-slate-500 uppercase">Revenue YTD</p><p id="stat-rev" class="text-xl font-bold"></p></div>
                        <div class="stat-box"><p class="text-[10px] text-slate-500 uppercase">Net Mobilization</p><p id="stat-net" class="text-xl font-bold"></p></div>
                        <div class="stat-box"><p class="text-[10px] text-slate-500 uppercase">Mission 50</p><p id="stat-m50" class="text-xl font-bold"></p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = [];
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('current-month').innerText = months[new Date().getMonth()];

        async function load() {
            const res = await fetch('data/performance.json?t=' + Date.now());
            data = await res.json();
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map((rm, i) => `
                <div class="glass-card p-6 rounded-lg" onclick="openRM(${i})">
                    <h2 class="text-lg font-bold text-white mb-4">${rm.name}</h2>
                    <div class="flex justify-between items-end border-t border-slate-700 pt-4">
                        <div><p class="text-[10px] text-slate-500">NET MOB</p><p class="text-sm font-bold text-emerald-400">₹${rm.netMob}Cr</p></div>
                        <div class="text-right text-[10px] text-slate-600 font-bold uppercase">View Profile →</div>
                    </div>
                </div>
            `).join('');
        }

        function openRM(i) {
            const rm = data[i];
            document.getElementById('modal-name').innerText = rm.name;
            
            // Table 1 Stats
            document.getElementById('stat-aum').innerText = `₹${rm.aum} Cr`;
            document.getElementById('stat-rev').innerText = `₹${rm.revenue} L`;
            document.getElementById('stat-net').innerText = `₹${rm.netMob} Cr`;
            document.getElementById('stat-m50').innerText = rm.m50;

            // Table 3 Leverage
            document.getElementById('leverage-rows').innerHTML = rm.leverage.map(l => `
                <tr><td class="py-2 text-slate-400 font-semibold">${l.label}</td><td class="text-right font-mono">${l.value}</td></tr>
            `).join('');

            // Table 2 Activity
            document.getElementById('activity-rows').innerHTML = rm.activity.map(a => `
                <tr><td class="py-2 text-slate-300">${a.param}</td><td>${a.target}</td><td class="text-blue-400 font-bold">${a.actual}</td></tr>
            `).join('');

            // Ledger
            document.getElementById('ledger-summary-total').innerText = `₹${rm.netMob} Cr`;
            document.getElementById('ledger-rows').innerHTML = rm.ledger.map(l => `
                <tr><td class="py-2">${l.client}</td><td>${l.asset}</td><td>${l.purchase}</td><td>${l.redemption}</td><td class="text-emerald-400 font-bold">${l.net}</td></tr>
            `).join('');

            document.getElementById('modal').style.display = 'block';
        }

        function toggleLedger() {
            const content = document.getElementById('ledger-content');
            const icon = document.getElementById('ledger-toggle-icon');
            const isHidden = content.classList.toggle('hidden');
            icon.innerText = isHidden ? '⊕' : '⊖';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        load();
    </script>
</body>
</html>
