<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Piyush | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(96, 165, 250, 0.5); transform: translateY(-4px); }
    </style>
</head>
<body class="text-slate-100 p-6 md:p-12">
    
    <nav class="max-w-6xl mx-auto flex justify-between items-end mb-12 border-b border-slate-800 pb-8">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">
                TEAM PIYUSH
            </h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Wealth Management Performance</p>
        </div>
        <div class="text-right">
            <p id="current-month" class="text-2xl font-black text-white italic uppercase"></p>
            <p class="text-slate-500 text-[10px] font-bold tracking-widest">FY 2026-27</p>
        </div>
    </nav>

    <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
        </div>

    <script>
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('current-month').innerText = months[new Date().getMonth()];

        async function fetchPerformance() {
            try {
                // Adding a timestamp to the URL prevents browser caching issues
                const response = await fetch('data/performance.json?t=' + new Date().getTime());
                const data = await response.json();
                const grid = document.getElementById('dashboard-grid');
                grid.innerHTML = '';

                data.forEach(rm => {
                    grid.innerHTML += `
                        <div class="glass-card p-8 rounded-[2rem]">
                            <div class="flex justify-between items-center mb-8">
                                <h2 class="text-2xl font-extrabold text-white tracking-tight">${rm.name}</h2>
                                <div class="h-2 w-2 rounded-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
                            </div>

                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">AUM</p>
                                    <p class="text-2xl font-bold text-white">${Number(rm.aum).toFixed(2)}<span class="text-sm text-blue-400 ml-1">Cr</span></p>
                                </div>
                                
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Revenue</p>
                                    <p class="text-2xl font-bold text-white">${Number(rm.revenue).toFixed(2)}<span class="text-sm text-indigo-400 ml-1">L</span></p>
                                </div>

                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Net Mob</p>
                                    <p class="text-2xl font-bold text-white">${Number(rm.netMob).toFixed(2)}<span class="text-sm text-emerald-400 ml-1">Cr</span></p>
                                </div>

                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Mission 50</p>
                                    <p class="text-2xl font-bold text-white">${rm.m50}<span class="text-[10px] text-slate-500 font-normal ml-1">units</span></p>
                                </div>
                            </div>

                            <div class="mt-8 pt-6 border-t border-slate-800/50 flex justify-between items-center">
                                <p class="text-[9px] font-bold text-slate-600 uppercase tracking-tighter">Sync: ${rm.lastUpdated}</p>
                                <div class="flex items-center gap-1">
                                    <span class="text-[10px] text-blue-400 font-black uppercase tracking-tighter">Active Profile</span>
                                    <svg class="w-3 h-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="9 5l7 7-7 7"></path></svg>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.log("Waiting for data...");
            }
        }

        fetchPerformance();
        // Refresh data every 5 minutes automatically
        setInterval(fetchPerformance, 300000);
    </script>
</body>
</html>
