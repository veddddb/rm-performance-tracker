<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Team Piyush | FY 2026–27</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233d5af1'/><stop offset='1' stop-color='%237c3aed'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-size='15' font-weight='700' fill='white'>TP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════ TOKENS ═══════════════ */
:root {
  --bg:linear-gradient(135deg,#dce8ff 0%,#ece4ff 35%,#fde8f8 65%,#ffe8d6 100%);
  --glass:rgba(255,255,255,0.44);
  --glass-h:rgba(255,255,255,0.68);
  --glass-s:rgba(255,255,255,0.82);
  --gb:rgba(255,255,255,0.76);
  --gb2:rgba(200,210,240,0.42);
  --gs:0 8px 32px rgba(80,90,180,.08),0 1px 0 rgba(255,255,255,.88) inset;
  --gsm:0 16px 52px rgba(80,90,180,.14),0 1px 0 rgba(255,255,255,.92) inset;
  --gsl:0 24px 80px rgba(80,90,180,.20),0 1px 0 rgba(255,255,255,.96) inset;
  --text:#141629;--sub:#454878;--muted:#8890b8;
  --blue:#3d5af1;--blue-l:rgba(61,90,241,.11);
  --green:#15803d;--green-l:rgba(21,128,61,.10);
  --amber:#b45309;--amber-l:rgba(180,83,9,.10);
  --red:#b91c1c;--red-l:rgba(185,28,28,.09);
  --purple:#6d28d9;--purple-l:rgba(109,40,217,.10);
  --cyan:#0e7490;--cyan-l:rgba(14,116,144,.10);
  --r:18px;--rs:12px;--tb:58px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  background:var(--bg);background-attachment:fixed;
  color:var(--text);-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ═══════════════ BLOBS ═══════════════ */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;will-change:transform}
.b1{width:700px;height:700px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(168,196,255,.65) 0%,rgba(200,170,255,.32) 55%,transparent 75%);animation:b1m 22s ease-in-out infinite}
.b2{width:600px;height:600px;bottom:-160px;right:-120px;background:radial-gradient(circle,rgba(255,185,235,.58) 0%,rgba(255,175,200,.28) 55%,transparent 75%);animation:b2m 28s ease-in-out infinite}
.b3{width:420px;height:420px;top:40%;left:42%;background:radial-gradient(circle,rgba(165,222,255,.40) 0%,transparent 65%);animation:b3m 19s ease-in-out infinite}
.b4{width:300px;height:300px;top:15%;right:18%;background:radial-gradient(circle,rgba(255,222,165,.38) 0%,transparent 65%);animation:b4m 25s ease-in-out infinite}
@keyframes b1m{0%,100%{transform:translate(0,0) scale(1)}30%{transform:translate(60px,40px) scale(1.07)}65%{transform:translate(-30px,58px) scale(.94)}}
@keyframes b2m{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-52px,-44px) scale(1.08)}70%{transform:translate(38px,-55px) scale(.93)}}
@keyframes b3m{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(42px,-32px) scale(1.12)}}
@keyframes b4m{0%,100%{transform:translate(0,0) scale(1)}42%{transform:translate(-34px,26px) scale(1.09)}}

/* ═══════════════ SPLASH SCREEN ═══════════════ */
.splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0d1035 0%,#1a0a3d 50%,#0d2060 100%);
  transition:opacity .8s ease, visibility .8s ease;
}
.splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.splash-orb{
  width:120px;height:120px;border-radius:32px;
  background:linear-gradient(135deg,#3d5af1,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:44px;font-weight:900;color:#fff;letter-spacing:-.03em;
  box-shadow:0 0 80px rgba(61,90,241,.7),0 0 160px rgba(124,58,237,.4);
  animation:orbPulse 2s ease-in-out infinite, orbIn .8s cubic-bezier(.34,1.56,.64,1) both;
  margin-bottom:32px;position:relative;overflow:hidden;
}
.splash-orb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.28) 0%,transparent 55%);
  border-radius:inherit;
}
@keyframes orbIn{from{opacity:0;transform:scale(.4) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes orbPulse{0%,100%{box-shadow:0 0 80px rgba(61,90,241,.7),0 0 160px rgba(124,58,237,.4)}50%{box-shadow:0 0 120px rgba(61,90,241,.9),0 0 240px rgba(124,58,237,.6)}}
.splash-title{
  font-size:32px;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(90deg,#a5bfff,#d4a5ff,#ffb3e8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:8px;
  animation:textIn .9s .3s cubic-bezier(.4,0,.2,1) both;
}
.splash-sub{
  font-size:13px;color:rgba(255,255,255,.38);letter-spacing:.06em;text-align:center;
  animation:textIn .9s .5s cubic-bezier(.4,0,.2,1) both;
}
.splash-fy{
  font-size:11px;font-weight:600;color:rgba(255,255,255,.22);
  letter-spacing:.18em;text-transform:uppercase;margin-top:6px;
  animation:textIn .9s .65s cubic-bezier(.4,0,.2,1) both;
}
.splash-bar{
  width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;
  margin-top:40px;overflow:hidden;
  animation:textIn .9s .7s cubic-bezier(.4,0,.2,1) both;
}
.splash-bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,#3d5af1,#7c3aed,#c026d3);
  animation:loadBar 2.2s .8s cubic-bezier(.4,0,.2,1) forwards;
  width:0;
}
@keyframes loadBar{to{width:100%}}
@keyframes textIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ═══════════════ TOPBAR ═══════════════ */
.topbar{
  height:var(--tb);position:sticky;top:0;z-index:200;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  background:rgba(255,255,255,.62);
  backdrop-filter:blur(28px) saturate(2);-webkit-backdrop-filter:blur(28px) saturate(2);
  border-bottom:1.5px solid var(--gb);
  box-shadow:0 2px 24px rgba(80,90,180,.08);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#3d5af1,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 4px 14px rgba(61,90,241,.42);
  position:relative;overflow:hidden;
}
.brand-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.26) 0%,transparent 60%)}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
.brand-sep{width:1px;height:14px;background:var(--gb2)}
.brand-sub{font-size:12px;color:var(--muted)}
.tbr{display:flex;align-items:center;gap:8px}
.chip{font-size:10px;font-weight:600;padding:4px 12px;border-radius:99px;letter-spacing:.05em;text-transform:uppercase}
.chip-blue{background:var(--blue-l);color:var(--blue);border:1px solid rgba(61,90,241,.22)}
.chip-amber{background:var(--amber-l);color:var(--amber);border:1px solid rgba(180,83,9,.22)}
.chip-glass{background:rgba(255,255,255,.65);color:var(--sub);border:1.5px solid var(--gb);backdrop-filter:blur(8px)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:pulse 2.4s ease-in-out infinite;display:inline-block;margin-right:4px;vertical-align:middle}

/* ═══════════════ MAIN LAYOUT ═══════════════ */
.page{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:0;
  min-height:calc(100vh - var(--tb));
  position:relative;z-index:1;
}

/* ═══════════════ LEFT PANEL (Team highlights) ═══════════════ */
.left-panel{
  background:rgba(255,255,255,.38);
  backdrop-filter:blur(22px) saturate(1.7);-webkit-backdrop-filter:blur(22px) saturate(1.7);
  border-right:1.5px solid var(--gb);
  padding:22px 18px;
  display:flex;flex-direction:column;gap:16px;
  position:sticky;top:var(--tb);
  height:calc(100vh - var(--tb));
  overflow-y:auto;
}
.left-panel::-webkit-scrollbar{width:3px}
.left-panel::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}

/* Left panel section */
.lp-sec{}
.lp-title{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.lp-title::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:currentColor}

/* Quarter card */
.qtr-card{
  background:linear-gradient(135deg,rgba(61,90,241,.10) 0%,rgba(124,58,237,.07) 100%);
  border:1.5px solid rgba(61,90,241,.20);border-radius:var(--rs);padding:14px 16px;
}
.qtr-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.qtr-q{font-size:22px;font-weight:900;color:var(--blue);font-family:'DM Mono',monospace;letter-spacing:-.02em}
.qtr-days{font-size:11px;color:var(--muted)}
.qtr-days span{font-size:16px;font-weight:700;color:var(--blue);font-family:'DM Mono',monospace}
.qtr-bar-t{height:5px;background:rgba(61,90,241,.14);border-radius:3px;overflow:hidden;margin-bottom:5px}
.qtr-bar-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .8s ease}
.qtr-sub{font-size:10px;color:var(--muted)}

/* Team scorecard */
.team-sc{display:flex;flex-direction:column;gap:8px}
.team-sc-item{
  background:rgba(255,255,255,.58);border:1.5px solid var(--gb);
  border-radius:var(--rs);padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.team-sc-item:hover{background:rgba(255,255,255,.82);box-shadow:var(--gsm);transform:translateX(3px)}
.team-sc-l{font-size:11px;font-weight:600;color:var(--sub)}
.team-sc-v{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;color:var(--text)}
.team-sc-u{font-size:9px;color:var(--muted);margin-left:2px;font-weight:500;font-family:'Outfit',sans-serif}

/* Leaderboard */
.lb-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-radius:8px;cursor:pointer;transition:all .18s;
  border:1px solid transparent;
}
.lb-item:hover{background:rgba(255,255,255,.6);border-color:var(--gb);box-shadow:var(--gs)}
.lb-rank{font-size:10px;font-weight:800;font-family:'DM Mono',monospace;width:16px;text-align:center;color:var(--muted)}
.lb-rank.gold{color:#d97706}
.lb-rank.silver{color:#6d28d9}
.lb-rank.bronze{color:#0e7490}
.lb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lb-name{font-size:11px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-bar-w{width:48px;flex-shrink:0}
.lb-bar-t{height:3px;background:rgba(180,190,230,.32);border-radius:2px;overflow:hidden}
.lb-bar-f{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.lb-pct{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;width:28px;text-align:right;flex-shrink:0}

/* Risk flags */
.risk-item{
  display:flex;align-items:flex-start;gap:7px;padding:7px 10px;
  background:rgba(185,28,28,.07);border:1px solid rgba(185,28,28,.18);
  border-radius:8px;margin-bottom:5px;cursor:pointer;
  transition:background .15s;
}
.risk-item:last-child{margin-bottom:0}
.risk-item:hover{background:rgba(185,28,28,.13)}
.risk-dot{width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:4px}
.risk-txt{font-size:10px;color:var(--red);line-height:1.45;font-weight:500}
.no-risk{font-size:10px;color:var(--green);display:flex;align-items:center;gap:5px;padding:4px 6px}

/* ═══════════════ RIGHT: GRID AREA ═══════════════ */
.right-panel{
  padding:24px;
  overflow-y:auto;
}
.right-panel::-webkit-scrollbar{width:5px}
.right-panel::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:5px}

/* BOSS GRID LAYOUT
   Row 1: [RM] [RM] [PIYUSH(wide)] [RM] [RM]  — but we do:
   3-col grid: col1=[rm1,rm3], col2=[piyush], col3=[rm2,rm4] + rm5 below
*/
.boss-grid{
  display:grid;
  grid-template-columns:1fr 1.55fr 1fr;
  gap:14px;
  margin-bottom:14px;
  align-items:start;
}
.boss-col{display:flex;flex-direction:column;gap:14px}
.full-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ═══════════════ RM CARD (collapsed) ═══════════════ */
.rm-card{
  border-radius:var(--r);
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.6);-webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1.5px solid var(--gb);
  box-shadow:var(--gs);
  cursor:pointer;
  transition:all .28s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
  animation:cardIn .4s cubic-bezier(.4,0,.2,1) both;
}
/* Glow on hover using rm color */
.rm-card:hover{
  box-shadow:var(--gsm), 0 0 0 1px var(--glow-col,rgba(61,90,241,.3)), 0 0 40px var(--glow-col,rgba(61,90,241,.18));
  transform:translateY(-3px) scale(1.008);
  background:var(--glass-h);
}
.rm-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--rm-col,#3d5af1),rgba(255,255,255,.2),transparent);
  opacity:.9;
}
/* Animated shimmer on hover */
.rm-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 50%);
  opacity:0;transition:opacity .28s;pointer-events:none;
}
.rm-card:hover::after{opacity:1}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}

/* Collapsed card interior */
.rm-card-inner{padding:18px 18px 16px}
.rm-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.rm-card-name{font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--text);line-height:1.3}
.rm-card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px;box-shadow:0 0 8px currentColor}

/* Target items on collapsed card */
.rm-card-targets{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;margin-bottom:14px}
.rct{} 
.rct-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
.rct-v{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:-.02em}
.rct-u{font-size:8px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.rct-act{font-size:10px;font-family:'DM Mono',monospace;margin-top:1px}

/* AUM progress bar on collapsed card */
.rm-card-prog{margin-top:4px}
.rcp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rcp-label{font-size:9px;color:var(--muted);font-weight:500}
.rcp-pct{font-size:10px;font-family:'DM Mono',monospace;font-weight:700}
.rcp-track{height:4px;background:rgba(180,190,230,.28);border-radius:2px;overflow:hidden}
.rcp-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* Expand CTA */
.rm-card-cta{
  margin-top:12px;padding-top:10px;border-top:1px solid var(--gb2);
  font-size:10px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;justify-content:space-between;
  letter-spacing:.04em;
}
.rm-card-cta-arrow{
  width:20px;height:20px;border-radius:50%;
  background:rgba(255,255,255,.65);border:1px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;font-size:11px;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),background .18s;
}
.rm-card:hover .rm-card-cta-arrow{transform:rotate(45deg) scale(1.1);background:var(--blue-l);color:var(--blue)}

/* ═══════════════ BOSS / PIYUSH CARD ═══════════════ */
.boss-card{
  border-radius:var(--r);
  background:var(--glass-s);
  backdrop-filter:blur(32px) saturate(2.2);-webkit-backdrop-filter:blur(32px) saturate(2.2);
  border:2px solid rgba(255,255,255,.88);
  box-shadow:0 20px 64px rgba(80,90,180,.18),0 1px 0 rgba(255,255,255,.95) inset,0 0 0 1px rgba(61,90,241,.10);
  position:relative;overflow:hidden;
  cursor:pointer;
  transition:all .32s cubic-bezier(.4,0,.2,1);
  animation:cardIn .4s .05s cubic-bezier(.4,0,.2,1) both;
}
.boss-card:hover{
  box-shadow:0 28px 80px rgba(61,90,241,.22),0 1px 0 rgba(255,255,255,.98) inset,0 0 0 2px rgba(61,90,241,.35),0 0 60px rgba(61,90,241,.14);
  transform:translateY(-4px);
}
.boss-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#3d5af1,#7c3aed,#c026d3,#3d5af1);
  background-size:200%;
  animation:gradMove 3s linear infinite;
}
@keyframes gradMove{to{background-position:200% 0}}
.boss-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.24) 0%,transparent 55%);
  pointer-events:none;
}
.boss-badge{
  position:absolute;top:16px;right:16px;z-index:2;
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 10px;border-radius:99px;
  background:linear-gradient(90deg,rgba(61,90,241,.15),rgba(124,58,237,.15));
  color:var(--blue);border:1px solid rgba(61,90,241,.25);
}

/* Boss card inner */
.boss-inner{padding:22px 22px 18px;position:relative;z-index:1}
.boss-name{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--sub);margin-bottom:4px}
.boss-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.bkpi{}
.bkpi-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
.bkpi-v{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;letter-spacing:-.03em}
.bkpi-u{font-size:10px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:2px}

/* Boss targets */
.boss-targets{
  background:linear-gradient(135deg,rgba(61,90,241,.07) 0%,rgba(124,58,237,.05) 100%);
  border:1.5px solid rgba(61,90,241,.16);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px;
}
.boss-t-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.boss-t-label::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}
.boss-t-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.boss-ti-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px}
.boss-ti-v{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:-.02em}
.boss-ti-u{font-size:8px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.boss-ti-rr{font-size:8px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

/* Boss prog bars */
.boss-progs{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.bp-row{display:flex;align-items:center;gap:8px}
.bp-l{font-size:9px;font-weight:600;color:var(--sub);width:56px;flex-shrink:0}
.bp-track{flex:1;height:5px;background:rgba(180,190,230,.28);border-radius:3px;overflow:hidden}
.bp-fill{height:100%;border-radius:3px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.bp-pct{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;width:32px;text-align:right;flex-shrink:0}

.boss-cta{
  padding-top:12px;border-top:1px solid var(--gb2);
  font-size:10px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;justify-content:space-between;letter-spacing:.04em;
}

/* ═══════════════ EXPANDED DETAIL OVERLAY ═══════════════ */
.detail-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(10,8,30,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  overflow-y:auto;padding:24px;
  animation:overlayIn .28s ease both;
}
.detail-overlay.open{display:block}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.detail-modal{
  max-width:1080px;margin:0 auto;
  background:rgba(255,255,255,.92);backdrop-filter:blur(40px) saturate(2.5);
  -webkit-backdrop-filter:blur(40px) saturate(2.5);
  border:1.5px solid rgba(255,255,255,.96);
  border-radius:24px;
  box-shadow:0 32px 100px rgba(20,22,60,.22),0 1px 0 rgba(255,255,255,.98) inset;
  overflow:hidden;
  animation:modalIn .36s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(20px)}to{opacity:1;transform:none}}
.modal-top{
  padding:20px 24px;
  border-bottom:1px solid rgba(200,210,240,.4);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:rgba(255,255,255,.94);z-index:10;
  backdrop-filter:blur(20px);
}
.modal-rm-name{font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.modal-rm-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px}
.modal-close{
  width:34px;height:34px;border-radius:50%;
  background:rgba(200,210,240,.3);border:1px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--muted);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.modal-close:hover{background:var(--red-l);color:var(--red);border-color:rgba(185,28,28,.3);transform:rotate(90deg) scale(1.1)}
.modal-body{padding:24px;display:grid;grid-template-columns:1fr 250px;gap:18px}
.modal-main{display:flex;flex-direction:column;gap:16px}
.modal-side{display:flex;flex-direction:column;gap:14px}

/* ═══════════════ SECTION CARD (modal) ═══════════════ */
.sec{
  border-radius:16px;overflow:hidden;
  background:rgba(255,255,255,.75);
  border:1.5px solid rgba(200,210,240,.5);
  box-shadow:0 4px 20px rgba(80,90,180,.07);
  transition:box-shadow .22s,transform .22s;animation:fadeUp .28s cubic-bezier(.4,0,.2,1) both;
}
.sec:hover{box-shadow:0 8px 32px rgba(80,90,180,.12);transform:translateY(-1px)}
.sec-head{
  padding:12px 18px;background:rgba(255,255,255,.55);
  border-bottom:1px solid rgba(200,210,240,.4);
  display:flex;justify-content:space-between;align-items:center;
}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
.sec-badge{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.sec-body{padding:14px 18px}
.sec-flush{padding:0}

/* ═══════════════ JOURNEY TABLE ═══════════════ */
.jt-wrap{overflow-x:auto;padding:0 18px}
.jt-wrap::-webkit-scrollbar{height:3px}
.jt-wrap::-webkit-scrollbar-thumb{background:rgba(200,210,240,.5);border-radius:3px}
.jt{width:100%;border-collapse:collapse;min-width:540px}
.jt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 10px 0;border-bottom:1.5px solid rgba(200,210,240,.4);text-align:left;white-space:nowrap}
.jt th.r{text-align:right;padding-right:0}
.jt td{padding:11px 10px 11px 0;border-bottom:1px solid rgba(200,210,240,.35);vertical-align:middle}
.jt tr:last-child td{border-bottom:none}
.j-label{font-size:13px;font-weight:600}
.j-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--sub)}
.j-rr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.j-actual{font-size:15px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.j-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:6px}
.jbt{height:4px;border-radius:2px;background:rgba(180,190,230,.25);overflow:hidden;margin-bottom:3px;min-width:80px}
.jbf{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.j-newrr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.j-proj{font-size:10px;font-family:'DM Mono',monospace;font-weight:600;display:block;margin-top:2px}
.track-badge{display:inline-block;font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.r{text-align:right}

/* ═══════════════ PLAN TABLE ═══════════════ */
.plan-wrap{overflow-x:auto;padding:0 18px}
.plan-wrap::-webkit-scrollbar{height:3px}
.plan-wrap::-webkit-scrollbar-thumb{background:rgba(200,210,240,.5);border-radius:3px}
.pt{width:100%;border-collapse:collapse;min-width:420px}
.pt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 10px 0;border-bottom:1.5px solid rgba(200,210,240,.4);text-align:right}
.pt th:first-child{text-align:left}
.pt td{padding:10px 10px 10px 0;border-bottom:1px solid rgba(200,210,240,.35);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.pt td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-weight:600;font-size:13px}
.pt td:nth-child(2){text-align:left;font-family:'Outfit',sans-serif;font-size:12px;padding-right:12px}
.pt tr:last-child td{border-bottom:none}
.pt tfoot td{font-weight:700;color:var(--text);font-family:'DM Mono',monospace;border-top:1.5px solid rgba(200,210,240,.4);padding-top:11px;border-bottom:none;font-size:12px}
.pt tfoot td:first-child{font-family:'Outfit',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.prob-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:5px}
.p-hi{background:var(--green-l);color:var(--green)}
.p-md{background:var(--amber-l);color:var(--amber)}
.p-lo{background:var(--red-l);color:var(--red)}

/* ═══════════════ ACTIVITY TABLE ═══════════════ */
.at-wrap{overflow-x:auto}
.at-wrap::-webkit-scrollbar{height:3px}
.at-wrap::-webkit-scrollbar-thumb{background:rgba(200,210,240,.5);border-radius:3px}
.at{width:100%;border-collapse:collapse;min-width:300px}
.at th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 10px 0;border-bottom:1.5px solid rgba(200,210,240,.4);text-align:right}
.at th:first-child{text-align:left}
.at td{padding:9px 10px 9px 0;border-bottom:1px solid rgba(200,210,240,.35);text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--sub)}
.at td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-weight:600;font-size:13px}
.at tr:last-child td{border-bottom:none}
.g-neg{color:var(--red)!important;font-weight:700}
.g-pos{color:var(--green)!important;font-weight:700}
.act-comp-bar{display:flex;align-items:center;gap:8px;padding:9px 18px;background:rgba(255,255,255,.4);border-top:1px solid rgba(200,210,240,.4)}
.act-comp-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap}
.act-comp-t{flex:1;height:5px;background:rgba(180,190,230,.25);border-radius:3px;overflow:hidden}
.act-comp-f{height:100%;border-radius:3px;transition:width .8s ease}
.act-comp-p{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;white-space:nowrap}

/* ═══════════════ COLLAPSIBLE ═══════════════ */
.ch{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:12px 18px;background:rgba(255,255,255,.35);border-top:1px solid rgba(200,210,240,.4);user-select:none;transition:background .18s}
.ch:hover{background:rgba(255,255,255,.58)}
.ch-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub)}
.ch-btn{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.75);border:1px solid rgba(200,210,240,.5);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:300;color:var(--muted);transition:transform .24s cubic-bezier(.34,1.56,.64,1),background .18s}
.ch-btn.open{transform:rotate(45deg);background:var(--blue-l);color:var(--blue);border-color:rgba(61,90,241,.3)}
.cb{display:none}
.cb.open{display:block;animation:fadeUp .22s ease both}

/* ═══════════════ LEDGER ═══════════════ */
.led-wrap{overflow-x:auto}
.led-wrap::-webkit-scrollbar{height:3px}
.led-wrap::-webkit-scrollbar-thumb{background:rgba(200,210,240,.5);border-radius:3px}
.lt{width:100%;border-collapse:collapse;table-layout:fixed;min-width:460px}
.lt col.c-client{width:22%}.lt col.c-asset{width:16%}.lt col.c-month{width:14%}
.lt col.c-pur{width:16%}.lt col.c-red{width:16%}.lt col.c-net{width:16%}
.lt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 0 10px;border-bottom:1.5px solid rgba(200,210,240,.4);text-align:right;overflow:hidden}
.lt th.l{text-align:left}
.lt td{padding:8px 0;border-bottom:1px solid rgba(200,210,240,.35);font-family:'DM Mono',monospace;font-size:11px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lt td.l{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-size:12px;font-weight:500;padding-right:8px}
.lt td.l2{text-align:left;font-family:'Outfit',sans-serif;font-size:12px;padding-right:8px;color:var(--sub)}
.lt tr:last-child td{border-bottom:none}
.lt td.col-pur{color:var(--green);font-weight:600}
.lt td.col-red{color:var(--red);font-weight:600}
.lt td.col-pos{color:var(--green);font-weight:700}
.lt td.col-neg{color:var(--red);font-weight:700}
.lt .tot-row td{font-weight:700;font-family:'DM Mono',monospace;border-top:1.5px solid rgba(200,210,240,.4);padding-top:11px;border-bottom:none}
.lt .tot-row td.l{font-family:'Outfit',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.mf{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.mp{font-size:10px;font-weight:500;padding:3px 10px;border-radius:99px;border:1.5px solid rgba(200,210,240,.5);color:var(--sub);background:rgba(255,255,255,.45);transition:all .15s}
.mp:hover{background:rgba(255,255,255,.8);color:var(--text)}
.mp.on{border-color:rgba(61,90,241,.5);color:var(--blue);background:var(--blue-l);font-weight:700}

/* Sparkline */
.spark-section{padding:10px 18px;border-top:1px solid rgba(200,210,240,.4)}
.spark-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px}
.spark-wrap{display:flex;align-items:flex-end;gap:3px;height:28px}
.spark-bar{flex:1;border-radius:3px 3px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1);min-height:2px;position:relative;cursor:default}
.spark-bar:hover .spark-tip{display:block}
.spark-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(20,22,41,.88);color:#fff;font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:4px;white-space:nowrap;z-index:10}
.spark-ml-row{display:flex;gap:3px;margin-top:3px}
.spark-ml{flex:1;font-size:8px;color:var(--muted);text-align:center;font-family:'DM Mono',monospace;overflow:hidden}

/* Snapshot + leverage */
.snap-item{padding:10px 0;border-bottom:1px solid rgba(200,210,240,.35)}
.snap-item:last-child{border-bottom:none}
.snap-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.snap-row{display:flex;justify-content:space-between;align-items:baseline}
.snap-v{font-size:17px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.snap-pct{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 8px;border-radius:99px}
.snap-bt{height:4px;border-radius:2px;background:rgba(180,190,230,.25);overflow:hidden;margin-top:6px}
.snap-bf{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.lev-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(200,210,240,.35)}
.lev-row:last-child{border-bottom:none}
.lev-l{font-size:11px;color:var(--sub);font-weight:500}
.lev-v{font-size:12px;font-family:'DM Mono',monospace;font-weight:700}

/* Projection strip */
.proj-strip{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  margin-bottom:14px;
}
.proj-item{background:rgba(255,255,255,.6);border-radius:10px;padding:10px 12px;border:1px solid rgba(200,210,240,.5)}
.proj-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.proj-v{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.proj-sub{font-size:9px;color:var(--muted);margin-top:2px}

/* ═══════════════ MOBILE ═══════════════ */
.mob-shell{display:none;flex-direction:column;min-height:calc(100vh - var(--tb))}
.mob-tabs{display:flex;overflow-x:auto;flex-shrink:0;background:rgba(255,255,255,.54);backdrop-filter:blur(20px);border-bottom:1.5px solid var(--gb);padding:0 6px;scrollbar-width:none}
.mob-tabs::-webkit-scrollbar{display:none}
.mob-tab{flex-shrink:0;padding:0 14px;height:46px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2.5px solid transparent;transition:all .2s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.mob-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.mob-tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.mob-tab.active .mob-tab-dot{transform:scale(1.4)}
.mob-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 28px}
.mob-scroll::-webkit-scrollbar{display:none}

/* ═══════════════ SKELETON + UTILS ═══════════════ */
@keyframes sk{0%,100%{opacity:.22}50%{opacity:.48}}
.skel{border-radius:10px;background:rgba(180,190,230,.44);animation:sk 1.7s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.85)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes shimmerIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}

/* RESPONSIVE */
@media(min-width:641px){.mob-shell{display:none!important}.page{display:grid!important}}
@media(max-width:640px){
  .page{display:none!important}.mob-shell{display:flex!important}
  body{overflow-x:hidden}
  .brand-sep,.brand-sub{display:none}
}
@media(max-width:1100px) and (min-width:641px){
  .page{grid-template-columns:260px 1fr}
  .boss-grid{grid-template-columns:1fr 1.4fr 1fr}
}
@media(max-width:900px) and (min-width:641px){
  .page{grid-template-columns:1fr}
  .left-panel{display:none}
  .boss-grid{grid-template-columns:1fr 1fr;gap:12px}
  .full-row{grid-template-columns:1fr 1fr}
  .modal-body{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-orb">TP</div>
  <div class="splash-title">Team Piyush Tracker</div>
  <div class="splash-sub">FY 2026–27</div>
  <div class="splash-fy">Property of Vedant Bhansali</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<div class="blobs">

</div>

<!-- TOPBAR -->
<div class="topbar">

    <div class="brand-icon">TP</div>
    <span class="brand-name">Team Piyush</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">Private Banking</span>
  </div>
  <div class="tbr">
    <span class="chip chip-blue">FY 2026–27</span>
    <span class="chip chip-amber" id="qtr-chip">Q1</span>
    <span class="chip chip-glass" id="updated-tag"><span class="live-dot"></span>Loading…</span>

<div class="page">

      <div class="lp-title" style="color:var(--blue)">Quarter Progress</div>
      <div class="qtr-card" id="qtr-card"><div class="skel" style="height:60px"></div></div>

      <div>
        <div class="modal-rm-name" id="modal-rm-name"></div>
        <div class="modal-rm-sub" id="modal-rm-sub"></div>

    </div>

      <div class="modal-main" id="modal-main"></div>
      <div class="modal-side" id="modal-side"></div>
    </div>
  </div>

<script>
/* ═══ STATE ═══ */
let data=[], activeLedger=[];
const COLORS=['#3d5af1','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];
const MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
const now=new Date(), curM=MO[now.getMonth()], curY=now.getFullYear();
const BOSS_NAME="Piyush Dungarpuria";

/* ═══ HELPERS ═══ */
const n=(v,d=2)=>Number(v||0).toFixed(d);
const pct=(v,t)=>(!t?0:Math.min(100,Math.round(v/t*100)));
function pc(p){return p>=90?'var(--green)':p>=60?'var(--amber)':'var(--red)'}
function pb(p){return p>=90?'var(--green-l)':p>=60?'var(--amber-l)':'var(--red-l)'}
function probCls(p){return p>=70?'p-hi':p>=40?'p-md':'p-lo'}
function short(nm){const p=nm.trim().split(' ');return p.length>1?p[0]+' '+p[p.length-1][0]+'.':nm}
function fJ(j,kw){return(j||[]).find(m=>m.label.toLowerCase().includes(kw.toLowerCase()))||{target:0,actual:0,monthlyRunRate:0,newRunRate:0}}
function unit(l){const s=l.toLowerCase();if(s.includes('sip'))return 'L';if(s.includes('m50')||s.includes('mission'))return '';return 'Cr'}
function monthsRemaining(){const m=now.getMonth();return m>=3?3+12-m:3-m}
function projectYE(a,rr){return a+rr*monthsRemaining()}
function actCompletion(acts){
  const v=acts.filter(a=>a.param!==''&&Number(a.target||0)>0);
  if(!v.length)return 0;
  return Math.round(v.filter(a=>Number(a.gap||0)<=0).length/v.length*100);
}
function computeFlags(rm){
  const flags=[];
  const acts=(rm.activity||[]).filter(a=>a.param!==''&&Number(a.target||0)>0);
  const pending=acts.filter(a=>Number(a.gap||0)>0).length;
  if(pending>=3) flags.push(`${pending} activity gaps pending`);
  const j=rm.journey||[];
  const newRR=fJ(j,'aum').newRunRate||0, origRR=fJ(j,'aum').monthlyRunRate||0;
  if(origRR>0&&newRR>origRR*1.5) flags.push(`AUM run rate ${Math.round(newRR/origRR*100)}% of original`);
  const ap=pct(fJ(j,'aum').actual||rm.aum,fJ(j,'aum').target||rm.aumTarget||0);
  if(ap<40) flags.push(`AUM at ${ap}% of annual target`);
  return flags;
}

}

/* ═══ QUARTER ═══ */
function buildQtr(){
  const m=now.getMonth();
  let q,qEnd;
  if(m>=3&&m<=5){q='Q1';qEnd=new Date(curY,5,30)}
  else if(m>=6&&m<=8){q='Q2';qEnd=new Date(curY,8,30)}
  else if(m>=9&&m<=11){q='Q3';qEnd=new Date(curY,11,31)}
  else{q='Q4';qEnd=new Date(curY,2,31)}
  const dLeft=Math.max(0,Math.ceil((qEnd-now)/(1000*60*60*24)));
  const prog=Math.min(100,Math.round((92-dLeft)/92*100));
  document.getElementById('qtr-chip').textContent=q;
  document.getElementById('qtr-card').innerHTML=`
    <div class="qtr-top">
      <span class="qtr-q">${q}</span>
      <span class="qtr-days"><span>${dLeft}</span> days left</span>
    </div>
    <div class="qtr-bar-t"><div class="qtr-bar-f" style="width:${prog}%"></div></div>
    <div class="qtr-sub" style="margin-top:5px;font-size:10px;color:var(--muted)">${prog}% of quarter elapsed · ${curM} ${curY}</div>`;
}

}

/* ═══ BUILD GRID ═══ */
function buildGrid(){
  const bossIdx=data.findIndex(rm=>rm.name===BOSS_NAME);
  const others=data.map((_,i)=>i).filter(i=>i!==bossIdx);
  // 4 RMs around boss, 1 or 2 below
  const top4=others.slice(0,4);
  const bottom=others.slice(4);

  const col1=[top4[0],top4[1]].filter(x=>x!==undefined);
  const col2=bossIdx>=0?[bossIdx]:[];
  const col3=[top4[2],top4[3]].filter(x=>x!==undefined);

  document.getElementById('boss-grid').innerHTML=`
    <div class="boss-col" style="animation-delay:.05s">
      ${col1.map(i=>rmCardHTML(data[i],i,false)).join('')}
    </div>
    <div style="animation-delay:.02s">
      ${col2.length?rmCardHTML(data[col2[0]],col2[0],true):''}
    </div>
    <div class="boss-col" style="animation-delay:.08s">
      ${col3.map(i=>rmCardHTML(data[i],i,false)).join('')}
    </div>`;

  const bottomRow=document.getElementById('bottom-row');
  if(bottom.length){
    bottomRow.style.display='grid';
    bottomRow.innerHTML=bottom.map(i=>rmCardHTML(data[i],i,false)).join('');
  } else {
    bottomRow.style.display='none';
  }
}

function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow='';
}
function handleOverlayClick(e){if(e.target===document.getElementById('detail-overlay'))closeDetail();}

/* ═══ SPARKLINE ═══ */
function buildSparkline(ledger){
  if(!ledger||!ledger.length) return '';
  const byM={};
  ledger.forEach(l=>{if(l.month&&l.month!=='Unspecified') byM[l.month]=(byM[l.month]||0)+Number(l.net||0)});
  const months=Object.keys(byM);
  if(months.length<2) return '';
  const recent=months.slice(-6), vals=recent.map(m=>byM[m]);
  const maxV=Math.max(...vals.map(Math.abs),1);
  return `<div class="spark-section">
    <div class="spark-label">Net Mobilization Trend (Cr)</div>
    <div class="spark-wrap">
      ${vals.map((v,i)=>{const h=Math.round(Math.abs(v)/maxV*28)||2;return`<div class="spark-bar" style="height:${h}px;background:${v>=0?'var(--green)':'var(--red)'};opacity:.75"><span class="spark-tip">${recent[i]}: ${n(v)}Cr</span></div>`;}).join('')}
    </div>
    <div class="spark-ml-row">${recent.map(m=>`<span class="spark-ml">${m.substring(0,3)}</span>`).join('')}</div>
  </div>`;
}

/* ═══ LEDGER ═══ */
function renderLedger(filter,btn){
  if(btn) btn.closest('.mf').querySelectorAll('.mp').forEach(b=>b.classList.toggle('on',b===btn));
  const rows=filter==='ALL'?activeLedger:activeLedger.filter(l=>l.month===filter);
  const totP=rows.reduce((s,l)=>s+Number(l.purchase||0),0);
  const totR=rows.reduce((s,l)=>s+Number(l.redemption||0),0);
  const totN=rows.reduce((s,l)=>s+Number(l.net||0),0);
  const html=rows.map(l=>{const net=Number(l.net||0);return`<tr><td class="l">${l.client}</td><td class="l2">${l.asset}</td><td class="l2">${l.month}</td><td class="col-pur">${n(l.purchase)}</td><td class="col-red">${n(l.redemption)}</td><td class="${net>=0?'col-pos':'col-neg'}">${n(net)}</td></tr>`;}).join('')
    +`<tr class="tot-row"><td class="l" colspan="3">${filter==='ALL'?'Grand Total':filter+' Total'}</td><td class="col-pur">${n(totP)}</td><td class="col-red">${n(totR)}</td><td class="${totN>=0?'col-pos':'col-neg'}">${n(totN)}</td></tr>`;
  document.querySelectorAll('.led-tbody').forEach(el=>el.innerHTML=html);
}

/* ═══ COLLAPSIBLE ═══ */
function toggleSec(hdr){
  const body=hdr.nextElementSibling,btn=hdr.querySelector('.ch-btn');
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  btn.textContent=open?'+':'×';
  btn.classList.toggle('open',!open);
}

/* ═══ MOBILE (same detail as before) ═══ */
function buildMobTabs(){
  document.getElementById('mob-tabs').innerHTML=data.map((rm,i)=>
    `<button class="mob-tab ${i===0?'active':''}" id="tab-${i}" onclick="openMobRM(${i})">
      <span class="mob-tab-dot" style="background:${COLORS[i]}"></span>${short(rm.name)}
    </button>`).join('');
}
function openMobRM(idx){
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.mob-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('mob-content').innerHTML=buildMobDetail(data[idx],idx);
  document.getElementById('mob-scroll').scrollTo({top:0,behavior:'smooth'});
  renderLedger('ALL',null);
  const tab=document.getElementById('tab-'+idx);
  if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}
function buildMobDetail(rm,i){
  const col=COLORS[i], j=rm.journey||[];
  const jrows=j.length?j:[
    {label:'AUM',    target:rm.aumTarget||0,monthlyRunRate:0,actual:rm.aum,    newRunRate:0},

    {label:'Net Mob',target:0,              monthlyRunRate:0,actual:rm.netMob, newRunRate:0},
    {label:'M50',    target:0,              monthlyRunRate:0,actual:rm.m50||0, newRunRate:0},
    {label:'SIP',    target:0,              monthlyRunRate:0,actual:rm.sip,    newRunRate:0},

  const ledger=rm.ledger||[];
  const ledMonths=[...new Set(ledger.map(l=>l.month))].filter(m=>m&&m!=='Unspecified').sort();
  const acts=(rm.activity||[]).filter(a=>a.param!=='');
  const comp=actCompletion(acts), compC=pc(comp);

  return `<div style="animation:fadeUp .3s ease both">
    <!-- Header -->
    <div style="background:rgba(255,255,255,.82);backdrop-filter:blur(30px);border:1.5px solid rgba(255,255,255,.9);border-radius:18px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,${col},rgba(124,58,237,.5),transparent)"></div>
      <div style="font-size:17px;font-weight:800;letter-spacing:-.02em;color:${col};margin-bottom:3px">${rm.name}</div>
      <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;line-height:1.7">Ledger ₹${n(rm.ledgerTotal||0)}Cr · Plan ₹${n(rm.planTotalAmt||0)}Cr · Wtd ₹${n(rm.planWeighted||0)}Cr</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid rgba(200,210,240,.4);margin-top:12px;padding-top:12px">
        ${[{l:'Net Mob',v:n(rm.netMob)+'Cr',c:'var(--green)'},{l:'M50',v:rm.m50||0,c:'var(--amber)'},{l:'SIP',v:n(rm.sip)+'L',c:'var(--cyan)'}].map((k,ki)=>`<div${ki>0?' style="padding-left:12px;border-left:1px solid rgba(200,210,240,.4);margin-left:12px"':''}>
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px">${k.l}</div>
          <div style="font-size:17px;font-weight:800;font-family:'DM Mono',monospace;color:${k.c}">${k.v}</div>
        </div>`).join('')}
      </div>
    </div>
    <!-- Journey cards -->
    <div style="background:rgba(255,255,255,.7);border-radius:16px;border:1.5px solid var(--gb);overflow:hidden;margin-bottom:12px">
      <div style="padding:11px 16px;background:rgba(255,255,255,.45);border-bottom:1px solid rgba(200,210,240,.4);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub)">FY 2026–27 · Annual Journey</div>
      <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px">
        ${jrows.map(m=>{
          const p2=pct(m.actual,m.target),c=pc(p2),bg=pb(p2),u=unit(m.label);
          const ye=projectYE(m.actual,m.newRunRate),yep=pct(ye,m.target),yec=pc(yep);
          return `<div style="background:rgba(255,255,255,.58);border-radius:10px;padding:12px 14px;border:1px solid rgba(200,210,240,.4)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <span style="font-size:13px;font-weight:700;color:var(--text)">${m.label}</span>
              <span style="font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:6px;background:${bg};color:${c}">${p2}%</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
              <div>
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px">YTD Actual</div>
                <div style="font-size:16px;font-weight:800;font-family:'DM Mono',monospace;color:${c}">${n(m.actual)}${u?`<span style="font-size:9px;color:var(--muted);font-family:Outfit,sans-serif;margin-left:1px">${u}</span>`:''}</div>
              </div>
              <div>
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px">Annual Target</div>
                <div style="font-size:16px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue)">${n(m.target)}${u?`<span style="font-size:9px;color:var(--muted);font-family:Outfit,sans-serif;margin-left:1px">${u}</span>`:''}</div>
                ${m.monthlyRunRate?`<div style="font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px">${n(m.monthlyRunRate)}${u}/mo</div>`:''}
              </div>
            </div>
            <div style="height:5px;border-radius:3px;background:rgba(180,190,230,.25);overflow:hidden;margin-bottom:8px"><div style="height:100%;border-radius:3px;width:${p2}%;background:${c};transition:width 1.3s cubic-bezier(.4,0,.2,1)"></div></div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid rgba(200,210,240,.35)">
              <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)">New RR</span>
              <span style="font-size:11px;font-family:'DM Mono',monospace;font-weight:600;color:${c}">${n(m.newRunRate)}${u}/mo</span>
            </div>
            <div style="font-size:9px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:5px">YE Proj: <strong style="color:${yec}">${n(ye)}${u}</strong> (${yep}%)</div>
          </div>`;

      </div>
    </div>
    <!-- Activity -->
    <div style="background:rgba(255,255,255,.7);border-radius:16px;border:1.5px solid var(--gb);overflow:hidden;margin-bottom:12px">
      <div class="ch" onclick="toggleSec(this)" style="border-top:none">
        <span class="ch-title">Monthly Activity Tracker</span><div class="ch-btn">+</div>
      </div>
      <div class="cb">
        <div class="act-comp-bar">
          <span class="act-comp-l">Completion</span>
          <div class="act-comp-t"><div class="act-comp-f" style="width:${comp}%;background:${compC}"></div></div>
          <span class="act-comp-p" style="color:${compC}">${comp}%</span>
        </div>
        <div class="sec-body"><div class="at-wrap"><table class="at">
          <thead><tr><th>Parameter</th><th>Target</th><th>Actual</th><th>Gap</th></tr></thead>
          <tbody>${acts.map(a=>{const gap=Number(a.gap||0);return`<tr><td>${a.param}</td><td>${a.target}</td><td style="color:var(--text);font-weight:700">${a.actual}</td><td class="${gap>0?'g-neg':gap<0?'g-pos':''}">${gap>0?'+':''}${gap}</td></tr>`;}).join('')}</tbody>
        </table></div></div>
      </div>
    </div>
    <!-- Ledger -->
    <div style="background:rgba(255,255,255,.7);border-radius:16px;border:1.5px solid var(--gb);overflow:hidden;margin-bottom:12px">
      <div class="ch" onclick="toggleSec(this)" style="border-top:none"><span class="ch-title">Transaction Ledger</span><div class="ch-btn">+</div></div>
      <div class="cb">
        <div class="sec-body">
          <div class="mf">${['ALL',...ledMonths].map(m=>`<button class="mp ${m==='ALL'?'on':''}" data-m="${m}" onclick="renderLedger('${m}',this)">${m==='ALL'?'All':m}</button>`).join('')}</div>
          <div class="led-wrap"><table class="lt">
            <colgroup><col class="c-client"><col class="c-asset"><col class="c-month"><col class="c-pur"><col class="c-red"><col class="c-net"></colgroup>
            <thead><tr><th class="l">Client</th><th class="l">Asset</th><th class="l">Month</th><th>Purchase</th><th>Redemption</th><th>Net</th></tr></thead>
            <tbody class="led-tbody"></tbody>
          </table></div>
        </div>
        ${buildSparkline(ledger)}
      </div>
    </div>
    <!-- Snapshot -->
    <div style="background:rgba(255,255,255,.7);border-radius:16px;border:1.5px solid var(--gb);overflow:hidden">
      <div style="padding:11px 16px;background:rgba(255,255,255,.45);border-bottom:1px solid rgba(200,210,240,.4);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub)">Snapshot</div>
      <div class="sec-body">${[
        {l:'AUM',    v:n(rm.aum)+'Cr',    t:fJ(j,'aum').target||rm.aumTarget||0, a:rm.aum,    c:'var(--blue)'},
        {l:'Revenue',v:n(rm.revenue)+'Cr', t:fJ(j,'rev').target||rm.revTarget||0, a:rm.revenue,c:'var(--purple)'},
        {l:'Net Mob',v:n(rm.netMob)+'Cr',  t:fJ(j,'net').target||0,               a:rm.netMob, c:'var(--green)'},
        {l:'M50',    v:String(rm.m50||0),  t:fJ(j,'m50').target||0,               a:rm.m50||0, c:'var(--amber)'},
        {l:'SIP',    v:n(rm.sip)+'L',      t:fJ(j,'sip').target||0,               a:rm.sip,    c:'var(--cyan)'},
      ].map(s=>{const pp=s.t?pct(s.a,s.t):null;return`<div class="snap-item"><div class="snap-l">${s.l}</div><div class="snap-row"><span class="snap-v" style="color:${s.c}">${s.v}</span>${pp!==null?`<span class="snap-pct" style="background:${pb(pp)};color:${pc(pp)}">${pp}%</span>`:''}</div>${pp!==null?`<div class="snap-bt"><div class="snap-bf" style="width:${pp}%;background:${pc(pp)}"></div></div>`:''}</div>`;}).join('')}
      </div>
    </div>
  </div>`;
}

/* ═══ LOAD ═══ */
async function load(silent=false){
  try{
    const res=await fetch('data/performance.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    data=Array.isArray(json)?json:(json.rms||[]);
    if(!data.length) throw new Error('Empty');
    buildQtr(); buildTeamSC(); buildLB(); buildRisk();
    buildGrid(); buildMobTabs();
    if(!silent) openMobRM(0);
    const d=data[0]?.lastUpdated?new Date(data[0].lastUpdated):new Date();
    document.getElementById('updated-tag').innerHTML=`<span class="live-dot"></span>${isNaN(d)?'Live':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){console.error(e);}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});
hideSplash();
load();
setInterval(()=>load(true),300000);
</script>
