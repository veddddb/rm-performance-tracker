<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Piyush | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-slate-100 p-4 md:p-10">
    
    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-12 border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">
                TEAM PIYUSH
            </h1>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-widest mt-1">HNI/UHNI Wealth Management</p>
        </div>
        <div class="text-right">
            <p id="current-month" class="text-xl font-bold text-white"></p>
            <p class="text-slate-500 text-xs uppercase tracking-widest">FY 2026-27</p>
        </div>
    </nav>

    <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
        <p class="text-slate-500 animate-pulse">Synchronizing performance data...</p>
    </div>

    <script>
        // Set Current Month
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('current-month').innerText = months[new Date().getMonth()];

        async function fetchPerformance() {
            try {
                const response = await fetch('data/performance.json');
                const data = await response.json();
                const grid = document.getElementById('dashboard-grid');
                grid.innerHTML = '';

                data.forEach(rm => {
                    grid.innerHTML += `
                        <div class="glass-card p-6 rounded-3xl hover:scale-[1.02] transition-transform duration-300">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-xl font-bold text-white">${rm.name}</h2>
                                <span class="h-2 w-2 rounded-full bg-emerald-400 shadow-[0_0_10px_#34d399]"></span>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-1">AUM Actual</p>
                                    <p class="text-lg font-bold text-blue-400">₹${Number(rm.aumActual).toLocaleString()}</p>
                                </div>
                                
                                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-1">Revenue YTD</p>
                                    <p class="text-lg font-bold text-indigo-400">₹${Number(rm.revActual).toLocaleString()}</p>
                                </div>

                                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-1">Net Mob</p>
                                    <p class="text-lg font-bold text-emerald-400">₹${Number(rm.netMobActual).toLocaleString()}</p>
                                </div>

                                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-1">Mission 50</p>
                                    <p class="text-lg font-bold text-amber-400">₹${Number(rm.mission50Actual).toLocaleString()}</p>
                                </div>
                            </div>

                            <div class="mt-6 pt-4 border-t border-slate-800 flex justify-between items-center">
                                <p class="text-[9px] text-slate-600 uppercase">Last Sync: ${rm.lastUpdated || 'Recently'}</p>
                                <button class="text-[10px] text-blue-400 font-bold hover:underline">VIEW FULL BOOK</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading data:", error);
            }
        }

        fetchPerformance();
    </script>
</body>
</html>
