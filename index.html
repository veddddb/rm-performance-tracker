<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Team Piyush | Private Banking</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233d5af1'/><stop offset='1' stop-color='%237c3aed'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-size='15' font-weight='700' fill='white'>TP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --g1:#dce8ff;--g2:#ece4ff;--g3:#fde8f8;--g4:#ffe8d6;
  --glass:rgba(255,255,255,0.46);
  --glass-h:rgba(255,255,255,0.64);
  --glass-s:rgba(255,255,255,0.80);
  --gb:rgba(255,255,255,0.74);
  --gb2:rgba(200,210,240,0.45);
  --gs:0 8px 32px rgba(80,90,180,.09),0 1px 0 rgba(255,255,255,.85) inset;
  --gsm:0 14px 48px rgba(80,90,180,.13),0 1px 0 rgba(255,255,255,.90) inset;
  --gsl:0 22px 72px rgba(80,90,180,.17),0 1px 0 rgba(255,255,255,.95) inset;
  --text:#141629;--sub:#454878;--muted:#8890b8;
  --blue:#3d5af1;--blue-l:rgba(61,90,241,.11);
  --green:#15803d;--green-l:rgba(21,128,61,.10);
  --amber:#b45309;--amber-l:rgba(180,83,9,.10);
  --red:#b91c1c;--red-l:rgba(185,28,28,.09);
  --purple:#6d28d9;--purple-l:rgba(109,40,217,.10);
  --cyan:#0e7490;--cyan-l:rgba(14,116,144,.10);
  --r:16px;--rs:10px;--sb:252px;--tb:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;
  background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 35%,var(--g3) 65%,var(--g4) 100%);
  background-attachment:fixed;color:var(--text);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* BLOBS */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;will-change:transform}
.b1{width:640px;height:640px;top:-180px;left:-160px;background:radial-gradient(circle,rgba(168,196,255,.60) 0%,rgba(200,170,255,.30) 55%,transparent 75%);animation:b1m 20s ease-in-out infinite}
.b2{width:560px;height:560px;bottom:-140px;right:-100px;background:radial-gradient(circle,rgba(255,190,235,.55) 0%,rgba(255,180,200,.25) 55%,transparent 75%);animation:b2m 26s ease-in-out infinite}
.b3{width:380px;height:380px;top:45%;left:45%;background:radial-gradient(circle,rgba(168,220,255,.38) 0%,transparent 65%);animation:b3m 18s ease-in-out infinite}
.b4{width:280px;height:280px;top:20%;right:20%;background:radial-gradient(circle,rgba(255,220,168,.35) 0%,transparent 65%);animation:b4m 24s ease-in-out infinite}
@keyframes b1m{0%,100%{transform:translate(0,0) scale(1)}30%{transform:translate(55px,38px) scale(1.06)}65%{transform:translate(-28px,55px) scale(.95)}}
@keyframes b2m{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-48px,-42px) scale(1.07)}70%{transform:translate(36px,-52px) scale(.94)}}
@keyframes b3m{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(38px,-28px) scale(1.10)}}
@keyframes b4m{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-30px,24px) scale(1.08)}}

/* TOPBAR */
.topbar{
  height:var(--tb);flex-shrink:0;position:relative;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,255,255,.60);backdrop-filter:blur(28px) saturate(1.9);
  -webkit-backdrop-filter:blur(28px) saturate(1.9);
  border-bottom:1.5px solid var(--gb);box-shadow:0 2px 24px rgba(80,90,180,.07);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#3d5af1,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 4px 14px rgba(61,90,241,.40);position:relative;overflow:hidden;
}
.brand-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%)}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
.brand-sep{width:1px;height:15px;background:var(--gb2)}
.brand-sub{font-size:12px;color:var(--muted)}
.tbr{display:flex;align-items:center;gap:8px}
.chip{font-size:10px;font-weight:600;padding:4px 12px;border-radius:99px;letter-spacing:.05em;text-transform:uppercase}
.chip-blue{background:var(--blue-l);color:var(--blue);border:1px solid rgba(61,90,241,.22)}
.chip-glass{background:rgba(255,255,255,.65);color:var(--sub);border:1.5px solid var(--gb);backdrop-filter:blur(8px)}
.chip-amber{background:var(--amber-l);color:var(--amber);border:1px solid rgba(180,83,9,.22)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:pulse 2.4s ease-in-out infinite;display:inline-block;margin-right:4px;vertical-align:middle}

/* DESKTOP SHELL */
.shell{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{
  width:var(--sb);flex-shrink:0;
  background:rgba(255,255,255,.42);
  backdrop-filter:blur(24px) saturate(1.7);-webkit-backdrop-filter:blur(24px) saturate(1.7);
  border-right:1.5px solid var(--gb);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-top{padding:14px 14px 10px;border-bottom:1px solid var(--gb2);flex-shrink:0}
.sb-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

/* Quarter countdown */
.qtr-card{
  background:linear-gradient(135deg,rgba(61,90,241,.09) 0%,rgba(124,58,237,.06) 100%);
  border:1.5px solid rgba(61,90,241,.18);border-radius:var(--rs);
  padding:10px 12px;margin-bottom:10px;
}
.qtr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.qtr-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blue)}
.qtr-days{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue)}
.qtr-bar-track{height:4px;background:rgba(61,90,241,.15);border-radius:2px;overflow:hidden}
.qtr-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .8s ease}
.qtr-sub{font-size:9px;color:var(--muted);margin-top:4px}

/* Mini scorecard */
.mini-grid{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.mini-row{display:flex;justify-content:space-between;align-items:center}
.mini-l{font-size:11px;color:var(--sub);font-weight:500}
.mini-v{font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text)}

/* Leaderboard */
.lb-section{padding:0 14px 10px;border-bottom:1px solid var(--gb2);flex-shrink:0}
.lb-row{
  display:flex;align-items:center;gap:8px;padding:7px 0;
  border-bottom:1px solid rgba(200,210,240,.3);cursor:pointer;
  transition:background .15s;border-radius:6px;padding:6px 6px;margin:0 -6px;
}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,.5)}
.lb-rank{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:var(--muted);width:14px;text-align:center;flex-shrink:0}
.lb-rank.top{color:var(--amber)}
.lb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lb-name{font-size:11px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-bar-wrap{width:50px;flex-shrink:0}
.lb-bar-track{height:3px;background:rgba(180,190,230,.3);border-radius:2px;overflow:hidden}
.lb-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.lb-pct{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;width:28px;text-align:right;flex-shrink:0}

/* Risk flags */
.risk-section{padding:10px 14px;border-bottom:1px solid var(--gb2);flex-shrink:0}
.risk-flag{
  display:flex;align-items:flex-start;gap:7px;padding:6px 8px;
  background:rgba(185,28,28,.07);border:1px solid rgba(185,28,28,.18);
  border-radius:7px;margin-bottom:4px;cursor:pointer;transition:background .15s;
}
.risk-flag:last-child{margin-bottom:0}
.risk-flag:hover{background:rgba(185,28,28,.12)}
.risk-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:3px}
.risk-text{font-size:10px;color:var(--red);line-height:1.4;font-weight:500}
.risk-none{font-size:10px;color:var(--green);padding:4px 6px;display:flex;align-items:center;gap:5px}

/* RM list */
.rm-wrap{flex:1;overflow-y:auto;padding:8px}
.rm-wrap::-webkit-scrollbar{width:3px}
.rm-wrap::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}
.rm-btn{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;
  padding:9px 10px;border-radius:var(--rs);margin-bottom:3px;
  border:1.5px solid transparent;transition:all .22s cubic-bezier(.4,0,.2,1);
}
.rm-btn:hover{background:rgba(255,255,255,.55);border-color:var(--gb);box-shadow:var(--gs)}
.rm-btn.active{background:rgba(255,255,255,.82);border-color:rgba(61,90,241,.26);box-shadow:0 6px 24px rgba(61,90,241,.13)}
.rm-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rm-info{flex:1;min-width:0}
.rm-n{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rm-a{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.rm-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.rm-badge{font-size:8px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 6px;border-radius:99px}
/* Activity donut (inline SVG canvas) */
.rm-donut{width:26px;height:26px;flex-shrink:0}

/* DETAIL PANEL */
.detail{flex:1;overflow-y:auto;padding:20px 22px}
.detail::-webkit-scrollbar{width:5px}
.detail::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:5px}
.empty-st{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px}
.empty-icon{width:60px;height:60px;border-radius:18px;background:rgba(255,255,255,.55);backdrop-filter:blur(10px);border:1.5px solid var(--gb);box-shadow:var(--gs);display:flex;align-items:center;justify-content:center}

/* MOBILE SHELL */
.mob-shell{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.mob-tabs{display:flex;overflow-x:auto;flex-shrink:0;background:rgba(255,255,255,.54);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1.5px solid var(--gb);padding:0 6px;scrollbar-width:none}
.mob-tabs::-webkit-scrollbar{display:none}
.mob-tab{flex-shrink:0;padding:0 14px;height:46px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2.5px solid transparent;transition:all .2s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.mob-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.mob-tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.mob-tab.active .mob-tab-dot{transform:scale(1.4)}
.mob-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 28px}
.mob-scroll::-webkit-scrollbar{display:none}

/* DETAIL CONTENT */
.d-inner{display:none}
.d-inner.on{display:block;animation:fadeUp .3s cubic-bezier(.4,0,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes shimmerIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}

/* HEADER CARD */
.dh{
  border-radius:var(--r);padding:20px 22px 18px;margin-bottom:14px;
  background:var(--glass-s);backdrop-filter:blur(32px) saturate(2.2);
  -webkit-backdrop-filter:blur(32px) saturate(2.2);
  border:1.5px solid rgba(255,255,255,.92);box-shadow:var(--gsl);
  position:relative;overflow:hidden;
}
.dh::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rm-col,#3d5af1),rgba(124,58,237,.6),transparent)}
.dh::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 55%);pointer-events:none}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;position:relative;z-index:1}
.dh-name{font-size:21px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.dh-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px;line-height:1.7}
.dh-tag{font-size:10px;font-weight:600;padding:5px 13px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;background:rgba(255,255,255,.72);border:1.5px solid var(--gb)}

/* Risk alert inside header */
.dh-risk{
  background:rgba(185,28,28,.08);border:1.5px solid rgba(185,28,28,.22);
  border-radius:var(--rs);padding:9px 12px;margin-bottom:14px;
  position:relative;z-index:1;animation:shimmerIn .5s ease both;
  display:flex;align-items:flex-start;gap:8px;
}
.dh-risk-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.dh-risk-text{font-size:11px;color:var(--red);font-weight:500;line-height:1.5}

/* Target banner */
.target-banner{
  background:linear-gradient(135deg,rgba(61,90,241,.08) 0%,rgba(124,58,237,.06) 100%);
  border:1.5px solid rgba(61,90,241,.18);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px;
  position:relative;z-index:1;animation:shimmerIn .6s ease both;
}
.target-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.target-label::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}
.target-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.target-item-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px}
.target-item-v{font-size:15px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:-.02em}
.target-item-u{font-size:9px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.target-item-rr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

/* KPI strip */
.dh-kpis{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--gb2);padding-top:14px;position:relative;z-index:1}
.dh-kpi:not(:first-child){padding-left:14px;border-left:1px solid var(--gb2);margin-left:14px}
.dh-kpi-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}
.dh-kpi-v{font-size:19px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.dh-kpi-u{font-size:10px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:2px;font-weight:500}

/* Projection row */
.proj-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin-top:12px;padding-top:12px;border-top:1px solid var(--gb2);
  position:relative;z-index:1;
}
.proj-item{background:rgba(255,255,255,.45);border-radius:8px;padding:8px 10px;border:1px solid var(--gb)}
.proj-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.proj-v{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
.proj-sub{font-size:9px;color:var(--muted);margin-top:1px}

/* TWO COL GRID */
.dgrid{display:grid;grid-template-columns:1fr 252px;gap:14px}
.dcol{display:flex;flex-direction:column;gap:14px}

/* SECTION CARD */
.sec{
  border-radius:var(--r);overflow:hidden;background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.6);-webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1.5px solid var(--gb);box-shadow:var(--gs);
  transition:box-shadow .24s,transform .24s;animation:fadeUp .28s cubic-bezier(.4,0,.2,1) both;
}
.sec:hover{box-shadow:var(--gsm);transform:translateY(-1px)}
.sec-head{padding:12px 18px;background:rgba(255,255,255,.38);border-bottom:1px solid var(--gb2);display:flex;justify-content:space-between;align-items:center}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
.sec-badge{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.sec-body{padding:14px 18px}
.sec-flush{padding:0}

/* SPARKLINE */
.sparkline-section{padding:12px 18px;border-top:1px solid var(--gb2)}
.spark-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.spark-wrap{display:flex;align-items:flex-end;gap:3px;height:32px}
.spark-bar{flex:1;border-radius:3px 3px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1);min-height:2px;position:relative;cursor:default}
.spark-bar:hover .spark-tip{display:block}
.spark-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(20,22,41,.85);color:#fff;font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:4px;white-space:nowrap;z-index:10}
.spark-labels{display:flex;gap:3px;margin-top:4px}
.spark-ml{flex:1;font-size:8px;color:var(--muted);text-align:center;font-family:'DM Mono',monospace;overflow:hidden;text-overflow:clip}

/* ON-TRACK BADGE in journey */
.track-badge{display:inline-block;font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}

/* JOURNEY TABLE */
.jt-wrap{overflow-x:auto;padding:0 18px}
.jt-wrap::-webkit-scrollbar{height:3px}
.jt-wrap::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}
.jt{width:100%;border-collapse:collapse;min-width:560px}
.jt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 12px 11px 0;border-bottom:1.5px solid var(--gb2);text-align:left;white-space:nowrap}
.jt th.r{text-align:right;padding-right:0}
.jt td{padding:12px 12px 12px 0;border-bottom:1px solid var(--gb2);vertical-align:middle}
.jt tr:last-child td{border-bottom:none}
.j-label{font-size:13px;font-weight:600}
.j-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--sub)}
.j-rr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.j-actual{font-size:15px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.j-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:6px}
.jbt{height:4px;border-radius:2px;background:rgba(180,190,230,.28);overflow:hidden;margin-bottom:3px;min-width:90px}
.jbf{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.j-newrr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.j-proj{font-size:10px;font-family:'DM Mono',monospace;font-weight:600;display:block;margin-top:2px}
.r{text-align:right}

/* MOBILE JOURNEY CARDS */
.jcards{display:flex;flex-direction:column;gap:10px;padding:14px 18px}
.jcard{border-radius:var(--rs);padding:13px 14px;background:rgba(255,255,255,.58);border:1.5px solid var(--gb);box-shadow:0 3px 14px rgba(80,90,180,.07);animation:fadeUp .28s ease both}
.jcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.jcard-label{font-size:13px;font-weight:700;color:var(--text)}
.jcard-pill{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:6px}

/* PLAN TABLE */
.plan-wrap{overflow-x:auto;padding:0 18px}

.plan-wrap::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}
.pt{width:100%;border-collapse:collapse;min-width:440px}
.pt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 11px 0;border-bottom:1.5px solid var(--gb2);text-align:right}
.pt th:first-child{text-align:left}
.pt td{padding:11px 10px 11px 0;border-bottom:1px solid var(--gb2);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.pt td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-weight:600;font-size:13px}
.pt td:nth-child(2){text-align:left;font-family:'Outfit',sans-serif;font-size:12px;padding-right:14px}
.pt tr:last-child td{border-bottom:none}

/* ACTIVITY TABLE */
.at-wrap{overflow-x:auto}
.at-wrap::-webkit-scrollbar{height:3px}

.at{width:100%;border-collapse:collapse;min-width:300px}
.at th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 11px 0;border-bottom:1.5px solid var(--gb2);text-align:right}
.at th:first-child{text-align:left}
.at td{padding:10px 10px 10px 0;border-bottom:1px solid var(--gb2);text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--sub)}
.at td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-weight:600;font-size:13px}

.g-neg{color:var(--red)!important;font-weight:700}

/* Activity completion bar */
.act-completion{display:flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(255,255,255,.3);border-top:1px solid var(--gb2)}
.act-comp-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap}

/* COLLAPSIBLE */
.ch{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:13px 18px;background:rgba(255,255,255,.30);border-top:1px solid var(--gb2);user-select:none;transition:background .18s}

.lt .tot-row td{font-weight:700;font-family:'DM Mono',monospace;border-top:1.5px solid var(--gb2);padding-top:12px;border-bottom:none}
.lt .tot-row td.l{font-family:'Outfit',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.mf{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.mp{font-size:10px;font-weight:500;padding:4px 12px;border-radius:99px;border:1.5px solid var(--gb2);color:var(--sub);background:rgba(255,255,255,.42);transition:all .18s}
.mp:hover{background:rgba(255,255,255,.7);color:var(--text)}
.mp.on{border-color:rgba(61,90,241,.55);color:var(--blue);background:var(--blue-l);font-weight:700}

/* SNAPSHOT */
.snap-item{padding:11px 0;border-bottom:1px solid var(--gb2)}
.snap-item:last-child{border-bottom:none}

.snap-row{display:flex;justify-content:space-between;align-items:baseline}
.snap-v{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.snap-pct{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 8px;border-radius:99px}
.snap-bt{height:4px;border-radius:2px;background:rgba(180,190,230,.28);overflow:hidden;margin-top:7px}
.snap-bf{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}

/* LEVERAGE */

/* SKELETON */
@keyframes sk{0%,100%{opacity:.22}50%{opacity:.48}}

  body{overflow:hidden}

<body>

<script>
/* ═══════════════ STATE ═══════════════ */
let data=[], activeLedger=[], activeRM=-1;
const COLORS=['#3d5af1','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];
const MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MO3=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const now=new Date(), curM=MO[now.getMonth()], curY=now.getFullYear();

/* ═══════════════ HELPERS ═══════════════ */
const n=(v,d=2)=>Number(v||0).toFixed(d);
const pct=(v,t)=>(!t?0:Math.min(100,Math.round(v/t*100)));
function pc(p){return p>=90?'var(--green)':p>=60?'var(--amber)':'var(--red)'}
function pb(p){return p>=90?'var(--green-l)':p>=60?'var(--amber-l)':'var(--red-l)'}
function probCls(p){return p>=70?'p-hi':p>=40?'p-md':'p-lo'}
function short(nm){const p=nm.trim().split(' ');return p.length>1?p[0]+' '+p[p.length-1][0]+'.':nm}
function fJ(j,kw){return(j||[]).find(m=>m.label.toLowerCase().includes(kw.toLowerCase()))||{target:0,actual:0,monthlyRunRate:0,newRunRate:0}}
function unit(lbl){const l=lbl.toLowerCase();if(l.includes('sip'))return 'L';if(l.includes('m50')||l.includes('mission'))return '';return 'Cr'}

/* ═══════════════ QUARTER LOGIC ═══════════════ */
function getQtrInfo(){
  const m=now.getMonth(); // 0-indexed
  // Indian FY: Q1=Apr-Jun(3-5), Q2=Jul-Sep(6-8), Q3=Oct-Dec(9-11), Q4=Jan-Mar(0-2)
  let qEnd;
  if(m>=3&&m<=5)      {qEnd=new Date(curY,5,30);  return{q:'Q1',qEnd}}
  else if(m>=6&&m<=8)  {qEnd=new Date(curY,8,30);  return{q:'Q2',qEnd}}
  else if(m>=9&&m<=11) {qEnd=new Date(curY,11,31); return{q:'Q3',qEnd}}
  else                  {qEnd=new Date(curY,2,31);  return{q:'Q4',qEnd}}
}

function buildQtrCard(){
  const {q,qEnd}=getQtrInfo();
  const daysLeft=Math.max(0,Math.ceil((qEnd-now)/(1000*60*60*24)));
  const qDur=92; // approx days per quarter
  const elapsed=Math.max(0,qDur-daysLeft);
  const progPct=Math.min(100,Math.round(elapsed/qDur*100));
  document.getElementById('qtr-chip').textContent=q;
  document.getElementById('qtr-card').innerHTML=`
    <div class="qtr-top">
      <span class="qtr-label">${q} · ${curY}</span>
      <span class="qtr-days">${daysLeft}d left</span>
    </div>
    <div class="qtr-bar-track"><div class="qtr-bar-fill" style="width:${progPct}%"></div></div>
    <div class="qtr-sub">${progPct}% of quarter elapsed</div>`;
}

/* ═══════════════ PROJECTION ═══════════════ */
// Months remaining in FY from current month
function monthsRemaining(){
  const m=now.getMonth(); // 0-indexed
  // FY ends March (month 2). If Apr(3)..Mar(2)
  if(m>=3) return 3+12-m; // Apr=11, May=10, ... Mar=1
  else return 3-m;        // Jan=2, Feb=1, Mar=0 (shouldn't reach Mar as 0)
}

function projectYE(actual, newRunRate){
  const rem=monthsRemaining();
  return actual + newRunRate*rem;
}

/* ═══════════════ ACTIVITY COMPLETION ═══════════════ */
function actCompletion(acts){
  const valid=acts.filter(a=>a.param!==''&&Number(a.target||0)>0);
  if(!valid.length) return 0;
  const hit=valid.filter(a=>Number(a.gap||0)<=0).length;
  return Math.round(hit/valid.length*100);
}

/* ═══════════════ RISK FLAGS ═══════════════ */
function computeFlags(rm){
  const flags=[];
  const acts=(rm.activity||[]).filter(a=>a.param!==''&&Number(a.target||0)>0);
  const pending=acts.filter(a=>Number(a.gap||0)>0).length;
  if(pending>=3) flags.push(`${pending} activity gaps pending`);

  const j=rm.journey||[];
  const newRR=fJ(j,'aum').newRunRate||0, origRR=fJ(j,'aum').monthlyRunRate||0;
  if(origRR>0&&newRR>origRR*1.5) flags.push(`AUM run rate ${Math.round(newRR/origRR*100)}% of original`);

  const aumP=pct(fJ(j,'aum').actual||rm.aum, fJ(j,'aum').target||rm.aumTarget||0);
  if(aumP<40) flags.push(`AUM only ${aumP}% of annual target`);
  return flags;
}

/* ═══════════════ SPARKLINE ═══════════════ */
function sparklineHTML(ledger, color){
  if(!ledger||!ledger.length) return '';
  // Group net by month, last 6 months that appear
  const byMonth={};
  ledger.forEach(l=>{if(l.month&&l.month!=='Unspecified') byMonth[l.month]=(byMonth[l.month]||0)+Number(l.net||0)});
  const months=Object.keys(byMonth);
  if(months.length<2) return '';
  const recent=months.slice(-6);
  const vals=recent.map(m=>byMonth[m]);
  const maxV=Math.max(...vals.map(Math.abs),1);
  const maxH=32;
  return `<div class="sparkline-section">
    <div class="spark-label">Net Mobilization by Month (Cr)</div>
    <div class="spark-wrap">
      ${vals.map((v,i)=>{
        const h=Math.round(Math.abs(v)/maxV*maxH)||2;
        const col=v>=0?'var(--green)':'var(--red)';
        return `<div class="spark-bar" style="height:${h}px;background:${col};opacity:.75">
          <span class="spark-tip">${recent[i]}: ${n(v)}Cr</span>
        </div>`;
      }).join('')}
    </div>
    <div class="spark-labels">
      ${recent.map(m=>`<span class="spark-ml">${m.substring(0,3)}</span>`).join('')}
    </div>
  </div>`;
}

/* ═══════════════ DONUT SVG ═══════════════ */
function donutSVG(pctVal, color){
  const r=10, circ=2*Math.PI*r, dash=circ*(pctVal/100), gap=circ-dash;
  return `<svg viewBox="0 0 26 26" class="rm-donut">
    <circle cx="13" cy="13" r="${r}" fill="none" stroke="rgba(180,190,230,.3)" stroke-width="3"/>
    <circle cx="13" cy="13" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
      stroke-linecap="round" transform="rotate(-90 13 13)"/>
  </svg>`;
}

/* ═══════════════ MINI SCORECARD ═══════════════ */
function buildMini(){
  const tot=f=>data.reduce((s,r)=>s+Number(r[f]||0),0);
  document.getElementById('mini-grid').innerHTML=[
    {l:'AUM',    v:n(tot('aum'))+'Cr'},
    {l:'Revenue',v:n(tot('revenue'))+'Cr'},
    {l:'Net Mob',v:n(tot('netMob'))+'Cr'},
    {l:'SIP',    v:n(tot('sip'))+'L'},
    {l:'M50',    v:tot('m50')},
  ].map(r=>`<div class="mini-row"><span class="mini-l">${r.l}</span><span class="mini-v">${r.v}</span></div>`).join('');
}

/* ═══════════════ LEADERBOARD ═══════════════ */
function buildLeaderboard(){
  const sorted=[...data].map((rm,i)=>({rm,i,p:pct(fJ(rm.journey||[],'aum').actual||rm.aum, fJ(rm.journey||[],'aum').target||rm.aumTarget||0)}))
    .sort((a,b)=>b.p-a.p);
  document.getElementById('lb-list').innerHTML=sorted.map((item,rank)=>`
    <div class="lb-row" onclick="openRM(${item.i})">
      <span class="lb-rank ${rank<3?'top':''}">${rank+1}</span>
      <span class="lb-dot" style="background:${COLORS[item.i]}"></span>
      <span class="lb-name">${short(item.rm.name)}</span>
      <div class="lb-bar-wrap">
        <div class="lb-bar-track">
          <div class="lb-bar-fill" style="width:${item.p}%;background:${pc(item.p)}"></div>
        </div>
      </div>
      <span class="lb-pct" style="color:${pc(item.p)}">${item.p}%</span>
    </div>`).join('');
}

/* ═══════════════ RISK FLAGS ═══════════════ */
function buildRiskFlags(){
  const allFlags=data.flatMap((rm,i)=>computeFlags(rm).map(f=>({rm,i,f})));
  if(!allFlags.length){
    document.getElementById('risk-list').innerHTML=`<div class="risk-none"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block"></span>No flags</div>`;
    return;
  }
  document.getElementById('risk-list').innerHTML=allFlags.slice(0,4).map(({rm,i,f})=>`
    <div class="risk-flag" onclick="openRM(${i})">
      <div class="risk-dot"></div>
      <div class="risk-text"><strong>${short(rm.name)}</strong>: ${f}</div>
    </div>`).join('');
}

/* ═══════════════ RM LIST ═══════════════ */
function buildRMList(){
  document.getElementById('rm-list').innerHTML=data.map((rm,i)=>{
    const j=rm.journey||[], aj=fJ(j,'aum');
    const p=pct(aj.actual||rm.aum, aj.target||rm.aumTarget||0);
    const comp=actCompletion(rm.activity||[]);
    return `<button class="rm-btn" id="rmb-${i}" onclick="openRM(${i})">
      <div class="rm-dot" style="background:${COLORS[i]}"></div>
      <div class="rm-info">
        <div class="rm-n">${short(rm.name)}</div>
        <div class="rm-a">${n(rm.aum)}Cr · Act ${comp}%</div>
      </div>
      <div class="rm-right">
        ${(aj.target||rm.aumTarget)?`<span class="rm-badge" style="background:${pb(p)};color:${pc(p)}">${p}%</span>`:''}
        ${donutSVG(comp, pc(comp))}

}

/* ═══════════════ TABS ═══════════════ */

/* ═══════════════ TARGET BANNER ═══════════════ */
function targetBannerHTML(j,rm){

/* ═══════════════ PROJECTION ROW ═══════════════ */
function projRowHTML(j,rm){
  const rem=monthsRemaining();
  const metrics=[
    {l:'AUM YE Proj',    a:fJ(j,'aum').actual||rm.aum,     rr:fJ(j,'aum').newRunRate||0,     t:fJ(j,'aum').target||rm.aumTarget||0,     u:'Cr'},
    {l:'Rev YE Proj',    a:fJ(j,'rev').actual||rm.revenue,  rr:fJ(j,'rev').newRunRate||0,     t:fJ(j,'rev').target||rm.revTarget||0,     u:'Cr'},
    {l:'Net Mob Proj',   a:fJ(j,'net').actual||rm.netMob,   rr:fJ(j,'net').newRunRate||0,     t:fJ(j,'net').target||0,                   u:'Cr'},
  ];
  return `<div class="proj-row">
    ${metrics.map(m=>{
      const ye=projectYE(m.a,m.rr);
      const p=pct(ye,m.t);
      const col=pc(p);
      return `<div class="proj-item">
        <div class="proj-l">${m.l}</div>
        <div class="proj-v" style="color:${col}">${n(ye)}${m.u}</div>
        <div class="proj-sub" style="color:${col}">${p}% of target · ${rem}mo left</div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ═══════════════ JOURNEY TABLE (desktop) ═══════════════ */
function jtableHTML(rows){
  const rem=monthsRemaining();
  return `<div class="jt-wrap"><table class="jt">
    <thead><tr>
      <th style="width:80px">Metric</th>
      <th>Annual Target<br><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px">Monthly RR</span></th>
      <th class="r">YTD Actual</th>
      <th class="r">On Track?</th>
      <th class="r">vs Target</th>
      <th style="width:110px">Progress</th>
      <th class="r">New RR / YE Proj</th>
    </tr></thead>
    <tbody>
      ${rows.map(m=>{
        const p=pct(m.actual,m.target), c=pc(p), bg=pb(p);
        const u=unit(m.label);
        const ye=projectYE(m.actual,m.newRunRate);
        const yeP=pct(ye,m.target);
        const yeC=pc(yeP);
        // On-track: is current pace (actual/elapsed months) >= monthly run rate target?
        const elapsed=12-monthsRemaining();
        const mthRate=elapsed>0?m.actual/elapsed:0;
        const onTrack=m.monthlyRunRate>0&&mthRate>=m.monthlyRunRate*0.9;
        const trackColor=onTrack?'var(--green)':'var(--red)';
        const trackBg=onTrack?'var(--green-l)':'var(--red-l)';
        return `<tr>
          <td><span class="j-label">${m.label}</span></td>
          <td>
            <div class="j-sub">${n(m.target)}${u}</div>
            <div class="j-rr">${n(m.monthlyRunRate)}${u}/mo</div>
          </td>
          <td class="r"><span class="j-actual" style="color:${c}">${n(m.actual)}${u}</span></td>
          <td class="r">
            <span class="track-badge" style="background:${trackBg};color:${trackColor}">
              ${onTrack?'✓ On track':'✗ Behind'}
            </span>
          </td>
          <td class="r"><span class="j-pill" style="background:${bg};color:${c}">${p}%</span></td>
          <td>
            <div class="jbt"><div class="jbf" style="width:${p}%;background:${c}"></div></div>
            <div class="j-newrr">RR: ${n(m.newRunRate)}${u}/mo</div>
          </td>
          <td class="r">
            <span class="j-sub">${n(m.newRunRate)}${u}/mo</span>
            <span class="j-proj" style="color:${yeC}">YE: ${n(ye)}${u} (${yeP}%)</span>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

/* ═══════════════ JOURNEY CARDS (mobile) ═══════════════ */
function jcardsHTML(rows){
  return `<div class="jcards">
    ${rows.map(m=>{
      const p=pct(m.actual,m.target), c=pc(p), bg=pb(p);
      const u=unit(m.label);
      const ye=projectYE(m.actual,m.newRunRate);
      const yeP=pct(ye,m.target), yeC=pc(yeP);
      const elapsed=12-monthsRemaining();
      const mthRate=elapsed>0?m.actual/elapsed:0;
      const onTrack=m.monthlyRunRate>0&&mthRate>=m.monthlyRunRate*0.9;
      return `<div class="jcard">
        <div class="jcard-head">
          <span class="jcard-label">${m.label}</span>
          <span class="jcard-pill" style="background:${bg};color:${c}">${p}%</span>
        </div>
        <div class="jcard-cols">
          <div>
            <div class="jcard-stat-l">YTD Actual</div>
            <div class="jcard-stat-v" style="color:${c}">${n(m.actual)}${u?`<span class="jcard-stat-u">${u}</span>`:''}</div>
            ${m.monthlyRunRate?`<div class="jcard-stat-rr"><span style="background:${onTrack?'var(--green-l)':'var(--red-l)'};color:${onTrack?'var(--green)':'var(--red)'};padding:1px 5px;border-radius:4px;font-size:8px;font-weight:700">${onTrack?'On track':'Behind'}</span></div>`:''}
          </div>
          <div>
            <div class="jcard-stat-l">Annual Target</div>
            <div class="jcard-stat-v" style="color:var(--blue)">${n(m.target)}${u?`<span class="jcard-stat-u">${u}</span>`:''}</div>
            ${m.monthlyRunRate?`<div class="jcard-stat-rr">${n(m.monthlyRunRate)}${u}/mo</div>`:''}
          </div>
        </div>
        <div class="jbar-t"><div class="jbar-f" style="width:${p}%;background:${c}"></div></div>
        <div class="jcard-foot">
          <span class="jcard-foot-l">New RR</span>
          <span class="jcard-foot-v" style="color:${c}">${n(m.newRunRate)}${u}/mo</span>

/* ═══════════════ ACTIVITY HTML ═══════════════ */
function activityHTML(rm){
  const acts=(rm.activity||[]).filter(a=>a.param!=='');
  if(!acts.length) return `<div style="padding:18px;font-size:12px;color:var(--muted)">No activity data</div>`;
  const comp=actCompletion(acts);
  const compCol=pc(comp);
  return `<div class="act-completion">
      <span class="act-comp-label">Completion</span>
      <div class="act-comp-track"><div class="act-comp-fill" style="width:${comp}%;background:${compCol}"></div></div>
      <span class="act-comp-pct" style="color:${compCol}">${comp}%</span>
    </div>
    <div class="sec-body"><div class="at-wrap"><table class="at">
    <thead><tr><th>Parameter</th><th>Target</th><th>Actual MTD</th><th>Gap</th></tr></thead>
    <tbody>
      ${acts.map(a=>{
        const gap=Number(a.gap||0);
        return `<tr>
          <td>${a.param}</td>
          <td>${a.target}</td>
          <td style="color:var(--text);font-weight:700">${a.actual}</td>
          <td class="${gap>0?'g-neg':gap<0?'g-pos':''}">${gap>0?'+':''}${gap}</td>

}

/* ═══════════════ SNAP + LEV HTML ═══════════════ */
function snapHTML(j,rm){
  return [
    {l:'AUM',    v:n(rm.aum)+'Cr',    t:fJ(j,'aum').target||rm.aumTarget||0,   a:rm.aum,    c:'var(--blue)'},
    {l:'Revenue',v:n(rm.revenue)+'Cr', t:fJ(j,'rev').target||rm.revTarget||0,   a:rm.revenue,c:'var(--purple)'},
    {l:'Net Mob',v:n(rm.netMob)+'Cr',  t:fJ(j,'net').target||0,                 a:rm.netMob, c:'var(--green)'},
    {l:'M50',    v:String(rm.m50||0),  t:fJ(j,'m50').target||fJ(j,'mission').target||0, a:rm.m50||0, c:'var(--amber)'},
    {l:'SIP',    v:n(rm.sip)+'L',      t:fJ(j,'sip').target||0,                 a:rm.sip,    c:'var(--cyan)'},
  ].map(s=>{
    const p=s.t?pct(s.a,s.t):null;
    return `<div class="snap-item">
      <div class="snap-l">${s.l}</div>
      <div class="snap-row">
        <span class="snap-v" style="color:${s.c}">${s.v}</span>
        ${p!==null?`<span class="snap-pct" style="background:${pb(p)};color:${pc(p)}">${p}%</span>`:''}
      </div>
      ${p!==null?`<div class="snap-bt"><div class="snap-bf" style="width:${p}%;background:${pc(p)}"></div></div>`:''}
    </div>`;
  }).join('');
}
function levHTML(rm){
  const l=(rm.leverage||[]).filter(x=>x.label!=='');
  if(!l.length) return '';
  return l.map(x=>{
    const isP=String(x.label).toLowerCase().includes('penetration')||String(x.label).includes('%');
    const raw=Number(x.value||0);
    const val=isP?(raw<=1?(raw*100).toFixed(2):raw.toFixed(2))+'%':x.value;
    return `<div class="lev-row"><span class="lev-l">${x.label}</span><span class="lev-v" style="${isP?'color:var(--green)':''}">${val}</span></div>`;
  }).join('');
}

/* ═══════════════ LEDGER ═══════════════ */
function renderLedger(filter,btn){
  if(btn) btn.closest('.mf').querySelectorAll('.mp').forEach(b=>b.classList.toggle('on',b===btn));
  const rows=filter==='ALL'?activeLedger:activeLedger.filter(l=>l.month===filter);
  const totP=rows.reduce((s,l)=>s+Number(l.purchase||0),0);
  const totR=rows.reduce((s,l)=>s+Number(l.redemption||0),0);
  const totN=rows.reduce((s,l)=>s+Number(l.net||0),0);
  const dataRows=rows.map(l=>{
    const net=Number(l.net||0);
    return `<tr>
      <td class="l">${l.client}</td><td class="l2">${l.asset}</td><td class="l2">${l.month}</td>
      <td class="col-pur">${n(l.purchase)}</td>
      <td class="col-red">${n(l.redemption)}</td>
      <td class="${net>=0?'col-pos':'col-neg'}">${n(net)}</td>
    </tr>`;
  }).join('');
  const totRow=`<tr class="tot-row">
    <td class="l" colspan="3">${filter==='ALL'?'Grand Total':filter+' Total'}</td>
    <td class="col-pur">${n(totP)}</td><td class="col-red">${n(totR)}</td>
    <td class="${totN>=0?'col-pos':'col-neg'}">${n(totN)}</td>
  </tr>`;
  document.querySelectorAll('.led-tbody').forEach(el=>el.innerHTML=dataRows+totRow);
}

/* ═══════════════ BUILD DETAIL ═══════════════ */

    {label:'Net Mob',target:0,              monthlyRunRate:0,actual:rm.netMob,  newRunRate:0},
    {label:'M50',    target:0,              monthlyRunRate:0,actual:rm.m50||0,  newRunRate:0},
    {label:'SIP',    target:0,              monthlyRunRate:0,actual:rm.sip,     newRunRate:0},
  ];
  const flags=computeFlags(rm);

  return `<div class="d-inner on" style="--rm-col:${col}">
    <div class="dh" style="--rm-col:${col}">
      <div class="dh-top">
        <div>
          <div class="dh-name" style="color:${col}">${rm.name}</div>
          <div class="dh-sub">Ledger Net ₹${n(rm.ledgerTotal||0)}Cr &nbsp;·&nbsp; Plan ₹${n(rm.planTotalAmt||0)}Cr &nbsp;·&nbsp; Wtd ₹${n(rm.planWeighted||0)}Cr</div>
        </div>
        <span class="dh-tag" style="color:${col}">${curM} ${curY}</span>
      </div>
      ${flags.length?`<div class="dh-risk"><div class="dh-risk-icon">⚠</div><div class="dh-risk-text">${flags.join(' &nbsp;·&nbsp; ')}</div></div>`:''}
      ${targetBannerHTML(j,rm)}
      ${projRowHTML(j,rm)}
      <div class="dh-kpis" style="margin-top:14px">
        <div class="dh-kpi">
          <div class="dh-kpi-l">Net Mob</div>
          <div class="dh-kpi-v" style="color:var(--green)">${n(rm.netMob)}<span class="dh-kpi-u">Cr</span></div>
        </div>
        <div class="dh-kpi">
          <div class="dh-kpi-l">Mission 50</div>
          <div class="dh-kpi-v" style="color:var(--amber)">${rm.m50||0}</div>
        </div>
        <div class="dh-kpi">
          <div class="dh-kpi-l">SIP Book</div>
          <div class="dh-kpi-v" style="color:var(--cyan)">${n(rm.sip)}<span class="dh-kpi-u">L</span></div>
        </div>
      </div>
    </div>

    <div class="dgrid">
      <div class="dcol">
        <div class="sec" style="animation-delay:.04s">
          <div class="sec-head"><span class="sec-title">FY 2026–27 · Annual Journey</span></div>
          <div class="sec-flush">${isMob?jcardsHTML(jrows):jtableHTML(jrows)}</div>
        </div>
        <div class="sec" style="animation-delay:.08s">
          <div class="sec-head">
            <span class="sec-title">${curM} ${curY} — Monthly Plan</span>
            <span class="sec-badge">${(rm.plan||[]).length?'Wtd ₹'+n(rm.planWeighted||0)+'Cr':''}</span>
          </div>
          <div class="sec-flush">${planHTML(rm)}</div>
        </div>
        <div class="sec" style="animation-delay:.12s">
          <div class="ch" onclick="toggleSec(this)">
            <span class="ch-title">Monthly Activity Tracker</span>
            <div class="ch-btn">+</div>
          </div>
          <div class="cb">${activityHTML(rm)}</div>
        </div>
        <div class="sec" style="animation-delay:.16s">
          <div class="ch" onclick="toggleSec(this)">
            <span class="ch-title">Transaction Ledger</span>
            <div class="ch-btn">+</div>
          </div>
          <div class="cb">
            <div class="sec-body">
              <div class="mf">
                ${['ALL',...ledMonths].map(m=>`<button class="mp ${m==='ALL'?'on':''}" data-m="${m}" onclick="renderLedger('${m}',this)">${m==='ALL'?'All':m}</button>`).join('')}
              </div>
              <div class="led-wrap"><table class="lt">
                <colgroup>
                  <col class="c-client"><col class="c-asset"><col class="c-month">
                  <col class="c-pur"><col class="c-red"><col class="c-net">

                  <th class="l">Client</th><th class="l">Asset</th><th class="l">Month</th>
                  <th>Purchase</th><th>Redemption</th><th>Net</th>

                <tbody class="led-tbody"></tbody>
              </table></div>
            </div>
          </div>
          ${sparklineHTML(ledger, col)}

      </div>

      <div class="dcol" style="animation-delay:.06s">
        <div class="sec">
          <div class="sec-head"><span class="sec-title">Snapshot</span></div>
          <div class="sec-body">${snapHTML(j,rm)}</div>
        </div>
        ${lev?`<div class="sec">
          <div class="sec-head"><span class="sec-title">Leverage</span></div>

        </div>`:''}
      </div>
    </div>
  </div>`;
}

/* ═══════════════ COLLAPSIBLE ═══════════════ */
function toggleSec(hdr){
  const body=hdr.nextElementSibling, btn=hdr.querySelector('.ch-btn');
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  btn.textContent=open?'+':'×';
  btn.classList.toggle('open',!open);
}

/* ═══════════════ OPEN RM ═══════════════ */
function openRM(idx){
  if(activeRM===idx) return;
  activeRM=idx;
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.rm-btn').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('empty-state').style.display='none';
  document.getElementById('desktop-content').innerHTML=buildDetail(data[idx],idx,false);
  document.getElementById('desktop-detail').scrollTo({top:0,behavior:'smooth'});
  renderLedger('ALL',null);
}
function openMobRM(idx){
  activeRM=idx;
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.mob-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('mob-content').innerHTML=buildDetail(data[idx],idx,true);
  document.getElementById('mob-scroll').scrollTo({top:0,behavior:'smooth'});
  renderLedger('ALL',null);
  const tab=document.getElementById('tab-'+idx);
  if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

/* ═══════════════ LOAD ═══════════════ */
async function load(silent=false){
  try{
    const res=await fetch('data/performance.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    data=Array.isArray(json)?json:(json.rms||[]);
    if(!data.length) throw new Error('Empty');
    buildQtrCard();
    buildMini();
    buildLeaderboard();
    buildRiskFlags();
    buildRMList();
    buildTabs();
    if(!silent){openRM(0);openMobRM(0);}
    const d=data[0]?.lastUpdated?new Date(data[0].lastUpdated):new Date();
    document.getElementById('updated-tag').innerHTML=`<span class="live-dot"></span>${isNaN(d)?'Live':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    ['rm-list','mob-tabs'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.innerHTML=`<div style="padding:14px;font-size:12px;color:var(--red)">Failed to load</div>`;
    });
    console.error(e);
  }
}
load();
setInterval(()=>load(true),300000);
</script>
