<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Piyush | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s; cursor: pointer; }
        .glass-card:hover { transform: translateY(-4px); }
        .modal-container { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 100; overflow-y: auto; padding: 20px; }
        .stat-sidebar { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col items-center mb-16 border-b border-slate-800 pb-10 text-center">
            <h1 class="text-xl font-bold tracking-[0.4em] text-slate-500 uppercase mb-4">Team Piyush</h1>
            <p id="month-display" class="text-6xl font-black italic uppercase text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-500 tracking-tighter"></p>
            <p id="fy-display" class="text-blue-500 text-xs font-black tracking-[0.5em] mt-4 uppercase"></p>
        </header>

        <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <div id="modal" class="modal-container">
        <div class="max-w-7xl mx-auto bg-slate-900 border border-slate-800 rounded-[2.5rem] shadow-2xl overflow-hidden mt-10 mb-10">
            <div class="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <h2 id="modal-name" class="text-3xl font-black text-white tracking-tighter uppercase"></h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white font-black text-sm uppercase border border-slate-700 px-6 py-2 rounded-full transition-colors">Close</button>
            </div>
            
            <div class="flex flex-col lg:flex-row gap-8 p-8 md:p-12">
                <div class="flex-1 space-y-12">
                    <section>
                        <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest">Monthly Plan Pipeline</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-xs text-left">
                                <thead class="text-slate-500 border-b border-slate-800 uppercase font-bold text-[9px]">
                                    <tr><th class="pb-3">Client Name</th><th>Asset</th><th class="text-right">Amt (L)</th><th class="text-right">Prob %</th></tr>
                                </thead>
                                <tbody id="plan-rows" class="divide-y divide-slate-800/50 text-slate-300"></tbody>
                            </table>
                        </div>
                    </section>

                    <section>
                        <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest">Activity Tracker</h3>
                        <table class="w-full text-xs text-left">
                            <thead class="text-slate-500 border-b border-slate-800 text-[9px] uppercase font-bold"><tr><th class="pb-3">Parameter</th><th>Target</th><th>Actual</th></tr></thead>
                            <tbody id="activity-rows" class="divide-y divide-slate-800/50 text-slate-300"></tbody>
                        </table>
                    </section>

                    <section class="bg-slate-800/20 p-6 rounded-3xl border border-slate-800">
                        <div class="flex justify-between items-center cursor-pointer" onclick="toggleLedger()">
                            <div>
                                <h3 class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Net Mobilization Ledger</h3>
                                <p class="text-[11px] text-slate-400 mt-1 italic">Total Net Mob till date: <span id="ledger-total-preview" class="text-white font-bold"></span></p>
                            </div>
                            <span id="ledger-toggle-icon" class="text-xl text-slate-500 transition-transform">⊕</span>
                        </div>
                        <div id="ledger-content" class="hidden mt-8 overflow-x-auto">
                            <table class="w-full text-[10px] text-left">
                                <thead class="text-slate-600 border-b border-slate-800 font-bold uppercase"><tr><th class="pb-3">Client</th><th>Asset</th><th>Purchase</th><th>Redemp</th><th class="text-right">Net</th></tr></thead>
                                <tbody id="ledger-rows" class="divide-y divide-slate-800/30 text-slate-400"></tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <div class="w-full lg:w-96 space-y-8">
                    <div class="stat-sidebar p-8">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase mb-8 tracking-widest text-center text-blue-400">Performance Dashboard</h3>
                        <div class="space-y-6">
                            <div><p class="text-[9px] font-bold text-slate-600 uppercase mb-1">AUM Actual</p><p id="stat-aum" class="text-2xl font-black text-white"></p></div>
                            <div><p class="text-[9px] font-bold text-slate-600 uppercase mb-1">Revenue YTD</p><p id="stat-rev" class="text-2xl font-black text-white"></p></div>
                            <div><p class="text-[9px] font-bold text-slate-600 uppercase mb-1">Net Mobilization</p><p id="stat-net" class="text-2xl font-black text-white"></p></div>
                            <div><p class="text-[9px] font-bold text-slate-600 uppercase mb-1">Mission 50</p><p id="stat-m50" class="text-2xl font-black text-white"></p></div>
                        </div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-[24px] p-8">
                        <h3 class="text-[10px] font-black text-blue-500 uppercase mb-6 tracking-widest">Leverage Tracker</h3>
                        <table class="w-full text-xs text-left">
                            <tbody id="leverage-rows" class="divide-y divide-slate-800 text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = [];
        const rmColors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#06b6d4'];
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        document.getElementById('month-display').innerText = months[new Date().getMonth()];
        document.getElementById('fy-display').innerText = `Financial Year 2026-27`;

        async function load() {
            const res = await fetch('data/performance.json?t=' + Date.now());
            data = await res.json();
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map((rm, i) => `
                <div class="glass-card p-8 rounded-[2rem]" style="border-top: 4px solid ${rmColors[i]}" onclick="openRM(${i})">
                    <div class="flex justify-between items-start mb-8">
                        <h2 class="text-2xl font-black text-white tracking-tighter uppercase">${rm.name}</h2>
                        <div class="h-3 w-3 rounded-full" style="background-color: ${rmColors[i]}; box-shadow: 0 0 15px ${rmColors[i]}99"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-1">AUM</p><p class="text-xl font-black text-white">${Number(rm.aum).toFixed(2)}<span class="text-xs text-slate-500 ml-1">Cr</span></p></div>
                        <div><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-1">Revenue</p><p class="text-xl font-black text-white">${Number(rm.revenue).toFixed(2)}<span class="text-xs text-slate-500 ml-1">L</span></p></div>
                        <div><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-1">Net Mob</p><p class="text-xl font-black text-white">${Number(rm.netMob).toFixed(2)}<span class="text-xs text-slate-500 ml-1">Cr</span></p></div>
                        <div><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-1">M50</p><p class="text-xl font-black text-white">${rm.m50}</p></div>
                    </div>
                </div>
            `).join('');
        }

        function openRM(i) {
            const rm = data[i];
            document.getElementById('modal-name').innerText = rm.name;
            document.getElementById('stat-aum').innerText = `₹${Number(rm.aum).toFixed(2)} Cr`;
            document.getElementById('stat-rev').innerText = `₹${Number(rm.revenue).toFixed(2)} L`;
            document.getElementById('stat-net').innerText = `₹${Number(rm.netMob).toFixed(2)} Cr`;
            document.getElementById('stat-m50').innerText = rm.m50;
            document.getElementById('ledger-total-preview').innerText = `₹${Number(rm.netMob).toFixed(2)} Cr`;

            document.getElementById('plan-rows').innerHTML = rm.plan.map(p => `<tr><td class="py-3 font-bold text-white">${p.client}</td><td>${p.asset}</td><td class="text-right text-blue-400 font-mono">₹${p.amt}L</td><td class="text-right">${(p.prob * 100).toFixed(0)}%</td></tr>`).join('');
            document.getElementById('activity-rows').innerHTML = rm.activity.map(a => `<tr><td class="py-3 text-slate-300 font-semibold">${a.param}</td><td class="text-slate-500">${a.target}</td><td class="text-blue-400 font-black">${a.actual}</td></tr>`).join('');
            
            // Percentage Formatting Logic for G15
            document.getElementById('leverage-rows').innerHTML = rm.leverage.map(l => {
                const isPercent = l.label.includes('%') || l.label.toLowerCase().includes('penetration');
                const displayValue = isPercent ? (l.value * 100).toFixed(2) + '%' : l.value;
                return `<tr><td class="py-3 text-slate-500 uppercase text-[10px] font-bold">${l.label}</td><td class="text-right font-black ${isPercent ? 'text-emerald-400' : ''}">${displayValue}</td></tr>`;
            }).join('');

            document.getElementById('ledger-rows').innerHTML = rm.ledger.map(l => `<tr><td class="py-3 font-bold text-white">${l.client}</td><td>${l.asset}</td><td>${l.purchase}</td><td>${l.redemption}</td><td class="text-right text-emerald-400 font-bold">${l.net}</td></tr>`).join('');

            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function toggleLedger() {
            const content = document.getElementById('ledger-content');
            const icon = document.getElementById('ledger-toggle-icon');
            const isHidden = content.classList.toggle('hidden');
            icon.innerText = isHidden ? '⊕' : '⊖';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        load();
    </script>
</body>
</html>
