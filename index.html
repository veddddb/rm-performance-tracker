<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Team Piyush | Private Banking</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════ TOKENS ═══════════════ */
:root {
  --bg-from:#dde8ff; --bg-mid:#ece5ff; --bg-to:#ffdff5;
  --glass:        rgba(255,255,255,0.48);
  --glass-hover:  rgba(255,255,255,0.66);
  --glass-strong: rgba(255,255,255,0.82);
  --glass-header: rgba(255,255,255,0.38);
  --gb: rgba(255,255,255,0.72);
  --gs: 0 8px 32px rgba(100,100,180,.10), 0 1px 0 rgba(255,255,255,.85) inset;
  --gsm:0 14px 48px rgba(100,100,180,.14), 0 1px 0 rgba(255,255,255,.9) inset;
  --gsl:0 24px 72px rgba(100,100,180,.18), 0 1px 0 rgba(255,255,255,.95) inset;
  --bd: rgba(200,210,240,.45);
  --bd2:rgba(180,190,230,.65);
  --text:#141629; --sub:#454878; --muted:#8890b8;
  --blue:#3d5af1;  --blue-l:rgba(61,90,241,.11);
  --green:#16a34a; --green-l:rgba(22,163,74,.12);
  --amber:#d97706; --amber-l:rgba(217,119,6,.12);
  --red:#dc2626;   --red-l:rgba(220,38,38,.10);
  --purple:#7c3aed;--purple-l:rgba(124,58,237,.11);
  --cyan:#0891b2;  --cyan-l:rgba(8,145,178,.12);
  --r:16px; --rs:10px;
  --sidebar:236px; --topbar:56px;
}

/* ═══════════════ RESET ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Outfit',sans-serif;
  min-height:100vh; height:100vh; overflow:hidden;
  background:linear-gradient(135deg,var(--bg-from) 0%,var(--bg-mid) 50%,var(--bg-to) 100%);
  background-attachment:fixed;
  color:var(--text);-webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ═══════════════ BLOBS ═══════════════ */
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;will-change:transform}
.blob-1{
  width:700px;height:700px;top:-200px;left:-200px;
  background:radial-gradient(circle,rgba(180,200,255,.55) 0%,rgba(210,180,255,.3) 60%,transparent 80%);
  animation:blob1 18s ease-in-out infinite;
}
.blob-2{
  width:600px;height:600px;bottom:-150px;right:-100px;
  background:radial-gradient(circle,rgba(255,200,230,.5) 0%,rgba(255,180,200,.25) 60%,transparent 80%);
  animation:blob2 22s ease-in-out infinite;
}
.blob-3{
  width:400px;height:400px;top:40%;left:40%;
  background:radial-gradient(circle,rgba(180,230,255,.35) 0%,transparent 70%);
  animation:blob3 16s ease-in-out infinite;
}
@keyframes blob1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,40px) scale(1.05)}66%{transform:translate(-30px,60px) scale(.96)}}
@keyframes blob2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-50px,-40px) scale(1.06)}66%{transform:translate(40px,-60px) scale(.95)}}
@keyframes blob3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.08)}}

/* ═══════════════ TOPBAR ═══════════════ */
.topbar{
  height:var(--topbar);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,255,255,.58);
  backdrop-filter:blur(24px) saturate(1.8);
  -webkit-backdrop-filter:blur(24px) saturate(1.8);
  border-bottom:1.5px solid var(--gb);
  box-shadow:0 2px 20px rgba(100,100,180,.08);
  position:relative;z-index:100;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#3d5af1 0%,#7c3aed 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em;
  box-shadow:0 4px 14px rgba(61,90,241,.38);
}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
.brand-sep{width:1px;height:15px;background:var(--bd2)}
.brand-sub{font-size:12px;color:var(--muted);font-weight:400}
.topbar-r{display:flex;align-items:center;gap:8px}
.chip{font-size:10px;font-weight:600;padding:4px 12px;border-radius:99px;letter-spacing:.05em;text-transform:uppercase}
.chip-blue{background:var(--blue-l);color:var(--blue);border:1px solid rgba(61,90,241,.2)}
.chip-glass{background:rgba(255,255,255,.6);color:var(--muted);border:1.5px solid var(--gb);backdrop-filter:blur(6px)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2.2s infinite;display:inline-block;margin-right:4px;vertical-align:middle}

/* ═══════════════ SHELL ═══════════════ */
.shell{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}

/* ═══════════════ SIDEBAR ═══════════════ */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:rgba(255,255,255,.4);
  backdrop-filter:blur(22px) saturate(1.6);
  -webkit-backdrop-filter:blur(22px) saturate(1.6);
  border-right:1.5px solid var(--gb);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-top{padding:16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.mini-grid{display:flex;flex-direction:column;gap:6px}
.mini-row{display:flex;justify-content:space-between;align-items:center}
.mini-l{font-size:11px;color:var(--sub);font-weight:500}
.mini-v{font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text)}
.rm-list-wrap{flex:1;overflow-y:auto;padding:8px}
.rm-list-wrap::-webkit-scrollbar{width:3px}
.rm-list-wrap::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.rm-btn{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:11px 12px;border-radius:var(--rs);
  border:1.5px solid transparent;margin-bottom:3px;
  transition:all .2s cubic-bezier(.4,0,.2,1);background:transparent;
}
.rm-btn:hover{background:rgba(255,255,255,.55);border-color:var(--gb);box-shadow:var(--gs)}
.rm-btn.active{
  background:rgba(255,255,255,.80);border-color:rgba(61,90,241,.28);
  box-shadow:0 6px 24px rgba(61,90,241,.14);
}
.rm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rm-info{flex:1;min-width:0}
.rm-n{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rm-a{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.rm-pct-badge{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 7px;border-radius:99px;flex-shrink:0}

/* ═══════════════ DETAIL PANEL ═══════════════ */
.detail{flex:1;overflow-y:auto;padding:22px 24px;position:relative}
.detail::-webkit-scrollbar{width:5px}
.detail::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:5px}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px;color:var(--muted);
}
.empty-icon{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}

/* ═══════════════ MOBILE SHELL ═══════════════ */
.mob-shell{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.mob-tabs{
  display:flex;overflow-x:auto;flex-shrink:0;
  background:rgba(255,255,255,.52);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1.5px solid var(--gb);
  padding:0 8px;gap:0;scrollbar-width:none;
}
.mob-tabs::-webkit-scrollbar{display:none}
.mob-tab{
  flex-shrink:0;padding:0 14px;height:46px;
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:500;color:var(--muted);
  border-bottom:2.5px solid transparent;
  transition:all .18s cubic-bezier(.4,0,.2,1);white-space:nowrap;
  position:relative;
}
.mob-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.mob-tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:transform .2s}
.mob-tab.active .mob-tab-dot{transform:scale(1.3)}
.mob-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px;padding-bottom:24px}
.mob-scroll::-webkit-scrollbar{display:none}

/* ═══════════════ DETAIL CONTENT ═══════════════ */
.d-inner{display:none;animation:fadeUp .28s cubic-bezier(.4,0,.2,1) both}
.d-inner.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* Header card */
.dh{
  border-radius:var(--r);padding:22px 24px;margin-bottom:16px;
  background:var(--glass-strong);
  backdrop-filter:blur(32px) saturate(2.2);
  -webkit-backdrop-filter:blur(32px) saturate(2.2);
  border:1.5px solid rgba(255,255,255,.92);
  box-shadow:var(--gsl);
  position:relative;overflow:hidden;
}
.dh::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%);
  pointer-events:none;
}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;position:relative}
.dh-name{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.dh-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:5px;line-height:1.7}
.dh-tag{
  font-size:10px;font-weight:600;padding:5px 13px;border-radius:99px;
  text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;
  background:rgba(255,255,255,.7);border:1.5px solid var(--gb);
  backdrop-filter:blur(6px);
}
/* Target hero banner */
.target-banner{
  background:linear-gradient(135deg,rgba(61,90,241,.08) 0%,rgba(124,58,237,.06) 100%);
  border:1.5px solid rgba(61,90,241,.18);
  border-radius:var(--rs);padding:14px 16px;margin-bottom:16px;
  position:relative;
}
.target-banner-label{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.target-banner-label::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue)}
.target-items{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.target-item{}
.target-item-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
.target-item-v{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;color:var(--blue)}
.target-item-u{font-size:9px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:2px;font-weight:500}
.target-item-rr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

/* KPI strip */
.dh-kpis{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--bd);padding-top:16px;position:relative}
.dh-kpi:not(:first-child){padding-left:16px;border-left:1px solid var(--bd);margin-left:16px}
.dh-kpi-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.dh-kpi-v{font-size:20px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.dh-kpi-u{font-size:10px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:2px;font-weight:500}

/* Two col grid */
.dgrid{display:grid;grid-template-columns:1fr 252px;gap:14px}
.dcol{display:flex;flex-direction:column;gap:14px}

/* ═══════════════ SECTION CARD ═══════════════ */
.sec{
  border-radius:var(--r);overflow:hidden;
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.6);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1.5px solid var(--gb);
  box-shadow:var(--gs);
  transition:box-shadow .22s;
  animation:fadeUp .28s cubic-bezier(.4,0,.2,1) both;
}
.sec:hover{box-shadow:var(--gsm)}
.sec-head{
  padding:13px 18px;
  background:var(--glass-header);
  border-bottom:1px solid var(--bd);
  display:flex;justify-content:space-between;align-items:center;
}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
.sec-badge{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.sec-body{padding:16px 18px}
.sec-flush{padding:0 18px}

/* ═══════════════ JOURNEY — mobile card list ═══════════════ */
.journey-cards{display:flex;flex-direction:column;gap:10px}
.jcard{
  border-radius:var(--rs);padding:14px 16px;
  background:rgba(255,255,255,.55);
  border:1.5px solid var(--gb);
  box-shadow:0 3px 12px rgba(100,100,180,.07);
}
.jcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.jcard-label{font-size:13px;font-weight:600;color:var(--text)}
.jcard-pill{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:6px}
.jcard-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.jcard-stat{}
.jcard-stat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:2px}
.jcard-stat-v{font-size:16px;font-weight:800;font-family:'DM Mono',monospace}
.jcard-stat-rr{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.jcard-bar-track{height:5px;border-radius:3px;background:rgba(180,190,230,.28);overflow:hidden}
.jcard-bar-fill{height:100%;border-radius:3px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.jcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.jcard-newrr-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.jcard-newrr-v{font-size:11px;font-family:'DM Mono',monospace;font-weight:600}

/* ═══════════════ DESKTOP JOURNEY TABLE ═══════════════ */
.jt{width:100%;border-collapse:collapse}
.jt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 11px 0;border-bottom:1.5px solid var(--bd);text-align:left;white-space:nowrap}
.jt th.r{text-align:right}
.jt td{padding:12px 10px 12px 0;border-bottom:1px solid var(--bd);vertical-align:middle}
.jt tr:last-child td{border-bottom:none}
.j-label{font-size:13px;font-weight:600}
.j-target{font-size:12px;font-family:'DM Mono',monospace;color:var(--sub)}
.j-rr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.j-actual{font-size:15px;font-weight:800;font-family:'DM Mono',monospace}
.j-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:6px}
.j-bar-t{height:4px;border-radius:2px;overflow:hidden;background:rgba(180,190,230,.28);margin-bottom:3px}
.j-bar-f{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.j-newrr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.r{text-align:right}

/* ═══════════════ PLAN TABLE ═══════════════ */
.pt{width:100%;border-collapse:collapse}
.pt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 8px 11px 0;border-bottom:1.5px solid var(--bd);text-align:right}
.pt th:first-child{text-align:left}
.pt td{padding:11px 8px 11px 0;border-bottom:1px solid var(--bd);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.pt td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-weight:600;font-size:13px}
.pt td:nth-child(2){text-align:left;font-family:'Outfit',sans-serif;font-size:12px}
.pt tr:last-child td{border-bottom:none}
.pt tfoot td{font-weight:700;color:var(--text);font-family:'DM Mono',monospace;border-top:1.5px solid var(--bd);padding-top:12px;border-bottom:none;font-size:12px}
.pt tfoot td:first-child{font-family:'Outfit',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.prob-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:5px}
.p-hi{background:var(--green-l);color:var(--green)}
.p-md{background:var(--amber-l);color:var(--amber)}
.p-lo{background:var(--red-l);color:var(--red)}

/* ═══════════════ ACTIVITY TABLE ═══════════════ */
.at{width:100%;border-collapse:collapse}
.at th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 8px 11px 0;border-bottom:1.5px solid var(--bd);text-align:right}
.at th:first-child{text-align:left}
.at td{padding:10px 8px 10px 0;border-bottom:1px solid var(--bd);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.at td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-weight:600;font-size:13px}
.at tr:last-child td{border-bottom:none}
.g-neg{color:var(--red);font-weight:700}
.g-pos{color:var(--green);font-weight:700}

/* ═══════════════ COLLAPSIBLE ═══════════════ */
.ch{
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;
  padding:13px 18px;background:rgba(255,255,255,.32);border-top:1px solid var(--bd);
  user-select:none;transition:background .18s;
}
.ch:hover{background:rgba(255,255,255,.52)}
.ch-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub)}
.ch-icon{
  width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.7);
  border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted);transition:transform .22s cubic-bezier(.4,0,.2,1);font-weight:300;
}
.ch-icon.open{transform:rotate(45deg)}
.cb{display:none}
.cb.open{display:block;animation:fadeUp .2s ease both}

/* ═══════════════ LEDGER ═══════════════ */
.mf{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.mp{font-size:10px;font-weight:500;padding:4px 12px;border-radius:99px;border:1.5px solid var(--bd2);color:var(--sub);transition:.18s;background:rgba(255,255,255,.4)}
.mp:hover{background:rgba(255,255,255,.7);color:var(--text)}
.mp.on{border-color:rgba(61,90,241,.55);color:var(--blue);background:var(--blue-l);font-weight:700}
.lt{width:100%;border-collapse:collapse}
.lt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 0 11px;border-bottom:1.5px solid var(--bd);text-align:right}
.lt th:first-child,.lt th:nth-child(2),.lt th:nth-child(3){text-align:left}
.lt td{padding:9px 0;border-bottom:1px solid var(--bd);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:11px}
.lt td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-size:12px;font-weight:500}
.lt td:nth-child(2),.lt td:nth-child(3){text-align:left;font-family:'Outfit',sans-serif;font-size:12px}
.lt tr:last-child td{border-bottom:none}
.lt .tot td{font-weight:700;color:var(--text);font-family:'DM Mono',monospace;border-top:1.5px solid var(--bd);padding-top:12px;border-bottom:none}
.lt .tot td:first-child{font-family:'Outfit',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em}

/* ═══════════════ SNAPSHOT ═══════════════ */
.snap-item{padding:12px 0;border-bottom:1px solid var(--bd)}
.snap-item:last-child{border-bottom:none}
.snap-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.snap-row{display:flex;justify-content:space-between;align-items:baseline}
.snap-v{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.snap-pct{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 8px;border-radius:99px}
.snap-bar-t{height:4px;border-radius:2px;overflow:hidden;background:rgba(180,190,230,.28);margin-top:7px}
.snap-bar-f{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}

/* ═══════════════ LEVERAGE ═══════════════ */
.lev-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.lev-row:last-child{border-bottom:none}
.lev-l{font-size:11px;color:var(--sub);font-weight:500}
.lev-v{font-size:12px;font-family:'DM Mono',monospace;font-weight:700}

/* ═══════════════ SCROLL X (mobile tables) ═══════════════ */
.sx{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sx::-webkit-scrollbar{height:3px}
.sx::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ═══════════════ SKELETON ═══════════════ */
@keyframes sk{0%,100%{opacity:.25}50%{opacity:.5}}
.skel{border-radius:var(--rs);background:rgba(180,190,230,.45);animation:sk 1.6s infinite}

/* ═══════════════ KEYFRAMES ═══════════════ */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(min-width:641px){
  .mob-shell{display:none!important}
  .shell{display:flex!important}
}
@media(max-width:640px){
  .shell{display:none!important}
  .mob-shell{display:flex!important}
  body{overflow:hidden}
  .brand-sep,.brand-sub{display:none}
  .dh{padding:16px}
  .dh-name{font-size:18px}
  .dh-kpis{grid-template-columns:repeat(3,1fr)}
  .dh-kpi:not(:first-child){padding-left:10px;margin-left:10px}
  .dh-kpi-v{font-size:17px}
  .dgrid{grid-template-columns:1fr}
  /* Target banner mobile: 2+3 grid */
  .target-items{grid-template-columns:repeat(2,1fr)}
  .target-item:nth-child(1){grid-column:1/-1}
}
@media(max-width:900px) and (min-width:641px){
  :root{--sidebar:188px}
  .dgrid{grid-template-columns:1fr}
  .target-items{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">TP</div>
    <span class="brand-name">Team Piyush</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">Private Banking</span>
  </div>
  <div class="topbar-r">
    <span class="chip chip-blue">FY 2026–27</span>
    <span class="chip chip-glass" id="updated-tag"><span class="live-dot"></span>Loading…</span>
  </div>
</div>

<!-- DESKTOP SHELL -->
<div class="shell" id="desktop-shell">
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-label">Team Totals</div>
      <div class="mini-grid" id="mini-grid">
        <div class="skel" style="height:14px"></div>
        <div class="skel" style="height:14px"></div>
        <div class="skel" style="height:14px"></div>
        <div class="skel" style="height:14px"></div>
      </div>
    </div>
    <div class="rm-list-wrap" id="rm-list">
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
    </div>
  </div>
  <div class="detail" id="desktop-detail">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      </div>
      <div style="font-size:13px;color:var(--muted)">Select an RM to view their dashboard</div>
    </div>
    <div id="desktop-content"></div>
  </div>
</div>

<!-- MOBILE SHELL -->
<div class="mob-shell" id="mob-shell">
  <div class="mob-tabs" id="mob-tabs">
    <div class="skel" style="width:90px;height:32px;margin:7px 4px;flex-shrink:0"></div>
    <div class="skel" style="width:90px;height:32px;margin:7px 4px;flex-shrink:0"></div>
    <div class="skel" style="width:90px;height:32px;margin:7px 4px;flex-shrink:0"></div>
  </div>
  <div class="mob-scroll" id="mob-scroll">
    <div id="mob-content"></div>
  </div>
</div>

<script>
let data=[], activeLedger=[], activeRM=-1;
const COLORS=['#3d5af1','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];
const MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
const curM=MO[new Date().getMonth()], curY=new Date().getFullYear();

/* ── Helpers ── */
const n=(v,d=2)=>Number(v||0).toFixed(d);
const pct=(v,t)=>(!t?0:Math.min(100,Math.round(v/t*100)));
function pc(p){return p>=90?'var(--green)':p>=60?'var(--amber)':'var(--red)'}
function pb(p){return p>=90?'var(--green-l)':p>=60?'var(--amber-l)':'var(--red-l)'}
function probCls(p){return p>=70?'p-hi':p>=40?'p-md':'p-lo'}
function short(nm){const p=nm.trim().split(' ');return p.length>1?p[0]+' '+p[p.length-1][0]+'.':nm}
function fJ(j,kw){return(j||[]).find(m=>m.label.toLowerCase().includes(kw.toLowerCase()))||{target:0,actual:0,monthlyRunRate:0,newRunRate:0}}

/* ── Unit label helper ── */
function unit(label){
  const l=label.toLowerCase();
  if(l.includes('sip')) return 'L';
  if(l.includes('m50')||l.includes('mission')) return '';
  return 'Cr';
}

/* ── Mini scorecard ── */
function buildMini(){
  const tot=f=>data.reduce((s,r)=>s+Number(r[f]||0),0);
  document.getElementById('mini-grid').innerHTML=[
    {l:'AUM',    v:n(tot('aum'))+'Cr'},
    {l:'Revenue',v:n(tot('revenue'))+'Cr'},
    {l:'Net Mob',v:n(tot('netMob'))+'Cr'},
    {l:'SIP',    v:n(tot('sip'))+'L'},
    {l:'M50',    v:tot('m50')},
  ].map(r=>`<div class="mini-row"><span class="mini-l">${r.l}</span><span class="mini-v">${r.v}</span></div>`).join('');
}

/* ── Desktop RM list ── */
function buildRMList(){
  document.getElementById('rm-list').innerHTML=data.map((rm,i)=>{
    const j=rm.journey||[], aj=fJ(j,'aum'), p=pct(aj.actual||rm.aum, aj.target||rm.aumTarget||0);
    const col=COLORS[i], bg=pb(p), tc=pc(p);
    return `<button class="rm-btn" id="rmb-${i}" onclick="openRM(${i})">
      <div class="rm-dot" style="background:${col}"></div>
      <div class="rm-info">
        <div class="rm-n">${short(rm.name)}</div>
        <div class="rm-a">${n(rm.aum)} Cr</div>
      </div>
      ${(aj.target||rm.aumTarget)?`<span class="rm-pct-badge" style="background:${bg};color:${tc}">${p}%</span>`:''}
    </button>`;
  }).join('');
}

/* ── Mobile tabs ── */
function buildTabs(){
  document.getElementById('mob-tabs').innerHTML=data.map((rm,i)=>
    `<button class="mob-tab ${i===0?'active':''}" id="tab-${i}" onclick="openMobRM(${i})">
      <span class="mob-tab-dot" style="background:${COLORS[i]}"></span>${short(rm.name)}
    </button>`
  ).join('');
}

/* ── Target banner HTML ── */
function targetBannerHTML(j, rm){
  const metrics=[
    {kw:'aum',    l:'AUM',     v:fJ(j,'aum').target||rm.aumTarget||0,       rr:fJ(j,'aum').monthlyRunRate||0,       u:'Cr'},
    {kw:'rev',    l:'Revenue', v:fJ(j,'rev').target||rm.revTarget||0,        rr:fJ(j,'rev').monthlyRunRate||0,       u:'Cr'},
    {kw:'net',    l:'Net Mob', v:fJ(j,'net').target||0,                      rr:fJ(j,'net').monthlyRunRate||0,       u:'Cr'},
    {kw:'sip',    l:'SIP',     v:fJ(j,'sip').target||0,                      rr:fJ(j,'sip').monthlyRunRate||0,       u:'L'},
    {kw:'m50',    l:'M50',     v:fJ(j,'m50').target||fJ(j,'mission').target||0, rr:0,                               u:''},
  ];
  return `<div class="target-banner">
    <div class="target-banner-label">FY Annual Targets</div>
    <div class="target-items">
      ${metrics.map(m=>`<div class="target-item">
        <div class="target-item-l">${m.l}</div>
        <div class="target-item-v">${n(m.v)}${m.u?`<span class="target-item-u">${m.u}</span>`:''}</div>
        ${m.rr?`<div class="target-item-rr">${n(m.rr)}${m.u}/mo</div>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

/* ── Journey cards (mobile) ── */
function journeyCardsHTML(journeyRows){
  return `<div class="journey-cards">
    ${journeyRows.map(m=>{
      const p=pct(m.actual,m.target), c=pc(p), bg=pb(p);
      const u=unit(m.label);
      return `<div class="jcard">
        <div class="jcard-top">
          <span class="jcard-label">${m.label}</span>
          <span class="jcard-pill" style="background:${bg};color:${c}">${p}%</span>
        </div>
        <div class="jcard-row">
          <div class="jcard-stat">
            <div class="jcard-stat-l">YTD Actual</div>
            <div class="jcard-stat-v" style="color:${c}">${n(m.actual)}${u?`<span style="font-size:10px;color:var(--muted);font-family:Outfit,sans-serif;margin-left:2px">${u}</span>`:''}</div>
          </div>
          <div class="jcard-stat">
            <div class="jcard-stat-l">Annual Target</div>
            <div class="jcard-stat-v" style="color:var(--blue)">${n(m.target)}${u?`<span style="font-size:10px;color:var(--muted);font-family:Outfit,sans-serif;margin-left:2px">${u}</span>`:''}</div>
            ${m.monthlyRunRate?`<div class="jcard-stat-rr">${n(m.monthlyRunRate)}${u}/mo RR</div>`:''}
          </div>
        </div>
        <div class="jcard-bar-track"><div class="jcard-bar-fill" style="width:${p}%;background:${c}"></div></div>
        <div class="jcard-footer">
          <span class="jcard-newrr-l">New run rate</span>
          <span class="jcard-newrr-v" style="color:${c}">${n(m.newRunRate)}${u?u:''}/mo</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── Journey table (desktop) ── */
function journeyTableHTML(journeyRows){
  return `<div class="sx"><table class="jt">
    <thead><tr>
      <th style="width:80px">Metric</th>
      <th>Annual Target<br><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px">Monthly RR</span></th>
      <th class="r">YTD Actual</th>
      <th class="r">vs Target</th>
      <th style="width:110px">Progress</th>
      <th class="r">New RR</th>
    </tr></thead>
    <tbody>
      ${journeyRows.map(m=>{
        const p=pct(m.actual,m.target), c=pc(p), bg=pb(p);
        const u=unit(m.label);
        return `<tr>
          <td><span class="j-label">${m.label}</span></td>
          <td>
            <div class="j-target">${n(m.target)}${u}</div>
            <div class="j-rr">${n(m.monthlyRunRate)}${u}/mo</div>
          </td>
          <td class="r"><span class="j-actual" style="color:${c}">${n(m.actual)}${u}</span></td>
          <td class="r"><span class="j-pill" style="background:${bg};color:${c}">${p}%</span></td>
          <td>
            <div class="j-bar-t"><div class="j-bar-f" style="width:${p}%;background:${c}"></div></div>
            <div class="j-newrr">New RR: ${n(m.newRunRate)}${u}/mo</div>
          </td>
          <td class="r"><span class="j-target">${n(m.newRunRate)}${u}</span></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

/* ── Shared plan/activity/ledger/snapshot/leverage HTML ── */
function planHTML(rm){
  const plan=rm.plan||[];
  if(!plan.length) return '<div style="padding:16px 18px;font-size:12px;color:var(--muted)">No plan data</div>';
  return `<div class="sx"><table class="pt">
    <thead><tr><th>Client</th><th>Asset</th><th>Exp Amt</th><th>Exp Redemp</th><th>Net Plan</th><th>Prob</th></tr></thead>
    <tbody>
      ${plan.map(p=>`<tr>
        <td>${p.client}</td><td>${p.asset}</td>
        <td>${n(p.expectedAmt||p.amt||0)}Cr</td>
        <td>${n(p.expectedRedemption||0)}Cr</td>
        <td>${n(p.netPlan||0)}Cr</td>
        <td><span class="prob-pill ${probCls(p.prob)}">${p.prob}%</span></td>
      </tr>`).join('')}
    </tbody>
    <tfoot><tr>
      <td>Total</td><td></td>
      <td>${n(rm.planTotalAmt||0)}Cr</td>
      <td>${n(rm.planTotalRedemption||0)}Cr</td>
      <td>${n(rm.planNetTotal||0)}Cr</td><td></td>
    </tr></tfoot>
  </table></div>`;
}

function activityHTML(rm){
  const acts=(rm.activity||[]).filter(a=>a.param!=='');
  if(!acts.length) return '<div style="padding:16px 18px;font-size:12px;color:var(--muted)">No activity data</div>';
  return `<div class="sec-body"><div class="sx"><table class="at">
    <thead><tr><th>Parameter</th><th>Target</th><th>Actual MTD</th><th>Gap</th></tr></thead>
    <tbody>
      ${acts.map(a=>{
        const gap=Number(a.gap||0);
        return `<tr>
          <td>${a.param}</td><td>${a.target}</td>
          <td style="color:var(--text);font-weight:700">${a.actual}</td>
          <td class="${gap<0?'g-neg':gap>0?'g-pos':''}">${gap>0?'+':''}${gap}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div></div>`;
}

function snapHTML(j, rm){
  const snaps=[
    {l:'AUM',     v:n(rm.aum)+'Cr',     t:fJ(j,'aum').target||rm.aumTarget||0,     a:rm.aum,     c:'var(--blue)'},
    {l:'Revenue', v:n(rm.revenue)+'Cr',  t:fJ(j,'rev').target||rm.revTarget||0,     a:rm.revenue, c:'var(--purple)'},
    {l:'Net Mob', v:n(rm.netMob)+'Cr',   t:fJ(j,'net').target||0,                   a:rm.netMob,  c:'var(--green)'},
    {l:'M50',     v:String(rm.m50||0),   t:fJ(j,'m50').target||fJ(j,'mission').target||0, a:rm.m50||0, c:'var(--amber)'},
    {l:'SIP',     v:n(rm.sip)+'L',       t:fJ(j,'sip').target||0,                   a:rm.sip,     c:'var(--cyan)'},
  ];
  return snaps.map(s=>{
    const p=s.t?pct(s.a,s.t):null;
    return `<div class="snap-item">
      <div class="snap-l">${s.l}</div>
      <div class="snap-row">
        <span class="snap-v" style="color:${s.c}">${s.v}</span>
        ${p!==null?`<span class="snap-pct" style="background:${pb(p)};color:${pc(p)}">${p}%</span>`:''}
      </div>
      ${p!==null?`<div class="snap-bar-t"><div class="snap-bar-f" style="width:${p}%;background:${pc(p)}"></div></div>`:''}
    </div>`;
  }).join('');
}

function leverageHTML(rm){
  const levs=(rm.leverage||[]).filter(l=>l.label!=='');
  if(!levs.length) return '';
  return levs.map(l=>{
    const isP=String(l.label).toLowerCase().includes('penetration')||String(l.label).includes('%');
    const raw=Number(l.value||0);
    const val=isP?(raw<=1?(raw*100).toFixed(2):raw.toFixed(2))+'%':l.value;
    return `<div class="lev-row">
      <span class="lev-l">${l.label}</span>
      <span class="lev-v" style="${isP?'color:var(--green)':''}">${val}</span>
    </div>`;
  }).join('');
}

/* ── Build full detail ── */
function buildDetail(rm, i, isMobile){
  const col=COLORS[i], j=rm.journey||[];
  const journeyRows=j.length?j:[
    {label:'AUM',     target:rm.aumTarget||0, monthlyRunRate:0, actual:rm.aum,     newRunRate:0},
    {label:'Revenue', target:rm.revTarget||0, monthlyRunRate:0, actual:rm.revenue, newRunRate:0},
    {label:'Net Mob', target:0,               monthlyRunRate:0, actual:rm.netMob,  newRunRate:0},
    {label:'M50',     target:0,               monthlyRunRate:0, actual:rm.m50||0,  newRunRate:0},
    {label:'SIP',     target:0,               monthlyRunRate:0, actual:rm.sip,     newRunRate:0},
  ];
  const ledger=rm.ledger||[];
  const ledMonths=[...new Set(ledger.map(l=>l.month))].filter(m=>m&&m!=='Unspecified').sort();

  return `<div class="d-inner on" id="d-inner-${i}">
    <!-- Header -->
    <div class="dh">
      <div class="dh-top">
        <div>
          <div class="dh-name" style="color:${col}">${rm.name}</div>
          <div class="dh-sub">Ledger Net ₹${n(rm.ledgerTotal||0)}Cr &nbsp;·&nbsp; Plan ₹${n(rm.planTotalAmt||0)}Cr &nbsp;·&nbsp; Wtd ₹${n(rm.planWeighted||0)}Cr</div>
        </div>
        <span class="dh-tag" style="color:${col}">${curM} ${curY}</span>
      </div>
      <!-- Target Banner -->
      ${targetBannerHTML(j, rm)}
      <!-- KPI strip -->
      <div class="dh-kpis">
        <div class="dh-kpi">
          <div class="dh-kpi-l">Net Mob</div>
          <div class="dh-kpi-v" style="color:var(--green)">${n(rm.netMob)}<span class="dh-kpi-u">Cr</span></div>
        </div>
        <div class="dh-kpi">
          <div class="dh-kpi-l">Mission 50</div>
          <div class="dh-kpi-v" style="color:var(--amber)">${rm.m50||0}</div>
        </div>
        <div class="dh-kpi">
          <div class="dh-kpi-l">SIP Book</div>
          <div class="dh-kpi-v" style="color:var(--cyan)">${n(rm.sip)}<span class="dh-kpi-u">L</span></div>
        </div>
      </div>
    </div>

    <div class="dgrid">
      <div class="dcol">
        <!-- Journey -->
        <div class="sec">
          <div class="sec-head">
            <span class="sec-title">FY 2026–27 · Annual Journey</span>
          </div>
          <div class="${isMobile?'sec-body':'sec-flush'}">
            ${isMobile?journeyCardsHTML(journeyRows):journeyTableHTML(journeyRows)}
          </div>
        </div>

        <!-- Plan -->
        <div class="sec">
          <div class="sec-head">
            <span class="sec-title">${curM} ${curY} — Monthly Plan</span>
            <span class="sec-badge">${(rm.plan||[]).length?'Wtd ₹'+n(rm.planWeighted||0)+'Cr':''}</span>
          </div>
          <div class="sec-flush">
            ${planHTML(rm)}
          </div>
        </div>

        <!-- Activity -->
        <div class="sec">
          <div class="ch" onclick="toggleSec(this)">
            <span class="ch-title">Monthly Activity Tracker</span>
            <div class="ch-icon">+</div>
          </div>
          <div class="cb">
            ${activityHTML(rm)}
          </div>
        </div>

        <!-- Ledger -->
        <div class="sec">
          <div class="ch" onclick="toggleSec(this)">
            <span class="ch-title">Transaction Ledger</span>
            <div class="ch-icon">+</div>
          </div>
          <div class="cb">
            <div class="sec-body">
              <div class="mf">
                ${['ALL',...ledMonths].map(m=>`<button class="mp ${m==='ALL'?'on':''}" data-m="${m}" onclick="filterLedger('${m}',this)">${m==='ALL'?'All':m}</button>`).join('')}
              </div>
              <div class="sx"><table class="lt">
                <thead><tr><th>Client</th><th>Asset</th><th>Month</th><th>Purchase</th><th>Redemption</th><th>Net</th></tr></thead>
                <tbody class="led-tbody"></tbody>
              </table></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right col -->
      <div class="dcol">
        <div class="sec">
          <div class="sec-head"><span class="sec-title">Snapshot</span></div>
          <div class="sec-body">${snapHTML(j,rm)}</div>
        </div>
        ${leverageHTML(rm)?`<div class="sec">
          <div class="sec-head"><span class="sec-title">Leverage</span></div>
          <div class="sec-flush sec-body">${leverageHTML(rm)}</div>
        </div>`:''}
      </div>
    </div>
  </div>`;
}

/* ── Ledger filter ── */
function filterLedger(filter, btn){
  if(btn) btn.closest('.mf').querySelectorAll('.mp').forEach(b=>b.classList.toggle('on',b===btn));
  const rows=filter==='ALL'?activeLedger:activeLedger.filter(l=>l.month===filter);
  const totP=rows.reduce((s,l)=>s+Number(l.purchase||0),0);
  const totR=rows.reduce((s,l)=>s+Number(l.redemption||0),0);
  const totN=rows.reduce((s,l)=>s+Number(l.net||0),0);
  const html=rows.map(l=>`<tr>
    <td>${l.client}</td><td>${l.asset}</td><td>${l.month}</td>
    <td>${n(l.purchase)}</td><td>${n(l.redemption)}</td>
    <td style="color:var(--green);font-weight:700">${n(l.net)}</td>
  </tr>`).join('')+`<tr class="tot">
    <td colspan="3">${filter==='ALL'?'Grand Total':filter+' Total'}</td>
    <td>${n(totP)}</td><td>${n(totR)}</td>
    <td style="color:var(--green)">${n(totN)}</td>
  </tr>`;
  document.querySelectorAll('.led-tbody').forEach(el=>el.innerHTML=html);
}

/* ── Collapsible ── */
function toggleSec(hdr){
  const body=hdr.nextElementSibling, icon=hdr.querySelector('.ch-icon');
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  icon.textContent=open?'+':'×';
  icon.classList.toggle('open',!open);
}

/* ── Open RM desktop ── */
function openRM(idx){
  if(activeRM===idx) return;
  activeRM=idx;
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.rm-btn').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('empty-state').style.display='none';
  document.getElementById('desktop-content').innerHTML=buildDetail(data[idx],idx,false);
  document.getElementById('desktop-detail').scrollTo({top:0,behavior:'smooth'});
  filterLedger('ALL',null);
}

/* ── Open RM mobile ── */
function openMobRM(idx){
  activeRM=idx;
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.mob-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('mob-content').innerHTML=buildDetail(data[idx],idx,true);
  document.getElementById('mob-scroll').scrollTo({top:0,behavior:'smooth'});
  filterLedger('ALL',null);
  const tab=document.getElementById('tab-'+idx);
  if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

/* ── Load ── */
async function load(silent=false){
  try{
    const res=await fetch('data/performance.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    data=Array.isArray(json)?json:(json.rms||[]);
    if(!data.length) throw new Error('Empty');
    buildMini();
    buildRMList();
    buildTabs();
    if(!silent){ openRM(0); openMobRM(0); }
    const d=data[0]?.lastUpdated?new Date(data[0].lastUpdated):new Date();
    const t=isNaN(d)?'Live':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('updated-tag').innerHTML=`<span class="live-dot"></span>${t}`;
  }catch(e){
    document.getElementById('rm-list').innerHTML=`<div style="padding:16px;font-size:12px;color:var(--red)">Failed to load</div>`;
    document.getElementById('mob-tabs').innerHTML=`<div style="padding:14px 16px;font-size:12px;color:var(--red)">Failed to load</div>`;
    console.error(e);
  }
}

load();
setInterval(()=>load(true),300000);
</script>
