<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Team Piyush | FY 2026–27</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233d5af1'/><stop offset='1' stop-color='%237c3aed'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-size='15' font-weight='700' fill='white'>TP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --blue:#3d5af1;--blue-l:rgba(61,90,241,.11);
  --green:#15803d;--green-l:rgba(21,128,61,.10);
  --amber:#b45309;--amber-l:rgba(180,83,9,.10);
  --red:#b91c1c;--red-l:rgba(185,28,28,.09);
  --purple:#6d28d9;--purple-l:rgba(109,40,217,.10);
  --cyan:#0e7490;--cyan-l:rgba(14,116,144,.10);
  --text:#141629;--sub:#454878;--muted:#8890b8;
  --gb:rgba(255,255,255,.76);--gb2:rgba(200,210,240,.40);
  --gs:0 4px 20px rgba(80,90,180,.08),0 1px 0 rgba(255,255,255,.88) inset;
  --gsm:0 10px 40px rgba(80,90,180,.14),0 1px 0 rgba(255,255,255,.93) inset;
  --gsl:0 18px 60px rgba(80,90,180,.19),0 1px 0 rgba(255,255,255,.97) inset;
  --tb:52px;--sb:52px;--r:15px;--rs:9px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Outfit',sans-serif;
  background:linear-gradient(145deg,#d6e6ff 0%,#e6dcff 28%,#fce2f6 58%,#ffe8d2 100%);
  background-attachment:fixed;color:var(--text);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── BLOBS ── */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;will-change:transform}
.b1{width:600px;height:600px;top:-170px;left:-150px;background:radial-gradient(circle,rgba(158,192,255,.70) 0%,rgba(190,162,255,.32) 52%,transparent 72%);animation:bm1 22s ease-in-out infinite}
.b2{width:520px;height:520px;bottom:-130px;right:-100px;background:radial-gradient(circle,rgba(255,178,235,.62) 0%,rgba(255,172,200,.28) 52%,transparent 72%);animation:bm2 28s ease-in-out infinite}
.b3{width:360px;height:360px;top:40%;left:42%;background:radial-gradient(circle,rgba(158,218,255,.42) 0%,transparent 65%);animation:bm3 19s ease-in-out infinite}
.b4{width:250px;height:250px;top:14%;right:18%;background:radial-gradient(circle,rgba(255,215,158,.40) 0%,transparent 65%);animation:bm4 25s ease-in-out infinite}
@keyframes bm1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,34px) scale(1.06)}67%{transform:translate(-26px,48px) scale(.95)}}
@keyframes bm2{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-46px,-38px) scale(1.07)}70%{transform:translate(32px,-48px) scale(.93)}}
@keyframes bm3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(36px,-26px) scale(1.11)}}
@keyframes bm4{0%,100%{transform:translate(0,0) scale(1)}42%{transform:translate(-28px,20px) scale(1.09)}}

/* ── SPLASH (fast: 1.8s total) ── */
#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#08082a 0%,#160840 45%,#082258 100%);
  transition:opacity .6s ease .1s, visibility .6s ease .1s;
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.sp-orb{
  width:88px;height:88px;border-radius:22px;
  background:linear-gradient(135deg,#3d5af1,#7c3aed,#c026d3);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;color:#fff;
  box-shadow:0 0 50px rgba(61,90,241,.85),0 0 100px rgba(124,58,237,.50);
  animation:orbIn .55s cubic-bezier(.34,1.56,.64,1) both,orbP 1.8s .55s ease-in-out infinite;
  margin-bottom:22px;position:relative;overflow:hidden;
}
.sp-orb::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.26) 0%,transparent 55%);border-radius:inherit}
@keyframes orbIn{from{opacity:0;transform:scale(.3) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes orbP{0%,100%{box-shadow:0 0 50px rgba(61,90,241,.85),0 0 100px rgba(124,58,237,.50)}50%{box-shadow:0 0 75px rgba(61,90,241,1),0 0 150px rgba(124,58,237,.70)}}
.sp-title{
  font-size:24px;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(90deg,#a5bfff,#d4a5ff,#ffb3e8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:5px;
  animation:spIn .7s .25s cubic-bezier(.4,0,.2,1) both;
}
.sp-fy{font-size:12px;color:rgba(255,255,255,.42);letter-spacing:.08em;text-align:center;animation:spIn .7s .38s cubic-bezier(.4,0,.2,1) both}
.sp-prop{font-size:10px;color:rgba(255,255,255,.20);letter-spacing:.04em;text-align:center;margin-top:3px;animation:spIn .7s .48s cubic-bezier(.4,0,.2,1) both}
.sp-bar{width:160px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:28px;overflow:hidden;animation:spIn .7s .55s cubic-bezier(.4,0,.2,1) both}
.sp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#3d5af1,#7c3aed,#c026d3);animation:spFill 1.1s .65s cubic-bezier(.4,0,.2,1) forwards;width:0}
@keyframes spIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes spFill{to{width:100%}}

/* ── TOPBAR ── */
.topbar{
  height:var(--tb);flex-shrink:0;position:relative;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
  background:rgba(255,255,255,.60);
  backdrop-filter:blur(28px) saturate(2);-webkit-backdrop-filter:blur(28px) saturate(2);
  border-bottom:1.5px solid var(--gb);box-shadow:0 2px 18px rgba(80,90,180,.07);
}
.brand{display:flex;align-items:center;gap:9px}
.brand-icon{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,#3d5af1,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
  box-shadow:0 3px 10px rgba(61,90,241,.40);position:relative;overflow:hidden;
}
.brand-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.26) 0%,transparent 60%)}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.01em}
.brand-sep{width:1px;height:13px;background:var(--gb2)}
.brand-sub{font-size:11px;color:var(--muted)}
.tbr{display:flex;align-items:center;gap:6px}
.chip{font-size:9px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.05em;text-transform:uppercase}
.chip-blue{background:var(--blue-l);color:var(--blue);border:1px solid rgba(61,90,241,.22)}
.chip-amber{background:var(--amber-l);color:var(--amber);border:1px solid rgba(180,83,9,.22)}
.chip-glass{background:rgba(255,255,255,.65);color:var(--sub);border:1.5px solid var(--gb)}
.ld{width:5px;height:5px;border-radius:50%;background:#16a34a;animation:ldP 2.4s ease-in-out infinite;display:inline-block;margin-right:3px;vertical-align:middle}
@keyframes ldP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}

/* ── WORKSPACE ── */
.workspace{flex:1;overflow:hidden;display:flex;position:relative;z-index:1}

/* ── THIN ICON SIDEBAR ── */
.iconbar{
  width:var(--sb);flex-shrink:0;
  background:rgba(255,255,255,.38);
  backdrop-filter:blur(22px) saturate(1.7);-webkit-backdrop-filter:blur(22px) saturate(1.7);
  border-right:1.5px solid var(--gb);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:4px;overflow:hidden;
}
.ib-logo{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,#3d5af1,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
  box-shadow:0 3px 10px rgba(61,90,241,.38);
  margin-bottom:8px;flex-shrink:0;position:relative;overflow:hidden;
}
.ib-logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.24) 0%,transparent 55%)}
.ib-divider{width:28px;height:1px;background:var(--gb2);margin:4px 0;flex-shrink:0}
/* Icon button */
.ib-btn{
  position:relative;width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.4,0,.2,1);flex-shrink:0;
  color:var(--muted);cursor:pointer;
}
.ib-btn:hover{background:rgba(255,255,255,.65);color:var(--sub);box-shadow:var(--gs)}
.ib-btn.active{background:rgba(255,255,255,.80);color:var(--blue);box-shadow:0 4px 16px rgba(61,90,241,.14)}
/* Tooltip */
.ib-btn::after{
  content:attr(data-tip);
  position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);
  background:rgba(20,22,41,.88);color:#fff;font-size:10px;font-weight:500;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;
  font-family:'Outfit',sans-serif;
}
.ib-btn:hover::after{opacity:1}
/* RM dot buttons */
.ib-rm{
  width:34px;height:34px;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:all .2s cubic-bezier(.4,0,.2,1);flex-shrink:0;cursor:pointer;
  border:1.5px solid transparent;position:relative;
}
.ib-rm:hover{background:rgba(255,255,255,.62);border-color:var(--gb);box-shadow:var(--gs)}
.ib-rm.active{background:rgba(255,255,255,.80);border-color:rgba(61,90,241,.26);box-shadow:0 4px 16px rgba(61,90,241,.12)}
.ib-rm::after{
  content:attr(data-tip);
  position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);
  background:rgba(20,22,41,.88);color:#fff;font-size:10px;font-weight:500;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;
  font-family:'Outfit',sans-serif;
}
.ib-rm:hover::after{opacity:1}
.ib-rm-dot{width:8px;height:8px;border-radius:50%;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.ib-rm:hover .ib-rm-dot,.ib-rm.active .ib-rm-dot{transform:scale(1.4)}
.ib-rm-init{font-size:7px;font-weight:700;color:var(--muted);letter-spacing:.04em}
/* Quarter countdown pill at bottom */
.ib-qtr{
  margin-top:auto;width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,rgba(61,90,241,.10),rgba(124,58,237,.08));
  border:1px solid rgba(61,90,241,.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;flex-shrink:0;position:relative;
}
.ib-qtr::after{
  content:attr(data-tip);
  position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);
  background:rgba(20,22,41,.88);color:#fff;font-size:10px;font-weight:500;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;
  font-family:'Outfit',sans-serif;
}
.ib-qtr:hover::after{opacity:1}
.ib-qtr-q{font-size:9px;font-weight:800;color:var(--blue);font-family:'DM Mono',monospace}
.ib-qtr-d{font-size:7px;font-weight:600;color:var(--muted)}

/* ── GRID AREA ── */
.grid-area{
  flex:1;padding:14px;overflow:hidden;
  display:flex;flex-direction:column;
}

/* 3×3 grid — fills all height, no scroll */
.rm-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  gap:10px;
  flex:1;
  min-height:0;
}

/* ── BASE CARD ── */
.card{
  border-radius:var(--r);
  background:rgba(255,255,255,.50);
  backdrop-filter:blur(20px) saturate(1.7);-webkit-backdrop-filter:blur(20px) saturate(1.7);
  border:1.5px solid var(--gb);
  box-shadow:var(--gs);
  cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;
  transition:all .26s cubic-bezier(.4,0,.2,1);
  position:relative;
  animation:cIn .35s cubic-bezier(.4,0,.2,1) both;
}
/* Top accent bar */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2.5px;z-index:1;
  background:linear-gradient(90deg,var(--cc,#3d5af1) 0%,rgba(255,255,255,.3) 70%,transparent 100%);
}
/* Inner shine */
.card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(148deg,rgba(255,255,255,.18) 0%,transparent 52%);
  pointer-events:none;transition:opacity .26s;
}
/* Hover glow using CSS custom property */
.card:hover{
  background:rgba(255,255,255,.72);
  box-shadow:var(--gsm),0 0 0 1.5px var(--cg,rgba(61,90,241,.32)),0 0 32px var(--cg,rgba(61,90,241,.14));
  transform:translateY(-2px) scale(1.008);
}
.card:hover::after{opacity:0}
@keyframes cIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}

/* Card head — fixed height */
.ch{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px 0;flex-shrink:0;
}
.c-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text);line-height:1.2}
.c-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  box-shadow:0 0 6px currentColor;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);
}
.card:hover .c-dot{transform:scale(1.6)}

/* Target grid — equal cols, fills flex space */
.c-targets{
  display:grid;grid-template-columns:1fr 1fr;
  gap:5px 8px;padding:8px 12px;
  flex:1;align-content:start;
}
.ct{}
.ct-l{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:1px}
.ct-v{font-size:12px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:-.02em;line-height:1.1}
.ct-u{font-size:7.5px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.ct-a{font-size:9px;font-family:'DM Mono',monospace;margin-top:1px;font-weight:500;line-height:1.1}

/* Progress bar — fixed height */
.c-prog{padding:0 12px 8px;flex-shrink:0}
.c-prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.c-prog-l{font-size:7.5px;color:var(--muted);font-weight:500}
.c-prog-p{font-size:9px;font-family:'DM Mono',monospace;font-weight:700}
.c-track{height:3.5px;background:rgba(180,190,230,.26);border-radius:2px;overflow:hidden}
.c-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* Open hint — fixed height */
.c-hint{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px 7px;border-top:1px solid var(--gb2);flex-shrink:0;
  font-size:8.5px;color:var(--muted);font-weight:500;background:rgba(255,255,255,.24);
}
.c-arrow{
  width:16px;height:16px;border-radius:50%;
  background:rgba(255,255,255,.65);border:1px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;font-size:9px;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),background .18s,color .18s;color:var(--muted);
}
.card:hover .c-arrow{transform:rotate(45deg) scale(1.15);background:var(--blue-l);color:var(--blue);border-color:rgba(61,90,241,.28)}

/* ── BOSS CARD ── */
.boss{
  border-radius:var(--r);
  background:rgba(255,255,255,.84);
  backdrop-filter:blur(36px) saturate(2.4);-webkit-backdrop-filter:blur(36px) saturate(2.4);
  border:2px solid rgba(255,255,255,.94);
  box-shadow:0 14px 52px rgba(61,90,241,.15),0 1px 0 rgba(255,255,255,.98) inset,0 0 0 1px rgba(61,90,241,.08);
  cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;
  transition:all .30s cubic-bezier(.4,0,.2,1);
  position:relative;
  animation:cIn .35s .04s cubic-bezier(.4,0,.2,1) both;
}
.boss::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3.5px;z-index:1;
  background:linear-gradient(90deg,#3d5af1,#7c3aed,#c026d3,#7c3aed,#3d5af1);
  background-size:300%;animation:gShift 3.5s linear infinite;
}
@keyframes gShift{to{background-position:300% 0}}
.boss:hover{
  box-shadow:0 20px 64px rgba(61,90,241,.22),0 1px 0 rgba(255,255,255,.99) inset,0 0 0 2px rgba(61,90,241,.36),0 0 50px rgba(61,90,241,.11);
  transform:translateY(-3px) scale(1.012);
}
.boss-badge{
  position:absolute;top:10px;right:10px;z-index:2;
  font-size:7.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:2.5px 8px;border-radius:99px;
  background:linear-gradient(90deg,rgba(61,90,241,.14),rgba(124,58,237,.14));
  color:var(--blue);border:1px solid rgba(61,90,241,.22);
}
.boss-head{padding:10px 12px 6px;flex-shrink:0}
.boss-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--sub);margin-bottom:1px}

/* Boss KPI row */
.boss-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 10px;flex-shrink:0}
.bk{border-radius:var(--rs);padding:7px 9px;background:rgba(255,255,255,.55);border:1px solid var(--gb2)}
.bk-l{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:1.5px}
.bk-v{font-size:16px;font-weight:900;font-family:'DM Mono',monospace;letter-spacing:-.03em;line-height:1}
.bk-u{font-size:8px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}

/* Boss targets banner */
.boss-tgt{
  margin:6px 10px;
  background:linear-gradient(135deg,rgba(61,90,241,.08),rgba(124,58,237,.05));
  border:1.5px solid rgba(61,90,241,.16);border-radius:var(--rs);
  padding:8px 10px;flex-shrink:0;
}
.boss-tgt-lbl{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:7px;display:flex;align-items:center;gap:4px}
.boss-tgt-lbl::before{content:'';display:inline-block;width:4.5px;height:4.5px;border-radius:50%;background:var(--blue);animation:ldP 2s infinite}
.boss-tgt-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.bti-l{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:1px}
.bti-v{font-size:11px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:-.02em}
.bti-u{font-size:7px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.bti-rr{font-size:7.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}

/* Boss progress bars */
.boss-progs{display:flex;flex-direction:column;gap:5px;padding:0 10px;flex:1;justify-content:center}
.bp-row{display:flex;align-items:center;gap:7px}
.bp-l{font-size:8.5px;font-weight:600;color:var(--sub);width:50px;flex-shrink:0}
.bp-t{flex:1;height:4.5px;background:rgba(180,190,230,.24);border-radius:3px;overflow:hidden}
.bp-f{height:100%;border-radius:3px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.bp-p{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;width:28px;text-align:right;flex-shrink:0}

.boss-hint{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px 7px;border-top:1px solid var(--gb2);flex-shrink:0;
  font-size:8.5px;color:var(--muted);font-weight:500;background:rgba(255,255,255,.28);
}

/* ── OVERLAY ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(6,4,26,.58);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  overflow-y:auto;padding:20px;
}
.overlay.open{display:block;animation:ovIn .22s ease both}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.modal{
  max-width:1040px;margin:0 auto;
  background:rgba(252,252,255,.96);
  backdrop-filter:blur(40px) saturate(2.5);-webkit-backdrop-filter:blur(40px) saturate(2.5);
  border:1.5px solid rgba(255,255,255,.98);
  border-radius:20px;
  box-shadow:0 24px 80px rgba(20,22,60,.20),0 1px 0 rgba(255,255,255,.98) inset;
  overflow:hidden;
  animation:modIn .30s cubic-bezier(.34,1.1,.64,1) both;
}
@keyframes modIn{from{opacity:0;transform:scale(.94) translateY(18px)}to{opacity:1;transform:none}}
.modal-bar{
  padding:14px 20px;border-bottom:1px solid rgba(200,210,240,.42);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:rgba(252,252,255,.94);z-index:10;
  backdrop-filter:blur(20px);
}
.m-name{font-size:13px;font-weight:800;letter-spacing:.03em;text-transform:uppercase}
.m-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.m-actions{display:flex;align-items:center;gap:7px}
.share-btn{
  display:flex;align-items:center;gap:5px;
  font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:6px 13px;border-radius:99px;
  background:linear-gradient(135deg,rgba(61,90,241,.11),rgba(124,58,237,.11));
  color:var(--blue);border:1.5px solid rgba(61,90,241,.26);
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.share-btn:hover{background:linear-gradient(135deg,rgba(61,90,241,.20),rgba(124,58,237,.20));box-shadow:0 4px 14px rgba(61,90,241,.20);transform:translateY(-1px)}
.share-btn:hover svg{transform:translateY(-2px) rotate(-5deg)}
.share-btn svg{transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.close-btn{
  width:30px;height:30px;border-radius:50%;
  background:rgba(200,210,240,.26);border:1px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
}
.close-btn:hover{background:var(--red-l);color:var(--red);border-color:rgba(185,28,28,.28);transform:rotate(90deg) scale(1.1)}
.modal-body{padding:18px 20px;display:grid;grid-template-columns:1fr 224px;gap:14px}
.m-main{display:flex;flex-direction:column;gap:12px}
.m-side{display:flex;flex-direction:column;gap:10px}

<script>
/* ═══ STATE ═══ */
let data=[],activeLedger=[],openIdx=-1;
const COLORS=['#3d5af1','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];
const MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
const now=new Date(),curM=MO[now.getMonth()],curY=now.getFullYear();
const BOSS='Piyush Dungarpuria';

/* ═══ HELPERS ═══ */
const n=(v,d=2)=>Number(v||0).toFixed(d);
const pct=(v,t)=>(!t?0:Math.min(100,Math.round(v/t*100)));
function pc(p){return p>=90?'var(--green)':p>=60?'var(--amber)':'var(--red)'}
function pb(p){return p>=90?'var(--green-l)':p>=60?'var(--amber-l)':'var(--red-l)'}
function probCls(p){return p>=70?'phi':p>=40?'pmd':'plo'}
function short(nm){const p=nm.trim().split(' ');return p.length>1?p[0]+' '+p[p.length-1][0]+'.':nm}
function init2(nm){const p=nm.trim().split(' ');return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase()}
function fJ(j,kw){return(j||[]).find(m=>m.label.toLowerCase().includes(kw.toLowerCase()))||{target:0,actual:0,monthlyRunRate:0,newRunRate:0}}
function unit(l){const s=l.toLowerCase();if(s.includes('sip'))return 'L';if(s.includes('m50')||s.includes('mission'))return '';return 'Cr'}
function mRem(){const m=now.getMonth();return m>=3?3+12-m:3-m}
function projYE(a,rr){return a+rr*mRem()}
function actComp(acts){const v=acts.filter(a=>a.param!==''&&Number(a.target||0)>0);return v.length?Math.round(v.filter(a=>Number(a.gap||0)<=0).length/v.length*100):0}

/* ═══ SPLASH ═══ */
setTimeout(()=>document.getElementById('splash').classList.add('gone'),1900);

/* ═══ QTR ═══ */
function buildQtr(){
  const m=now.getMonth();
  let q,qEnd;
  if(m>=3&&m<=5){q='Q1';qEnd=new Date(curY,5,30)}
  else if(m>=6&&m<=8){q='Q2';qEnd=new Date(curY,8,30)}
  else if(m>=9&&m<=11){q='Q3';qEnd=new Date(curY,11,31)}
  else{q='Q4';qEnd=new Date(curY,2,31)}
  const dL=Math.max(0,Math.ceil((qEnd-now)/(1000*60*60*24)));
  document.getElementById('qtr-chip').textContent=q+'·'+dL+'d';
  document.getElementById('qtr-q').textContent=q;
  document.getElementById('qtr-d').textContent=dL+'d';
  document.getElementById('ib-qtr').setAttribute('data-tip',q+' · '+dL+' days remaining');
}

/* ═══ BUILD 3×3 GRID ═══ */
function buildGrid(){
  const bIdx=data.findIndex(r=>r.name===BOSS);
  const others=data.map((_,i)=>i).filter(i=>i!==bIdx);
  // Slot order: row0=[0,1,2], row1=[3,4,5], row2=[6,7,8] — center=4
  const slots=Array(9).fill(null);
  slots[4]=bIdx>=0?bIdx:null;
  others.slice(0,8).forEach((rmIdx,si)=>{
    const target=[0,1,2,3,5,6,7,8][si];
    if(target!==undefined) slots[target]=rmIdx;
  });
  document.getElementById('rm-grid').innerHTML=slots.map((rmIdx)=>{
    if(rmIdx===null) return `<div style="border-radius:var(--r);background:rgba(255,255,255,.16);border:1.5px dashed rgba(200,210,240,.5)"></div>`;
    return rmIdx===bIdx?bossCard(data[rmIdx],rmIdx):rmCard(data[rmIdx],rmIdx);
  }).join('');
}

/* ═══ SPARKLINE ═══ */
function spkHTML(ledger){
  if(!ledger||!ledger.length) return '';
  const byM={};
  ledger.forEach(l=>{if(l.month&&l.month!=='Unspecified') byM[l.month]=(byM[l.month]||0)+Number(l.net||0)});
  const mos=Object.keys(byM);if(mos.length<2) return '';
  const recent=mos.slice(-6),vals=recent.map(m=>byM[m]);
  const maxV=Math.max(...vals.map(Math.abs),1);
  return `<div class="spk-s">
    <div class="spk-l">Net Mobilization Trend (Cr)</div>
    <div class="spk-w">${vals.map((v,i)=>{const h=Math.round(Math.abs(v)/maxV*24)||2;return`<div class="spk-bar" style="height:${h}px;background:${v>=0?'var(--green)':'var(--red)'};opacity:.80"><span class="spk-tip">${recent[i]}: ${n(v)}Cr</span></div>`;}).join('')}</div>
    <div class="spk-mr">${recent.map(m=>`<span class="spk-ml">${m.substring(0,3)}</span>`).join('')}</div>
  </div>`;
}

/* ═══ SHARE IMAGE (plan + current month ledger) ═══ */
function shareImage(e){
  e.stopPropagation();
  if(openIdx<0) return;
  const rm=data[openIdx];
  const col=COLORS[openIdx%COLORS.length];
  const plan=rm.plan||[];

  // Current month ledger entries + totals
  const curMonthLed=(rm.ledger||[]).filter(l=>l.month===curM);
  const ledP=curMonthLed.reduce((s,l)=>s+Number(l.purchase||0),0);
  const ledR=curMonthLed.reduce((s,l)=>s+Number(l.redemption||0),0);
  const ledN=curMonthLed.reduce((s,l)=>s+Number(l.net||0),0);
  const netMob=Number(rm.netMob||0);

  const W=860;
  const planRows=plan.length||1;
  const ledRows=curMonthLed.length||1;
  const ROW=32;
  const PLAN_H=100+(planRows*ROW)+ROW+16; // header + rows + total + gap
  const LED_H=80+(ledRows*ROW)+ROW+16;
  const H=100+PLAN_H+LED_H+60;

  const cv=document.getElementById('share-cv');
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // BG gradient
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#d6e6ff');bg.addColorStop(.4,'#e6dcff');
  bg.addColorStop(.7,'#fce2f6');bg.addColorStop(1,'#ffe8d2');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // White card
  ctx.fillStyle='rgba(255,255,255,.92)';
  rr(ctx,22,22,W-44,H-44,14); ctx.fill();

  // Accent bar
  const acc=ctx.createLinearGradient(22,0,W-22,0);
  acc.addColorStop(0,col);acc.addColorStop(.5,'#7c3aed');acc.addColorStop(1,'transparent');
  ctx.fillStyle=acc; rr(ctx,22,22,W-44,4,3); ctx.fill();

  // RM name
  ctx.fillStyle=col; ctx.font='700 22px Outfit,system-ui,sans-serif';
  ctx.fillText(rm.name,40,62);
  ctx.fillStyle='#8890b8'; ctx.font='500 12px Outfit,system-ui,sans-serif';
  ctx.fillText(`${curM} ${curY}  ·  Monthly Plan & Net Mob Ledger`,40,82);

  // Net mob strip
  const nmCol=netMob>=0?'#15803d':'#b91c1c';
  ctx.fillStyle=netMob>=0?'rgba(21,128,61,.10)':'rgba(185,28,28,.09)';
  rr(ctx,40,94,W-80,28,7); ctx.fill();
  ctx.fillStyle=nmCol; ctx.font='600 11px Outfit,system-ui,sans-serif';
  ctx.fillText('Net Mobilization MTD:',50,113);
  ctx.font='700 12px DM Mono,monospace,sans-serif';
  ctx.fillText(`₹${n(netMob)} Cr`,210,113);

  // ── PLAN TABLE ──

    ctx.fillStyle=pB; rr(ctx,pCols[5].x+2,y+ROW/2-9,64,18,4); ctx.fill();

  });
  // Plan total row
  ctx.fillStyle='rgba(200,210,240,.32)'; ctx.fillRect(40,y,W-80,ROW);

  ctx.fillText('Total',pCols[0].x+4,y+ROW/2+4);
  ctx.font='700 11px DM Mono,monospace,sans-serif';
  ctx.fillText(`₹${n(rm.planTotalAmt||0)}Cr`,pCols[2].x+4,y+ROW/2+4);
  ctx.fillText(`₹${n(rm.planTotalRedemption||0)}Cr`,pCols[3].x+4,y+ROW/2+4);

  ctx.fillText(`Wtd ₹${n(rm.planWeighted||0)}Cr`,pCols[5].x,y+ROW/2+4);
  y+=ROW+20;

  // ── LEDGER SECTION ──
  ctx.fillStyle='#141629'; ctx.font='700 12px Outfit,system-ui,sans-serif';
  ctx.fillText(`${curM} Ledger — Net Mobilization`,40,y+16); y+=28;

  const lCols=[{x:40,w:200,l:'Client'},{x:244,w:130,l:'Asset'},{x:378,w:100,l:'Month'},{x:482,w:110,l:'Purchase'},{x:596,w:100,l:'Redemption'},{x:700,w:120,l:'Net Total'}];
  ctx.fillStyle='rgba(200,210,240,.48)'; ctx.fillRect(40,y,W-80,26);
  ctx.fillStyle='#8890b8'; ctx.font='700 9px Outfit,system-ui,sans-serif';

  y+=26;

  if(curMonthLed.length===0){

  } else {
    curMonthLed.forEach((l,ri)=>{
      if(ri%2===1){ctx.fillStyle='rgba(200,210,240,.12)';ctx.fillRect(40,y,W-80,ROW)}

      ctx.fillStyle='#b91c1c';
      ctx.fillText(`${n(l.redemption)}`,lCols[4].x+4,y+ROW/2+4);
      const netV=Number(l.net||0);
      ctx.fillStyle=netV>=0?'#15803d':'#b91c1c'; ctx.font='700 11px DM Mono,monospace,sans-serif';
      ctx.fillText(`${n(netV)}`,lCols[5].x+4,y+ROW/2+4);
      y+=ROW;
    });
  }
  // Ledger totals
  ctx.fillStyle='rgba(200,210,240,.32)'; ctx.fillRect(40,y,W-80,ROW);
  ctx.strokeStyle='rgba(200,210,240,.65)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(W-40,y); ctx.stroke();

  const link=document.createElement('a');
  link.download=`${rm.name.replace(/ /g,'_')}_${curM}${curY}_Plan.jpg`;
  link.href=cv.toDataURL('image/jpeg',0.94);
  link.click();
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

  document.getElementById('mob-tabs').innerHTML=data.map((rm,i)=>
    `<button class="mob-tab ${i===0?'active':''}" id="tab-${i}" onclick="openMobRM(${i})">
      <span class="mob-tab-dot" style="background:${COLORS[i%COLORS.length]}"></span>${short(rm.name)}
    </button>`).join('');
}
function openMobRM(idx){
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.mob-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('mob-content').innerHTML=buildMobDet(data[idx],idx);
  document.getElementById('mob-scr').scrollTo({top:0,behavior:'smooth'});
  renderLedger('ALL',null);
  const tab=document.getElementById('tab-'+idx);
  if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

/* ═══ LOAD ═══ */
async function load(silent=false){
  try{
    const res=await fetch('data/performance.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    data=Array.isArray(json)?json:(json.rms||[]);
    if(!data.length) throw new Error('Empty');
    buildQtr(); buildIBRMs(); buildGrid(); buildTabs();
    if(!silent) openMobRM(0);
    const d=data[0]?.lastUpdated?new Date(data[0].lastUpdated):new Date();
    document.getElementById('updated-tag').innerHTML=`<span class="ld"></span>${isNaN(d)?'Live':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){console.error(e)}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOv()});
load();
setInterval(()=>load(true),300000);
</script>
