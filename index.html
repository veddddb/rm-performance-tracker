<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Team Piyush | Premium Analytics Terminal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%236366f1'/><stop offset='1' stop-color='%23a855f7'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-size='15' font-weight='700' fill='white'>TP</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    /* ════════════════════════════════════
       CINEMATIC LUXURY DARK TOKENS
    ════════════════════════════════════ */
    :root {
      /* Deep luxury environment backdrops */
      --bg-a: #06040a; 
      --bg-b: #0a0813; 
      --bg-c: #0e0a1f; 
      --bg-d: #130f2b;

      /* Translucent glass surfaces */
      --gs-bg: rgba(14, 11, 28, 0.65);
      --gs-bg-h: rgba(22, 18, 43, 0.82);
      --gs-bg-s: rgba(28, 23, 54, 0.90);
      --gs-bd: rgba(255, 255, 255, 0.06);
      --gs-bd2: rgba(99, 102, 241, 0.16);
      --gs-sh: 0 4px 24px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255, 255, 255, 0.05) inset;
      --gs-sh-h: 0 12px 40px rgba(99, 102, 241, 0.12), 0 1px 0 rgba(255, 255, 255, 0.08) inset;
      --gs-sh-s: 0 16px 56px rgba(139, 92, 246, 0.16), 0 1px 0 rgba(255, 255, 255, 0.12) inset;

      /* High-contrast crisp typography */
      --text: #f3f4f6; 
      --sub: #a1a1aa; 
      --muted: #6b7280;

      /* Vibrant neon status accents */
      --indigo: #6366f1;  --indigo-l: rgba(99, 102, 241, 0.12);
      --violet: #a855f7;  --violet-l: rgba(168, 85, 247, 0.12);
      --teal: #14b8a6;    --teal-l: rgba(20, 184, 166, 0.10);
      --rose: #f43f5e;    --rose-l: rgba(244, 63, 94, 0.10);
      --amber: #f59e0b;   --amber-l: rgba(245, 158, 11, 0.10);
      --sky: #38bdf8;     --sky-l: rgba(56, 189, 248, 0.10);
      --emerald: #10b981; --emerald-l: rgba(16, 185, 129, 0.10);

      /* Core structural boundaries */
      --r: 14px; --rs: 9px;
      --tb: 56px; --lw: 260px; --rw: 260px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 35%, var(--bg-c) 70%, var(--bg-d) 100%);
      background-attachment: fixed;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    /* ════════ GLOWING BACKGROUND BLOBS ════════ */
    .blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(40px); }
    .b1 { width: 600px; height: 600px; top: -200px; left: -150px; background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%); animation: bm 25s ease-in-out infinite; }
    .b2 { width: 550px; height: 550px; bottom: -150px; right: -100px; background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%); animation: bm 30s ease-in-out infinite reverse; }
    
    @keyframes bm {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(50px, 40px) scale(1.08); }
      67% { transform: translate(-30px, 50px) scale(0.95); }
    }

    /* ════════ TOP NAVIGATION BAR ════════ */
    .topbar {
      height: var(--tb); flex-shrink: 0; z-index: 200; position: relative;
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
      background: rgba(6, 4, 10, 0.75);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border-bottom: 1.5px solid var(--gs-bd);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
    }
    .brand-nm { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; color: #fff; }
    .brand-sp { width: 1px; height: 14px; background: var(--gs-bd2); }
    .brand-sb { font-size: 11px; color: var(--sub); font-family: 'DM Mono', monospace; }
    .tbr { display: flex; align-items: center; gap: 8px; }
    
    /* ════════ APP WORKSPACE PANELS ════════ */
    .ws { flex: 1; overflow: hidden; display: flex; position: relative; z-index: 1; }
    .col-l, .col-r { width: var(--lw); flex-shrink: 0; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
    .col-l { border-right: 1.5px solid var(--gs-bd); }
    .col-r { border-left: 1.5px solid var(--gs-bd); }
    .col-c { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
    
    /* Custom Scroller Utilities */
    .col-c::-webkit-scrollbar { width: 5px; }
    .col-c::-webkit-scrollbar-thumb { background: var(--gs-bd2); border-radius: 10px; }

    /* ════════ SECURE INDEX-ANCHORED CARDS ════════ */
    .rm-card {
      border-radius: var(--r); background: var(--gs-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid var(--gs-bd); box-shadow: var(--gs-sh);
      cursor: pointer; display: flex; flex-direction: column;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
    }
    .rm-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px; z-index: 1;
      background: linear-gradient(90deg, var(--cc, var(--indigo)) 0%, transparent);
    }
    .rm-card:hover {
      background: var(--gs-bg-h); transform: translateY(-2px);
      box-shadow: var(--gs-sh-h), 0 0 20px rgba(99, 102, 241, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
    }
    .rm-card.active {
      background: var(--gs-bg-s); border-color: var(--cc, var(--indigo));
      box-shadow: var(--gs-sh-s), 0 0 25px rgba(139, 92, 246, 0.15);
    }

    .rc-h { display: flex; align-items: center; gap: 8px; padding: 12px 14px 8px; }
    .rc-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--cc, var(--indigo)); box-shadow: 0 0 8px var(--cc, var(--indigo)); }
    .rc-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #fff; flex: 1; }
    
    /* GRID SUMMARY LAYOUT */
    .rc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 10px; padding: 4px 14px 12px; }
    .rs-l { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--sub); margin-bottom: 2px; }
    .rs-v { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; color: #fff; }

    /* ════════ DATA VIEW CONTAINER DETAILS ════════ */
    .panel-header-lux {
      background: var(--gs-bg-s); border: 1.5px solid rgba(255, 255, 255, 0.04);
      border-radius: var(--r); padding: 22px 24px; position: relative; overflow: hidden; box-shadow: var(--gs-sh-s);
    }
    .panel-header-lux::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--indigo), var(--violet), var(--teal), var(--indigo));
      background-size: 300%; animation: gShift 5s linear infinite;
    }
    @keyframes gShift { to { background-position: 300% 0; } }

    .lux-title { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; color: #fff; margin-bottom: 4px; }
    .lux-sub { font-size: 12px; color: var(--sub); font-family: 'DM Mono', monospace; }

    /* FINANCIAL PIPELINE TABLES */
    .table-lux-wrapper {
      background: var(--gs-bg); border: 1.5px solid var(--gs-bd); border-radius: var(--r);
      box-shadow: var(--gs-sh); overflow: hidden; margin-top: 10px;
    }
    .table-lux { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; }
    .table-lux th {
      background: rgba(255, 255, 255, 0.02); padding: 10px 14px;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sub);
      border-bottom: 1.5px solid var(--gs-bd);
    }
    .table-lux td { padding: 10px 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); color: var(--text); }
    .table-lux tr:last-child td { border-bottom: none; }
    .table-lux tr:hover td { background: rgba(255, 255, 255, 0.01); }

    .font-mono-lux { font-family: 'DM Mono', monospace; font-weight: 500; }
    .badge-probability {
      font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 6px; 
      border-radius: 4px; font-weight: 700; background: rgba(99, 102, 241, 0.15); color: #818cf8;
    }

    /* UTILITY METRIC CARD MODULES */
    .mod-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .mod-card {
      background: var(--gs-bg); border: 1.5px solid var(--gs-bd); border-radius: var(--rs);
      padding: 14px; box-shadow: var(--gs-sh); transition: border-color 0.2s ease;
    }
    .mod-card:hover { border-color: var(--gs-bd2); }
    .mod-val { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; color: #fff; margin-top: 4px; }

    /* Operational Progress Line Element Tracker */
    .track-lux { height: 4px; background: rgba(255, 255, 255, 0.05); border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .fill-lux { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--violet)); transition: width 1s ease; }
  </style>
</head>
<body>

  <div class="blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
  </div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">TP</div>
      <div class="brand-nm">Team Piyush Performance Dashboard</div>
      <div class="brand-sp"></div>
      <div class="brand-sb">FY 2026–27 Tracking Terminal</div>
    </div>
    <div class="tbr">
      <span class="brand-sb" id="runtime-clock">STABLE SECURE ENGINE</span>
    </div>
  </header>

  <main class="ws">
    
    <section class="col-l" id="rm-navigation-list">
      </section>

    <section class="col-c" id="main-viewport-content">
      
      <div class="panel-header-lux">
        <div class="lux-sub">OPERATIONAL EXECUTIVE OVERVIEW</div>
        <div class="lux-title" id="center-panel-title">Select an Executive Profile</div>
        <div class="lux-sub">Choose a Relationship Manager on the sidebar terminal to populate comprehensive ledger audits.</div>
      </div>

      <div class="mod-grid" id="summary-metrics-container">
         </div>

    </section>

  </main>

  <script>
    let trackerDatabase = [];

    // Initialize data synchronization
    async function initializeApplicationPipeline() {
      try {
        // Fetch static transaction matrix
        const response = await fetch('data/performance.json');
        trackerDatabase = await response.json();
        
        generateSecureNavigation(trackerDatabase);
        loadDefaultDashboardOverview();
      } catch (error) {
        console.error("❌ Critical pipeline synchronization mapping failure:", error);
        document.getElementById('center-panel-title').innerText = "Data Sync Pipeline Offline";
      }
    }

    // STRICT ID BINDING MAPPER: Prevents UI fragmentation from source row manipulation
    function generateSecureNavigation(dataset) {
      const navContainer = document.getElementById('rm-navigation-list');
      navContainer.innerHTML = ''; // Reset container cleanly

      dataset.forEach(rmRecord => {
        // Formulate deterministic immutable string token key
        const uniqueStringKey = rmRecord.name.toLowerCase().replace(/\s+/g, '-');
        
        const cardElement = document.createElement('div');
        cardElement.className = 'rm-card';
        cardElement.id = `anchor-id-${uniqueStringKey}`;
        
        // Formulate probability weighted asset summaries for preview context
        let nominalInflowSum = 0;
        let weightedInflowSum = 0;
        if (rmRecord.plan && Array.isArray(rmRecord.plan)) {
          rmRecord.plan.forEach(p => {
            const delta = (p.expectedAmt || 0) - (p.expectedRedemption || 0);
            nominalInflowSum += delta;
            weightedInflowSum += (delta * ((p.prob || 100) / 100));
          });
        }

        cardElement.innerHTML = `
          <div class="rc-h">
            <div class="rc-dot"></div>
            <div class="rc-name">${rmRecord.name}</div>
          </div>
          <div class="rc-stats">
            <div>
              <div class="rs-l">AUM Allocation</div>
              <div class="rs-v">₹${(rmRecord.aum || 0).toFixed(1)}Cr</div>
            </div>
            <div>
              <div class="rs-l">Weighted Plan</div>
              <div class="rs-v" style="color: var(--teal)">₹${weightedInflowSum.toFixed(2)}Cr</div>
            </div>
          </div>
        `;

        // Direct explicit item listener mapping to prevent row index mismatch drops
        cardElement.addEventListener('click', () => {
          document.querySelectorAll('.rm-card').forEach(c => c.classList.remove('active'));
          cardElement.classList.add('active');
          renderDetailedAuditProfile(uniqueStringKey);
        });

        navContainer.appendChild(cardElement);
      });
    }

    // COMPREHENSIVE PIPELINE LOGIC PROCESSOR & DETAIL GENERATOR
    function renderDetailedAuditProfile(profileStringKey) {
      const matchedRM = trackerDatabase.find(rm => rm.name.toLowerCase().replace(/\s+/g, '-') === profileStringKey);
      if (!matchedRM) return;

      const viewport = document.getElementById('main-viewport-content');
      viewport.innerHTML = ''; // Purge content buffer

      // Calculate Pipeline Probability Metrics
      let totalNominalPlan = 0;
      let totalWeightedPlan = 0;
      let totalRedemptionsTracked = 0;

      let planRowsHTML = '';
      if (matchedRM.plan && matchedRM.plan.length > 0) {
        matchedRM.plan.forEach(p => {
          const nominalNet = (p.expectedAmt || 0) - (p.expectedRedemption || 0);
          const weightMultiplier = (p.prob || 0) / 100;
          const weightedNet = nominalNet * weightMultiplier;

          totalNominalPlan += (p.expectedAmt || 0);
          totalRedemptionsTracked += (p.expectedRedemption || 0);
          totalWeightedPlan += weightedNet;

          planRowsHTML += `
            <tr>
              <td><strong>${p.client}</strong></td>
              <td class="font-mono-lux">${p.asset}</td>
              <td class="font-mono-lux">₹${(p.expectedAmt || 0).toFixed(2)}Cr</td>
              <td class="font-mono-lux var-rose">₹${(p.expectedRedemption || 0).toFixed(2)}Cr</td>
              <td class="font-mono-lux" style="color:var(--teal)">₹${nominalNet.toFixed(2)}Cr</td>
              <td><span class="badge-probability">${p.prob}%</span></td>
            </tr>
          `;
        });
      } else {
        planRowsHTML = `<tr><td colspan="6" style="color:var(--muted); text-align:center; padding:20px;">No operational pipeline targets specified for current month.</td></tr>`;
      }

      // Generate Ledger Transactions Elements UI Modules
      let ledgerRowsHTML = '';
      if (matchedRM.ledger && matchedRM.ledger.length > 0) {
        matchedRM.ledger.forEach(l => {
          ledgerRowsHTML += `
            <tr>
              <td><strong>${l.client}</strong></td>
              <td class="font-mono-lux">${l.asset}</td>
              <td class="font-mono-lux">${l.month}</td>
              <td class="font-mono-lux" style="color:var(--emerald)">₹${(l.purchase || 0).toFixed(3)}Cr</td>
              <td class="font-mono-lux" style="color:var(--rose)">₹${(l.redemption || 0).toFixed(3)}Cr</td>
              <td class="font-mono-lux ${l.net >= 0 ? 'text-emerald' : 'text-rose'}">₹${(l.net || 0).toFixed(3)}Cr</td>
            </tr>
          `;
        });
      } else {
        ledgerRowsHTML = `<tr><td colspan="6" style="color:var(--muted); text-align:center; padding:20px;">No closed ledger operations posted for current month.</td></tr>`;
      }

      // Append structural modules dynamically to viewport
      viewport.innerHTML = `
        <div class="panel-header-lux">
          <div class="lux-sub">RELATIONSHIP MANAGEMENT LEDGER SHEET</div>
          <div class="lux-title">${matchedRM.name}</div>
          <div class="lux-sub">Last Pipeline Sync Data Timestamp Event: ${new Date(matchedRM.lastUpdated).toLocaleString()}</div>
        </div>

        <div class="mod-grid">
          <div class="mod-card">
            <div class="rs-l">Current Portfolio AUM</div>
            <div class="mod-val">₹${(matchedRM.aum || 0).toFixed(2)} Cr</div>
            <div class="rs-l" style="margin-top:8px;">Target: ₹${(matchedRM.aumTarget || 0).toFixed(0)}Cr</div>
          </div>
          <div class="mod-card">
            <div class="rs-l">Net Mobilization MTD</div>
            <div class="mod-val" style="color: var(--teal)">₹${(matchedRM.netMob || 0).toFixed(2)} Cr</div>
          </div>
          <div class="mod-card">
            <div class="rs-l">Risk-Adjusted Target Pipeline</div>
            <div class="mod-val" style="color: var(--violet)">₹${totalWeightedPlan.toFixed(2)} Cr</div>
            <div class="rs-l" style="margin-top:8px;">Nominal Raw: ₹${(totalNominalPlan - totalRedemptionsTracked).toFixed(2)}Cr</div>
          </div>
        </div>

        <div>
          <h3 class="rs-l" style="font-size:10px; margin-bottom:6px; color:#fff;">Forward Monthly Allocations (Probability Balanced Pipeline)</h3>
          <div class="table-lux-wrapper">
            <table class="table-lux">
              <thead>
                <tr>
                  <th>Client Name</th>
                  <th>Asset Class</th>
                  <th>Expected Allocation</th>
                  <th>Expected Redemption</th>
                  <th>Nominal Net</th>
                  <th>Confidence Key</th>
                </tr>
              </thead>
              <tbody>
                ${planRowsHTML}
              </tbody>
            </table>
          </div>
        </div>

        <div style="margin-top:10px;">
          <h3 class="rs-l" style="font-size:10px; margin-bottom:6px; color:#fff;">Realized Book Ledger Matrix (MTD Settlements)</h3>
          <div class="table-lux-wrapper">
            <table class="table-lux">
              <thead>
                <tr>
                  <th>Client Account</th>
                  <th>Product Stream</th>
                  <th>Settlement Month</th>
                  <th>Gross Purchase</th>
                  <th>Gross Redemption</th>
                  <th>Net Cleared Inflow</th>
                </tr>
              </thead>
              <tbody>
                ${ledgerRowsHTML}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function loadDefaultDashboardOverview() {
      const firstCard = document.querySelector('.rm-card');
      if (firstCard) firstCard.click();
    }

    // Start running code logic pipeline on document readiness
    document.addEventListener('DOMContentLoaded', initializeApplicationPipeline);
  </script>
</body>
</html>
