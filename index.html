<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Team Piyush | Private Banking</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233d5af1'/><stop offset='1' stop-color='%237c3aed'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%' y='57%' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-size='15' font-weight='700' fill='white'>TP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════ */
:root {
  --g1:#dce8ff; --g2:#ece4ff; --g3:#fde8f8; --g4:#ffe8d6;
  --glass:        rgba(255,255,255,0.46);
  --glass-hover:  rgba(255,255,255,0.64);
  --glass-strong: rgba(255,255,255,0.80);
  --gb:   rgba(255,255,255,0.74);
  --gb2:  rgba(200,210,240,0.45);
  --gs:   0 8px 32px rgba(80,90,180,.09),  0 1px 0 rgba(255,255,255,.85) inset;
  --gsm:  0 14px 48px rgba(80,90,180,.13), 0 1px 0 rgba(255,255,255,.90) inset;
  --gsl:  0 22px 72px rgba(80,90,180,.17), 0 1px 0 rgba(255,255,255,.95) inset;
  --text:#141629; --sub:#454878; --muted:#8890b8;
  --blue:#3d5af1;  --blue-l:rgba(61,90,241,.11);
  --green:#15803d; --green-l:rgba(21,128,61,.10);
  --amber:#b45309; --amber-l:rgba(180,83,9,.10);
  --red:#b91c1c;   --red-l:rgba(185,28,28,.09);
  --purple:#6d28d9;--purple-l:rgba(109,40,217,.10);
  --cyan:#0e7490;  --cyan-l:rgba(14,116,144,.10);
  --r:16px; --rs:10px;
  --sb:240px; --tb:56px;
}

/* ════════════════════════════════════════
   RESET
════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Outfit',sans-serif;
  height:100vh;overflow:hidden;
  background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 35%,var(--g3) 65%,var(--g4) 100%);
  background-attachment:fixed;
  color:var(--text);-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ════════════════════════════════════════
   AMBIENT BLOBS
════════════════════════════════════════ */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;will-change:transform}
.b1{
  width:640px;height:640px;top:-180px;left:-160px;
  background:radial-gradient(circle,rgba(168,196,255,.60) 0%,rgba(200,170,255,.30) 55%,transparent 75%);
  animation:b1m 20s ease-in-out infinite;
}
.b2{
  width:560px;height:560px;bottom:-140px;right:-100px;
  background:radial-gradient(circle,rgba(255,190,235,.55) 0%,rgba(255,180,200,.25) 55%,transparent 75%);
  animation:b2m 26s ease-in-out infinite;
}
.b3{
  width:380px;height:380px;top:45%;left:45%;
  background:radial-gradient(circle,rgba(168,220,255,.38) 0%,transparent 65%);
  animation:b3m 18s ease-in-out infinite;
}
.b4{
  width:280px;height:280px;top:20%;right:20%;
  background:radial-gradient(circle,rgba(255,220,168,.35) 0%,transparent 65%);
  animation:b4m 24s ease-in-out infinite;
}
@keyframes b1m{0%,100%{transform:translate(0,0) scale(1)}30%{transform:translate(55px,38px) scale(1.06)}65%{transform:translate(-28px,55px) scale(.95)}}
@keyframes b2m{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-48px,-42px) scale(1.07)}70%{transform:translate(36px,-52px) scale(.94)}}
@keyframes b3m{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(38px,-28px) scale(1.10)}}
@keyframes b4m{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-30px,24px) scale(1.08)}}

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */
.topbar{
  height:var(--tb);flex-shrink:0;position:relative;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,255,255,.60);
  backdrop-filter:blur(28px) saturate(1.9);
  -webkit-backdrop-filter:blur(28px) saturate(1.9);
  border-bottom:1.5px solid var(--gb);
  box-shadow:0 2px 24px rgba(80,90,180,.07);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#3d5af1,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 4px 14px rgba(61,90,241,.40);
  position:relative;overflow:hidden;
}
.brand-icon::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%);
}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
.brand-sep{width:1px;height:15px;background:var(--gb2)}
.brand-sub{font-size:12px;color:var(--muted)}
.tbr{display:flex;align-items:center;gap:8px}
.chip{font-size:10px;font-weight:600;padding:4px 12px;border-radius:99px;letter-spacing:.05em;text-transform:uppercase}
.chip-blue{background:var(--blue-l);color:var(--blue);border:1px solid rgba(61,90,241,.22)}
.chip-glass{background:rgba(255,255,255,.65);color:var(--sub);border:1.5px solid var(--gb);backdrop-filter:blur(8px)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:pulse 2.4s ease-in-out infinite;display:inline-block;margin-right:4px;vertical-align:middle}

/* ════════════════════════════════════════
   DESKTOP SHELL
════════════════════════════════════════ */
.shell{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
.sidebar{
  width:var(--sb);flex-shrink:0;
  background:rgba(255,255,255,.42);
  backdrop-filter:blur(24px) saturate(1.7);
  -webkit-backdrop-filter:blur(24px) saturate(1.7);
  border-right:1.5px solid var(--gb);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-top{padding:16px;border-bottom:1px solid var(--gb2);flex-shrink:0}
.sb-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.mini-grid{display:flex;flex-direction:column;gap:5px}
.mini-row{display:flex;justify-content:space-between;align-items:center}
.mini-l{font-size:11px;color:var(--sub);font-weight:500}
.mini-v{font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text)}
.rm-wrap{flex:1;overflow-y:auto;padding:8px}
.rm-wrap::-webkit-scrollbar{width:3px}
.rm-wrap::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}
.rm-btn{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:11px 12px;border-radius:var(--rs);margin-bottom:3px;
  border:1.5px solid transparent;transition:all .22s cubic-bezier(.4,0,.2,1);
}
.rm-btn:hover{background:rgba(255,255,255,.55);border-color:var(--gb);box-shadow:var(--gs)}
.rm-btn.active{
  background:rgba(255,255,255,.82);
  border-color:rgba(61,90,241,.26);
  box-shadow:0 6px 24px rgba(61,90,241,.13);
}
.rm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rm-info{flex:1;min-width:0}
.rm-n{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rm-a{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.rm-badge{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 7px;border-radius:99px;flex-shrink:0}

/* ════════════════════════════════════════
   DETAIL PANEL
════════════════════════════════════════ */
.detail{flex:1;overflow-y:auto;padding:22px 24px}
.detail::-webkit-scrollbar{width:5px}
.detail::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:5px}
.empty-st{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:14px;
}
.empty-icon{
  width:60px;height:60px;border-radius:18px;
  background:rgba(255,255,255,.55);backdrop-filter:blur(10px);
  border:1.5px solid var(--gb);box-shadow:var(--gs);
  display:flex;align-items:center;justify-content:center;
}

/* ════════════════════════════════════════
   MOBILE SHELL
════════════════════════════════════════ */
.mob-shell{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.mob-tabs{
  display:flex;overflow-x:auto;flex-shrink:0;
  background:rgba(255,255,255,.54);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1.5px solid var(--gb);
  padding:0 6px;scrollbar-width:none;
}
.mob-tabs::-webkit-scrollbar{display:none}
.mob-tab{
  flex-shrink:0;padding:0 14px;height:46px;
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:500;color:var(--muted);
  border-bottom:2.5px solid transparent;
  transition:all .2s cubic-bezier(.4,0,.2,1);white-space:nowrap;
}
.mob-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.mob-tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.mob-tab.active .mob-tab-dot{transform:scale(1.4)}
.mob-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 28px}
.mob-scroll::-webkit-scrollbar{display:none}

/* ════════════════════════════════════════
   DETAIL CONTENT
════════════════════════════════════════ */
.d-inner{display:none}
.d-inner.on{display:block;animation:fadeUp .3s cubic-bezier(.4,0,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* Header */
.dh{
  border-radius:var(--r);padding:22px 22px 20px;margin-bottom:16px;
  background:var(--glass-strong);
  backdrop-filter:blur(32px) saturate(2.2);
  -webkit-backdrop-filter:blur(32px) saturate(2.2);
  border:1.5px solid rgba(255,255,255,.92);
  box-shadow:var(--gsl);position:relative;overflow:hidden;
}
.dh::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--rm-col,#3d5af1),rgba(124,58,237,.6),transparent);
}
.dh::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 55%);
  pointer-events:none;
}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;position:relative;z-index:1}
.dh-name{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.dh-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:5px;line-height:1.7}
.dh-tag{font-size:10px;font-weight:600;padding:5px 13px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;background:rgba(255,255,255,.72);border:1.5px solid var(--gb)}

/* Annual targets banner */
.target-banner{
  position:relative;z-index:1;
  background:linear-gradient(135deg,rgba(61,90,241,.08) 0%,rgba(124,58,237,.06) 100%);
  border:1.5px solid rgba(61,90,241,.18);
  border-radius:var(--rs);padding:13px 15px;margin-bottom:16px;
  animation:shimmerIn .6s ease both;
}
@keyframes shimmerIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.target-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.target-label::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}
.target-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.target-item{}
.target-item-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px}
.target-item-v{font-size:15px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:-.02em}
.target-item-u{font-size:9px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.target-item-rr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

/* KPI strip */
.dh-kpis{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--gb2);padding-top:15px;position:relative;z-index:1}
.dh-kpi:not(:first-child){padding-left:16px;border-left:1px solid var(--gb2);margin-left:16px}
.dh-kpi-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.dh-kpi-v{font-size:20px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.dh-kpi-u{font-size:10px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:2px;font-weight:500}

/* Two-col grid */
.dgrid{display:grid;grid-template-columns:1fr 252px;gap:14px}
.dcol{display:flex;flex-direction:column;gap:14px}

/* ════════════════════════════════════════
   SECTION CARD
════════════════════════════════════════ */
.sec{
  border-radius:var(--r);overflow:hidden;
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.6);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1.5px solid var(--gb);
  box-shadow:var(--gs);
  transition:box-shadow .24s,transform .24s;
}
.sec:hover{box-shadow:var(--gsm);transform:translateY(-1px)}
.sec-head{
  padding:13px 18px;
  background:rgba(255,255,255,.38);
  border-bottom:1px solid var(--gb2);
  display:flex;justify-content:space-between;align-items:center;
}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
.sec-badge{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.sec-body{padding:16px 18px}
.sec-flush{padding:0}

/* ════════════════════════════════════════
   JOURNEY — mobile cards
════════════════════════════════════════ */
.jcards{display:flex;flex-direction:column;gap:10px;padding:14px 18px}
.jcard{
  border-radius:var(--rs);padding:14px 16px;
  background:rgba(255,255,255,.58);border:1.5px solid var(--gb);
  box-shadow:0 3px 14px rgba(80,90,180,.07);
  animation:fadeUp .28s ease both;
}
.jcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.jcard-label{font-size:13px;font-weight:700;color:var(--text)}
.jcard-pill{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:6px}
.jcard-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.jcard-stat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
.jcard-stat-v{font-size:17px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.jcard-stat-u{font-size:9px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:2px;font-weight:500}
.jcard-stat-rr{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.jbar-t{height:5px;border-radius:3px;background:rgba(180,190,230,.28);overflow:hidden;margin-bottom:10px}
.jbar-f{height:100%;border-radius:3px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.jcard-foot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--gb2)}
.jcard-foot-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.jcard-foot-v{font-size:11px;font-family:'DM Mono',monospace;font-weight:600}

/* ════════════════════════════════════════
   DESKTOP JOURNEY TABLE
════════════════════════════════════════ */
.jt-wrap{overflow-x:auto;padding:0 18px}
.jt-wrap::-webkit-scrollbar{height:3px}
.jt-wrap::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}
.jt{width:100%;border-collapse:collapse;min-width:520px}
.jt th{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);padding:0 12px 11px 0;
  border-bottom:1.5px solid var(--gb2);text-align:left;white-space:nowrap;
}
.jt th:last-child,.jt th.r{text-align:right;padding-right:0}
.jt td{padding:12px 12px 12px 0;border-bottom:1px solid var(--gb2);vertical-align:middle}
.jt tr:last-child td{border-bottom:none}
.j-label{font-size:13px;font-weight:600}
.j-sub{font-size:12px;font-family:'DM Mono',monospace;color:var(--sub)}
.j-rr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.j-actual{font-size:15px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.j-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:6px}
.jbt{height:4px;border-radius:2px;background:rgba(180,190,230,.28);overflow:hidden;margin-bottom:3px;min-width:80px}
.jbf{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.j-newrr{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.r{text-align:right}

/* ════════════════════════════════════════
   PLAN TABLE
════════════════════════════════════════ */
.plan-wrap{overflow-x:auto;padding:0 18px}
.plan-wrap::-webkit-scrollbar{height:3px}
.plan-wrap::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}
.pt{width:100%;border-collapse:collapse;min-width:440px}
.pt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 11px 0;border-bottom:1.5px solid var(--gb2);text-align:right}
.pt th:first-child{text-align:left}
.pt td{padding:11px 10px 11px 0;border-bottom:1px solid var(--gb2);color:var(--sub);text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.pt td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-weight:600;font-size:13px}
.pt td:nth-child(2){text-align:left;font-family:'Outfit',sans-serif;font-size:12px;padding-right:14px}
.pt tr:last-child td{border-bottom:none}
.pt tfoot td{font-weight:700;color:var(--text);font-family:'DM Mono',monospace;border-top:1.5px solid var(--gb2);padding-top:12px;border-bottom:none;font-size:12px}
.pt tfoot td:first-child{font-family:'Outfit',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.prob-pill{display:inline-block;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:5px}
.p-hi{background:var(--green-l);color:var(--green)}
.p-md{background:var(--amber-l);color:var(--amber)}
.p-lo{background:var(--red-l);color:var(--red)}

/* ════════════════════════════════════════
   ACTIVITY TABLE
════════════════════════════════════════ */
.at-wrap{overflow-x:auto}
.at-wrap::-webkit-scrollbar{height:3px}
.at-wrap::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}
.at{width:100%;border-collapse:collapse;min-width:320px}
.at th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 10px 11px 0;border-bottom:1.5px solid var(--gb2);text-align:right}
.at th:first-child{text-align:left}
.at td{padding:10px 10px 10px 0;border-bottom:1px solid var(--gb2);text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--sub)}
.at td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-weight:600;font-size:13px}
.at tr:last-child td{border-bottom:none}
.g-neg{color:var(--red)!important;font-weight:700}
.g-pos{color:var(--green)!important;font-weight:700}

/* ════════════════════════════════════════
   COLLAPSIBLE
════════════════════════════════════════ */
.ch{
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;padding:13px 18px;
  background:rgba(255,255,255,.30);
  border-top:1px solid var(--gb2);
  user-select:none;transition:background .18s;
}
.ch:hover{background:rgba(255,255,255,.52)}
.ch-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub)}
.ch-btn{
  width:24px;height:24px;border-radius:50%;
  background:rgba(255,255,255,.75);
  border:1px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:300;color:var(--muted);
  transition:transform .24s cubic-bezier(.34,1.56,.64,1),background .18s;
}
.ch-btn.open{transform:rotate(45deg);background:var(--blue-l);color:var(--blue);border-color:rgba(61,90,241,.3)}
.cb{display:none}
.cb.open{display:block;animation:fadeUp .22s ease both}

/* ════════════════════════════════════════
   LEDGER — perfect alignment via fixed cols
════════════════════════════════════════ */
.led-wrap{overflow-x:auto;padding:0}
.led-wrap::-webkit-scrollbar{height:3px}
.led-wrap::-webkit-scrollbar-thumb{background:var(--gb2);border-radius:3px}
.lt{
  width:100%;border-collapse:collapse;
  table-layout:fixed;  /* KEY: prevents column width fighting */
  min-width:460px;
}
/* Column widths that add to 100% */
.lt col.c-client{width:22%}
.lt col.c-asset {width:16%}
.lt col.c-month {width:14%}
.lt col.c-pur   {width:16%}
.lt col.c-red   {width:16%}
.lt col.c-net   {width:16%}
.lt th{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);
  padding:0 0 11px;border-bottom:1.5px solid var(--gb2);
  text-align:right;overflow:hidden;
}
.lt th.l{text-align:left}
.lt td{
  padding:9px 0;border-bottom:1px solid var(--gb2);
  font-family:'DM Mono',monospace;font-size:11px;
  text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.lt td.l{text-align:left;font-family:'Outfit',sans-serif;color:var(--text);font-size:12px;font-weight:500;padding-right:8px}
.lt td.l2{text-align:left;font-family:'Outfit',sans-serif;font-size:12px;padding-right:8px}
.lt tr:last-child td{border-bottom:none}
/* Ledger color rules */
.lt td.col-pur{color:var(--green);font-weight:600}
.lt td.col-red{color:var(--red);font-weight:600}
.lt td.col-pos{color:var(--green);font-weight:700}
.lt td.col-neg{color:var(--red);font-weight:700}
/* Total row */
.lt .tot-row td{
  font-weight:700;font-family:'DM Mono',monospace;
  border-top:1.5px solid var(--gb2);
  padding-top:12px;border-bottom:none;
}
.lt .tot-row td.l{font-family:'Outfit',sans-serif;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
/* Month filter */
.mf{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.mp{
  font-size:10px;font-weight:500;padding:4px 12px;border-radius:99px;
  border:1.5px solid var(--gb2);color:var(--sub);
  background:rgba(255,255,255,.42);transition:all .18s;
}
.mp:hover{background:rgba(255,255,255,.7);color:var(--text)}
.mp.on{border-color:rgba(61,90,241,.55);color:var(--blue);background:var(--blue-l);font-weight:700}

/* ════════════════════════════════════════
   SNAPSHOT + LEVERAGE
════════════════════════════════════════ */
.snap-item{padding:11px 0;border-bottom:1px solid var(--gb2)}
.snap-item:last-child{border-bottom:none}
.snap-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.snap-row{display:flex;justify-content:space-between;align-items:baseline}
.snap-v{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.snap-pct{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 8px;border-radius:99px}
.snap-bt{height:4px;border-radius:2px;background:rgba(180,190,230,.28);overflow:hidden;margin-top:7px}
.snap-bf{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.lev-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gb2)}
.lev-row:last-child{border-bottom:none}
.lev-l{font-size:11px;color:var(--sub);font-weight:500}
.lev-v{font-size:12px;font-family:'DM Mono',monospace;font-weight:700}

/* ════════════════════════════════════════
   SKELETON
════════════════════════════════════════ */
@keyframes sk{0%,100%{opacity:.22}50%{opacity:.48}}
.skel{border-radius:var(--rs);background:rgba(180,190,230,.44);animation:sk 1.7s infinite}

/* ════════════════════════════════════════
   ANIMATIONS
════════════════════════════════════════ */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.85)}}

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media(min-width:641px){
  .mob-shell{display:none!important}
  .shell{display:flex!important}
}
@media(max-width:640px){
  .shell{display:none!important}
  .mob-shell{display:flex!important}
  body{overflow:hidden}
  .brand-sep,.brand-sub{display:none}
  .dh{padding:15px 15px 14px}
  .dh-name{font-size:18px}
  .dh-kpis{grid-template-columns:repeat(3,1fr)}
  .dh-kpi:not(:first-child){padding-left:10px;margin-left:10px}
  .dh-kpi-v{font-size:17px}
  .dgrid{grid-template-columns:1fr}
  .target-grid{grid-template-columns:repeat(2,1fr)}
  .target-item:first-child{grid-column:1/-1}
  /* Mobile plan/activity tables */
  .plan-wrap,.at-wrap{margin:0;padding:0}
  .pt,.at{min-width:360px}
  /* ledger on mobile */
  .lt{min-width:380px}
}
@media(max-width:900px) and (min-width:641px){
  :root{--sb:190px}
  .dgrid{grid-template-columns:1fr}
  .target-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="blobs">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
</div>

<!-- TOPBAR -->
<div class="topbar">

    <div class="brand-icon">TP</div>

  <div class="tbr">
    <span class="chip chip-blue">FY 2026–27</span>

<!-- DESKTOP SHELL -->
<div class="shell">
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-lbl">Team Totals</div>
      <div class="mini-grid" id="mini-grid">
        <div class="skel" style="height:13px;margin-bottom:4px"></div>
        <div class="skel" style="height:13px;margin-bottom:4px"></div>
        <div class="skel" style="height:13px;margin-bottom:4px"></div>
        <div class="skel" style="height:13px"></div>
      </div>
    </div>
    <div class="rm-wrap" id="rm-list">
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px;margin-bottom:4px"></div>
      <div class="skel" style="height:52px"></div>
    </div>
  </div>
  <div class="detail" id="desktop-detail">
    <div class="empty-st" id="empty-state">
      <div class="empty-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div style="font-size:13px;color:var(--muted)">Select an RM to view their dashboard</div>
    </div>
    <div id="desktop-content"></div>

</div>

<!-- MOBILE SHELL -->
<div class="mob-shell">
  <div class="mob-tabs" id="mob-tabs">
    <div class="skel" style="width:88px;height:32px;margin:7px 4px;flex-shrink:0"></div>
    <div class="skel" style="width:88px;height:32px;margin:7px 4px;flex-shrink:0"></div>
    <div class="skel" style="width:88px;height:32px;margin:7px 4px;flex-shrink:0"></div>
  </div>
  <div class="mob-scroll" id="mob-scroll">
    <div id="mob-content"></div>
  </div>
</div>

<script>
let data=[], activeLedger=[], activeRM=-1;
const COLORS=['#3d5af1','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];
const MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
const curM=MO[new Date().getMonth()], curY=new Date().getFullYear();

/* ── Helpers ── */
const n=(v,d=2)=>Number(v||0).toFixed(d);
const pct=(v,t)=>(!t?0:Math.min(100,Math.round(v/t*100)));
function pc(p){return p>=90?'var(--green)':p>=60?'var(--amber)':'var(--red)'}
function pb(p){return p>=90?'var(--green-l)':p>=60?'var(--amber-l)':'var(--red-l)'}
function probCls(p){return p>=70?'p-hi':p>=40?'p-md':'p-lo'}
function short(nm){const p=nm.trim().split(' ');return p.length>1?p[0]+' '+p[p.length-1][0]+'.':nm}
function fJ(j,kw){return(j||[]).find(m=>m.label.toLowerCase().includes(kw.toLowerCase()))||{target:0,actual:0,monthlyRunRate:0,newRunRate:0}}
function unit(lbl){const l=lbl.toLowerCase();if(l.includes('sip'))return 'L';if(l.includes('m50')||l.includes('mission'))return '';return 'Cr'}

/* ── Mini scorecard ── */
function buildMini(){
  const tot=f=>data.reduce((s,r)=>s+Number(r[f]||0),0);
  document.getElementById('mini-grid').innerHTML=[
    {l:'AUM',    v:n(tot('aum'))+'Cr'},
    {l:'Revenue',v:n(tot('revenue'))+'Cr'},
    {l:'Net Mob',v:n(tot('netMob'))+'Cr'},
    {l:'SIP',    v:n(tot('sip'))+'L'},
    {l:'M50',    v:tot('m50')},
  ].map(r=>`<div class="mini-row"><span class="mini-l">${r.l}</span><span class="mini-v">${r.v}</span></div>`).join('');
}

/* ── Sidebar RM list ── */
function buildRMList(){
  document.getElementById('rm-list').innerHTML=data.map((rm,i)=>{
    const j=rm.journey||[],aj=fJ(j,'aum'),p=pct(aj.actual||rm.aum,aj.target||rm.aumTarget||0);
    return `<button class="rm-btn" id="rmb-${i}" onclick="openRM(${i})">
      <div class="rm-dot" style="background:${COLORS[i]}"></div>
      <div class="rm-info">
        <div class="rm-n">${short(rm.name)}</div>
        <div class="rm-a">${n(rm.aum)} Cr</div>
      </div>
      ${(aj.target||rm.aumTarget)?`<span class="rm-badge" style="background:${pb(p)};color:${pc(p)}">${p}%</span>`:''}
    </button>`;
  }).join('');
}

/* ── Mobile tabs ── */
function buildTabs(){
  document.getElementById('mob-tabs').innerHTML=data.map((rm,i)=>
    `<button class="mob-tab ${i===0?'active':''}" id="tab-${i}" onclick="openMobRM(${i})">
      <span class="mob-tab-dot" style="background:${COLORS[i]}"></span>${short(rm.name)}
    </button>`
  ).join('');
}

/* ── Target banner ── */
function targetBannerHTML(j,rm){
  const m=[
    {l:'AUM',    v:fJ(j,'aum').target||rm.aumTarget||0, rr:fJ(j,'aum').monthlyRunRate||0, u:'Cr'},
    {l:'Revenue',v:fJ(j,'rev').target||rm.revTarget||0,  rr:fJ(j,'rev').monthlyRunRate||0, u:'Cr'},
    {l:'Net Mob',v:fJ(j,'net').target||0,                rr:fJ(j,'net').monthlyRunRate||0, u:'Cr'},
    {l:'SIP',    v:fJ(j,'sip').target||0,                rr:fJ(j,'sip').monthlyRunRate||0, u:'L'},
    {l:'M50',    v:fJ(j,'m50').target||fJ(j,'mission').target||0, rr:0, u:''},
  ];
  return `<div class="target-banner">
    <div class="target-label">FY Annual Targets</div>
    <div class="target-grid">
      ${m.map(x=>`<div class="target-item">
        <div class="target-item-l">${x.l}</div>
        <div class="target-item-v">${n(x.v)}${x.u?`<span class="target-item-u">${x.u}</span>`:''}</div>
        ${x.rr?`<div class="target-item-rr">${n(x.rr)}${x.u}/mo</div>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

/* ── Journey cards (mobile) ── */
function jcardsHTML(rows){
  return `<div class="jcards">
    ${rows.map(m=>{
      const p=pct(m.actual,m.target),c=pc(p),bg=pb(p);
      const u=unit(m.label);
      return `<div class="jcard">
        <div class="jcard-head">
          <span class="jcard-label">${m.label}</span>
          <span class="jcard-pill" style="background:${bg};color:${c}">${p}%</span>
        </div>
        <div class="jcard-cols">
          <div>
            <div class="jcard-stat-l">YTD Actual</div>
            <div class="jcard-stat-v" style="color:${c}">${n(m.actual)}${u?`<span class="jcard-stat-u">${u}</span>`:''}</div>
          </div>
          <div>
            <div class="jcard-stat-l">Annual Target</div>
            <div class="jcard-stat-v" style="color:var(--blue)">${n(m.target)}${u?`<span class="jcard-stat-u">${u}</span>`:''}</div>
            ${m.monthlyRunRate?`<div class="jcard-stat-rr">${n(m.monthlyRunRate)}${u}/mo</div>`:''}
          </div>
        </div>
        <div class="jbar-t"><div class="jbar-f" style="width:${p}%;background:${c}"></div></div>
        <div class="jcard-foot">
          <span class="jcard-foot-l">New run rate</span>
          <span class="jcard-foot-v" style="color:${c}">${n(m.newRunRate)}${u}/mo</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── Journey table (desktop) ── */
function jtableHTML(rows){
  return `<div class="jt-wrap"><table class="jt">
    <thead><tr>
      <th style="width:90px">Metric</th>
      <th>Annual Target<br><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px">Monthly RR</span></th>
      <th class="r">YTD Actual</th>
      <th class="r">vs Target</th>
      <th style="width:120px">Progress</th>
      <th class="r">New RR</th>
    </tr></thead>
    <tbody>
      ${rows.map(m=>{
        const p=pct(m.actual,m.target),c=pc(p),bg=pb(p);
        const u=unit(m.label);
        return `<tr>
          <td><span class="j-label">${m.label}</span></td>
          <td>
            <div class="j-sub">${n(m.target)}${u}</div>
            <div class="j-rr">${n(m.monthlyRunRate)}${u}/mo</div>
          </td>
          <td class="r"><span class="j-actual" style="color:${c}">${n(m.actual)}${u}</span></td>
          <td class="r"><span class="j-pill" style="background:${bg};color:${c}">${p}%</span></td>
          <td>
            <div class="jbt"><div class="jbf" style="width:${p}%;background:${c}"></div></div>
            <div class="j-newrr">New RR: ${n(m.newRunRate)}${u}/mo</div>
          </td>
          <td class="r"><span class="j-sub">${n(m.newRunRate)}${u}</span></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

/* ── Plan ── */
function planHTML(rm){
  const plan=rm.plan||[];
  if(!plan.length) return `<div style="padding:18px;font-size:12px;color:var(--muted)">No plan data</div>`;
  return `<div class="plan-wrap"><table class="pt">
    <thead><tr><th>Client</th><th>Asset</th><th>Exp Amt</th><th>Exp Redemp</th><th>Net Plan</th><th>Prob</th></tr></thead>
    <tbody>
      ${plan.map(p=>`<tr>
        <td>${p.client}</td><td>${p.asset}</td>
        <td>${n(p.expectedAmt||p.amt||0)}Cr</td>
        <td>${n(p.expectedRedemption||0)}Cr</td>
        <td>${n(p.netPlan||0)}Cr</td>
        <td><span class="prob-pill ${probCls(p.prob)}">${p.prob}%</span></td>
      </tr>`).join('')}
    </tbody>
    <tfoot><tr>
      <td>Total</td><td></td>
      <td>${n(rm.planTotalAmt||0)}Cr</td>
      <td>${n(rm.planTotalRedemption||0)}Cr</td>
      <td>${n(rm.planNetTotal||0)}Cr</td><td></td>
    </tr></tfoot>
  </table></div>`;
}

/* ── Activity ── */
function activityHTML(rm){
  const acts=(rm.activity||[]).filter(a=>a.param!=='');
  if(!acts.length) return `<div style="padding:18px;font-size:12px;color:var(--muted)">No activity data</div>`;
  return `<div class="sec-body"><div class="at-wrap"><table class="at">
    <thead><tr><th>Parameter</th><th>Target</th><th>Actual MTD</th><th>Gap</th></tr></thead>
    <tbody>
      ${acts.map(a=>{
        const gap=Number(a.gap||0);
        return `<tr>
          <td>${a.param}</td>
          <td>${a.target}</td>
          <td style="color:var(--text);font-weight:700">${a.actual}</td>
          <td class="${gap>0?'g-neg':gap<0?'g-pos':''}">${gap>0?'+':''}${gap}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div></div>`;
}

/* ── Snapshot ── */
function snapHTML(j,rm){
  return [
    {l:'AUM',     v:n(rm.aum)+'Cr',     t:fJ(j,'aum').target||rm.aumTarget||0,     a:rm.aum,     c:'var(--blue)'},
    {l:'Revenue', v:n(rm.revenue)+'Cr',  t:fJ(j,'rev').target||rm.revTarget||0,     a:rm.revenue, c:'var(--purple)'},
    {l:'Net Mob', v:n(rm.netMob)+'Cr',   t:fJ(j,'net').target||0,                   a:rm.netMob,  c:'var(--green)'},
    {l:'M50',     v:String(rm.m50||0),   t:fJ(j,'m50').target||fJ(j,'mission').target||0, a:rm.m50||0, c:'var(--amber)'},
    {l:'SIP',     v:n(rm.sip)+'L',       t:fJ(j,'sip').target||0,                   a:rm.sip,     c:'var(--cyan)'},
  ].map(s=>{
    const p=s.t?pct(s.a,s.t):null;
    return `<div class="snap-item">
      <div class="snap-l">${s.l}</div>
      <div class="snap-row">
        <span class="snap-v" style="color:${s.c}">${s.v}</span>
        ${p!==null?`<span class="snap-pct" style="background:${pb(p)};color:${pc(p)}">${p}%</span>`:''}
      </div>
      ${p!==null?`<div class="snap-bt"><div class="snap-bf" style="width:${p}%;background:${pc(p)}"></div></div>`:''}
    </div>`;
  }).join('');
}

/* ── Leverage ── */
function levHTML(rm){
  const l=(rm.leverage||[]).filter(x=>x.label!=='');
  if(!l.length) return '';
  return l.map(x=>{
    const isP=String(x.label).toLowerCase().includes('penetration')||String(x.label).includes('%');
    const raw=Number(x.value||0);
    const val=isP?(raw<=1?(raw*100).toFixed(2):raw.toFixed(2))+'%':x.value;
    return `<div class="lev-row">
      <span class="lev-l">${x.label}</span>
      <span class="lev-v" style="${isP?'color:var(--green)':''}">${val}</span>
    </div>`;
  }).join('');
}

/* ── Ledger render — PURCHASE green, REDEMPTION red, NET signed ── */
function renderLedger(filter,btn){
  if(btn) btn.closest('.mf').querySelectorAll('.mp').forEach(b=>b.classList.toggle('on',b===btn));
  const rows=filter==='ALL'?activeLedger:activeLedger.filter(l=>l.month===filter);
  const totP=rows.reduce((s,l)=>s+Number(l.purchase||0),0);
  const totR=rows.reduce((s,l)=>s+Number(l.redemption||0),0);
  const totN=rows.reduce((s,l)=>s+Number(l.net||0),0);

  const dataRows=rows.map(l=>{
    const net=Number(l.net||0);
    return `<tr>
      <td class="l">${l.client}</td>
      <td class="l2">${l.asset}</td>
      <td class="l2">${l.month}</td>
      <td class="col-pur">${n(l.purchase)}</td>
      <td class="col-red">${n(l.redemption)}</td>
      <td class="${net>=0?'col-pos':'col-neg'}">${n(net)}</td>
    </tr>`;
  }).join('');

  const totRow=`<tr class="tot-row">
    <td class="l" colspan="3">${filter==='ALL'?'Grand Total':filter+' Total'}</td>
    <td class="col-pur">${n(totP)}</td>
    <td class="col-red">${n(totR)}</td>
    <td class="${totN>=0?'col-pos':'col-neg'}">${n(totN)}</td>
  </tr>`;

  document.querySelectorAll('.led-tbody').forEach(el=>el.innerHTML=dataRows+totRow);
}

/* ── Collapsible ── */
function toggleSec(hdr){
  const body=hdr.nextElementSibling, btn=hdr.querySelector('.ch-btn');
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  btn.textContent=open?'+':'×';
  btn.classList.toggle('open',!open);
}

/* ── Build detail ── */
function buildDetail(rm,i,isMob){
  const col=COLORS[i], j=rm.journey||[];
  const jrows=j.length?j:[
    {label:'AUM',     target:rm.aumTarget||0, monthlyRunRate:0, actual:rm.aum,     newRunRate:0},
    {label:'Revenue', target:rm.revTarget||0, monthlyRunRate:0, actual:rm.revenue, newRunRate:0},
    {label:'Net Mob', target:0,               monthlyRunRate:0, actual:rm.netMob,  newRunRate:0},
    {label:'M50',     target:0,               monthlyRunRate:0, actual:rm.m50||0,  newRunRate:0},
    {label:'SIP',     target:0,               monthlyRunRate:0, actual:rm.sip,     newRunRate:0},
  ];
  const ledger=rm.ledger||[];
  const ledMonths=[...new Set(ledger.map(l=>l.month))].filter(m=>m&&m!=='Unspecified').sort();

  return `<div class="d-inner on" style="--rm-col:${col}">
    <!-- Header card -->
    <div class="dh" style="--rm-col:${col}">
      <div class="dh-top">
        <div>
          <div class="dh-name" style="color:${col}">${rm.name}</div>
          <div class="dh-sub">Ledger Net ₹${n(rm.ledgerTotal||0)} Cr &nbsp;·&nbsp; Plan ₹${n(rm.planTotalAmt||0)} Cr &nbsp;·&nbsp; Wtd ₹${n(rm.planWeighted||0)} Cr</div>
        </div>
        <span class="dh-tag" style="color:${col}">${curM} ${curY}</span>
      </div>
      ${targetBannerHTML(j,rm)}
      <div class="dh-kpis">
        <div class="dh-kpi">
          <div class="dh-kpi-l">Net Mob</div>
          <div class="dh-kpi-v" style="color:var(--green)">${n(rm.netMob)}<span class="dh-kpi-u">Cr</span></div>
        </div>
        <div class="dh-kpi">
          <div class="dh-kpi-l">Mission 50</div>
          <div class="dh-kpi-v" style="color:var(--amber)">${rm.m50||0}</div>
        </div>
        <div class="dh-kpi">
          <div class="dh-kpi-l">SIP Book</div>
          <div class="dh-kpi-v" style="color:var(--cyan)">${n(rm.sip)}<span class="dh-kpi-u">L</span></div>
        </div>
      </div>
    </div>

    <div class="dgrid">
      <div class="dcol">
        <!-- Annual Journey -->
        <div class="sec" style="animation-delay:.05s">
          <div class="sec-head"><span class="sec-title">FY 2026–27 · Annual Journey</span></div>
          <div class="sec-flush">
            ${isMob?jcardsHTML(jrows):jtableHTML(jrows)}
          </div>
        </div>

        <!-- Monthly Plan -->
        <div class="sec" style="animation-delay:.10s">
          <div class="sec-head">
            <span class="sec-title">${curM} ${curY} — Monthly Plan</span>
            <span class="sec-badge">${(rm.plan||[]).length?'Wtd ₹'+n(rm.planWeighted||0)+'Cr':''}</span>
          </div>
          <div class="sec-flush">
            ${planHTML(rm)}
          </div>
        </div>

        <!-- Activity -->
        <div class="sec" style="animation-delay:.15s">
          <div class="ch" onclick="toggleSec(this)">
            <span class="ch-title">Monthly Activity Tracker</span>
            <div class="ch-btn">+</div>
          </div>
          <div class="cb">${activityHTML(rm)}</div>
        </div>

        <!-- Ledger -->
        <div class="sec" style="animation-delay:.20s">
          <div class="ch" onclick="toggleSec(this)">
            <span class="ch-title">Transaction Ledger</span>
            <div class="ch-btn">+</div>
          </div>
          <div class="cb">
            <div class="sec-body">
              <div class="mf">
                ${['ALL',...ledMonths].map(m=>`<button class="mp ${m==='ALL'?'on':''}" data-m="${m}" onclick="renderLedger('${m}',this)">${m==='ALL'?'All':m}</button>`).join('')}
              </div>
              <div class="led-wrap">
                <table class="lt">
                  <colgroup>
                    <col class="c-client"><col class="c-asset"><col class="c-month">
                    <col class="c-pur"><col class="c-red"><col class="c-net">
                  </colgroup>
                  <thead>
                    <tr>
                      <th class="l">Client</th>
                      <th class="l">Asset</th>
                      <th class="l">Month</th>
                      <th>Purchase</th>
                      <th>Redemption</th>
                      <th>Net</th>
                    </tr>
                  </thead>
                  <tbody class="led-tbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right col -->
      <div class="dcol" style="animation-delay:.08s">
        <div class="sec">
          <div class="sec-head"><span class="sec-title">Snapshot</span></div>
          <div class="sec-body">${snapHTML(j,rm)}</div>
        </div>
        ${levHTML(rm)?`<div class="sec">
          <div class="sec-head"><span class="sec-title">Leverage</span></div>
          <div class="sec-body">${levHTML(rm)}</div>
        </div>`:''}
      </div>
    </div>
  </div>`;
}

/* ── Open desktop ── */
function openRM(idx){
  if(activeRM===idx) return;
  activeRM=idx;
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.rm-btn').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('empty-state').style.display='none';
  document.getElementById('desktop-content').innerHTML=buildDetail(data[idx],idx,false);
  document.getElementById('desktop-detail').scrollTo({top:0,behavior:'smooth'});
  renderLedger('ALL',null);
}

/* ── Open mobile ── */
function openMobRM(idx){
  activeRM=idx;
  activeLedger=data[idx].ledger||[];
  document.querySelectorAll('.mob-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('mob-content').innerHTML=buildDetail(data[idx],idx,true);
  document.getElementById('mob-scroll').scrollTo({top:0,behavior:'smooth'});
  renderLedger('ALL',null);
  const tab=document.getElementById('tab-'+idx);
  if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

/* ── Load ── */
async function load(silent=false){
  try{
    const res=await fetch('data/performance.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    data=Array.isArray(json)?json:(json.rms||[]);
    if(!data.length) throw new Error('Empty');
    buildMini(); buildRMList(); buildTabs();
    if(!silent){openRM(0);openMobRM(0);}
    const d=data[0]?.lastUpdated?new Date(data[0].lastUpdated):new Date();
    document.getElementById('updated-tag').innerHTML=`<span class="live-dot"></span>${isNaN(d)?'Live':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    ['rm-list','mob-tabs'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.innerHTML=`<div style="padding:16px;font-size:12px;color:var(--red)">Failed to load</div>`;
    });
    console.error(e);
  }
}

load();
setInterval(()=>load(true),300000);
</script>
</body>
</html>
