<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Team Piyush | FY 2026–27</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%236366f1'/><stop offset='1' stop-color='%238b5cf6'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-size='15' font-weight='700' fill='white'>TP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════
   PASTEL TOKENS
════════════════════════════════════ */
:root{
  /* Warm pastel background */
  --bg-a:#f0f4ff; --bg-b:#f5f0ff; --bg-c:#fff0f9; --bg-d:#fff8f0;

  /* Glass surfaces */
  --gs-bg:rgba(255,255,255,.52);
  --gs-bg-h:rgba(255,255,255,.72);
  --gs-bg-s:rgba(255,255,255,.86);
  --gs-bd:rgba(255,255,255,.80);
  --gs-bd2:rgba(210,215,240,.45);
  --gs-sh:0 4px 20px rgba(100,100,180,.07),0 1px 0 rgba(255,255,255,.90) inset;
  --gs-sh-h:0 10px 36px rgba(100,100,180,.13),0 1px 0 rgba(255,255,255,.95) inset;
  --gs-sh-s:0 16px 56px rgba(100,100,180,.16),0 1px 0 rgba(255,255,255,.97) inset;

  /* Type */
  --text:#1e1b2e; --sub:#4a4870; --muted:#8884a8;

  /* Accent palette — softer, more distinct */
  --indigo:#6366f1;  --indigo-l:rgba(99,102,241,.11);
  --violet:#8b5cf6;  --violet-l:rgba(139,92,246,.11);
  --teal:#0d9488;    --teal-l:rgba(13,148,136,.10);
  --rose:#e11d48;    --rose-l:rgba(225,29,72,.09);
  --amber:#d97706;   --amber-l:rgba(217,119,6,.10);
  --sky:#0284c7;     --sky-l:rgba(2,132,199,.10);
  --emerald:#059669; --emerald-l:rgba(5,150,105,.10);

  /* RM colors — soft & distinct */
  --c0:#6366f1; --c1:#8b5cf6; --c2:#0d9488;
  --c3:#d97706; --c4:#e11d48; --c5:#0284c7;

  --r:14px; --rs:9px;
  --tb:52px; --lw:248px; --rw:248px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Outfit',sans-serif;
  background:linear-gradient(145deg,var(--bg-a) 0%,var(--bg-b) 30%,var(--bg-c) 65%,var(--bg-d) 100%);
  background-attachment:fixed;
  color:var(--text);-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ════════ BLOBS ════════ */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%}
.b1{width:580px;height:580px;top:-160px;left:-140px;
  background:radial-gradient(circle,rgba(180,185,255,.68) 0%,rgba(200,178,255,.32) 52%,transparent 72%);
  animation:bm 22s ease-in-out infinite}
.b2{width:500px;height:500px;bottom:-120px;right:-90px;
  background:radial-gradient(circle,rgba(255,178,210,.60) 0%,rgba(255,200,230,.28) 52%,transparent 72%);
  animation:bm 28s ease-in-out infinite reverse}
.b3{width:340px;height:340px;top:42%;left:44%;
  background:radial-gradient(circle,rgba(178,235,230,.45) 0%,transparent 65%);
  animation:bm 18s ease-in-out infinite 3s}
@keyframes bm{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(44px,32px) scale(1.05)}
  67%{transform:translate(-24px,44px) scale(.96)}
}

/* ════════ SPLASH ════════ */
#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#0c0a24 0%,#180830 48%,#0a1e4a 100%);
  transition:opacity .5s ease .1s,visibility .5s ease .1s;
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.sp-orb{
  width:80px;height:80px;border-radius:20px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;color:#fff;
  box-shadow:0 0 44px rgba(99,102,241,.88),0 0 88px rgba(139,92,246,.52);
  animation:orbIn .5s cubic-bezier(.34,1.56,.64,1) both,orbP 1.6s .5s ease-in-out infinite;
  margin-bottom:20px;position:relative;overflow:hidden;
}
.sp-orb::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.24) 0%,transparent 55%);border-radius:inherit}
@keyframes orbIn{from{opacity:0;transform:scale(.28) rotate(-8deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes orbP{0%,100%{box-shadow:0 0 44px rgba(99,102,241,.88),0 0 88px rgba(139,92,246,.52)}50%{box-shadow:0 0 66px rgba(99,102,241,1),0 0 132px rgba(139,92,246,.72)}}
.sp-title{font-size:22px;font-weight:800;letter-spacing:-.04em;background:linear-gradient(90deg,#c7d2ff,#dbb4ff,#ffc8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;animation:spIn .65s .22s ease both}
.sp-fy{font-size:11px;color:rgba(255,255,255,.42);letter-spacing:.08em;text-align:center;animation:spIn .65s .34s ease both}
.sp-prop{font-size:9.5px;color:rgba(255,255,255,.18);letter-spacing:.04em;text-align:center;margin-top:3px;animation:spIn .65s .44s ease both}
.sp-bar{width:140px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:26px;overflow:hidden;animation:spIn .65s .5s ease both}
.sp-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6,#a855f7);animation:spFill 1.0s .58s ease forwards;width:0}
@keyframes spIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spFill{to{width:100%}}

/* ════════ TOPBAR ════════ */
.topbar{
  height:var(--tb);flex-shrink:0;z-index:200;position:relative;
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  background:rgba(255,255,255,.62);
  backdrop-filter:blur(26px) saturate(1.9);-webkit-backdrop-filter:blur(26px) saturate(1.9);
  border-bottom:1.5px solid var(--gs-bd);
  box-shadow:0 2px 16px rgba(100,100,180,.07);
}
.brand{display:flex;align-items:center;gap:9px}
.brand-icon{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
  box-shadow:0 3px 10px rgba(99,102,241,.38);
  position:relative;overflow:hidden;
}
.brand-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.24) 0%,transparent 58%)}
.brand-nm{font-size:14px;font-weight:700;letter-spacing:-.01em}
.brand-sp{width:1px;height:13px;background:var(--gs-bd2)}
.brand-sb{font-size:11px;color:var(--muted)}
.tbr{display:flex;align-items:center;gap:6px}
.chip{font-size:9px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.05em;text-transform:uppercase}
.chip-ind{background:var(--indigo-l);color:var(--indigo);border:1px solid rgba(99,102,241,.22)}
.chip-amb{background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,.22)}
.chip-gl{background:rgba(255,255,255,.65);color:var(--sub);border:1.5px solid var(--gs-bd)}
.ld{width:5px;height:5px;border-radius:50%;background:#0d9488;animation:ldP 2.4s ease-in-out infinite;display:inline-block;margin-right:3px;vertical-align:middle}
@keyframes ldP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.28;transform:scale(.78)}}

/* ════════ WORKSPACE ════════ */
.ws{flex:1;overflow:hidden;display:flex;position:relative;z-index:1}

/* ════════ THREE COLUMNS ════════ */
.col-l,.col-r{
  width:var(--lw);flex-shrink:0;
  padding:12px 10px;
  display:flex;flex-direction:column;gap:9px;
  overflow:hidden;
}
.col-l{border-right:1px solid var(--gs-bd2)}
.col-r{border-left:1px solid var(--gs-bd2)}
.col-c{
  flex:1;overflow-y:auto;padding:16px 18px;
  display:flex;flex-direction:column;gap:14px;
}
.col-c::-webkit-scrollbar{width:4px}
.col-c::-webkit-scrollbar-thumb{background:var(--gs-bd2);border-radius:4px}

/* ════════ RM CARD (uniform) ════════ */
.rm-card{
  border-radius:var(--r);
  background:var(--gs-bg);
  backdrop-filter:blur(18px) saturate(1.65);-webkit-backdrop-filter:blur(18px) saturate(1.65);
  border:1.5px solid var(--gs-bd);
  box-shadow:var(--gs-sh);
  cursor:pointer;overflow:hidden;
  flex:1;/* equal height in column */
  display:flex;flex-direction:column;
  transition:all .24s cubic-bezier(.4,0,.2,1);
  position:relative;
}
/* top accent */
.rm-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2.5px;z-index:1;
  background:linear-gradient(90deg,var(--cc,#6366f1) 0%,rgba(255,255,255,.4) 80%,transparent);
}
/* hover glow */
.rm-card:hover{
  background:var(--gs-bg-h);
  box-shadow:var(--gs-sh-h),0 0 0 1.5px var(--cg,rgba(99,102,241,.30)),0 0 28px var(--cg,rgba(99,102,241,.14));
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.9);
}
.rm-card.active{
  background:var(--gs-bg-s);
  border-color:var(--cc,#6366f1);
  box-shadow:var(--gs-sh-s),0 0 0 1.5px var(--cc,#6366f1),0 0 24px var(--cg,rgba(99,102,241,.18));
}
/* CARD HEADER */
.rc-h{display:flex;align-items:center;gap:7px;padding:11px 12px 7px;flex-shrink:0}
.rc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .22s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 5px currentColor}
.rm-card:hover .rc-dot,.rm-card.active .rc-dot{transform:scale(1.55)}
.rc-name{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-lead{font-size:7px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:1.5px 6px;border-radius:99px;background:linear-gradient(90deg,rgba(99,102,241,.14),rgba(139,92,246,.14));color:var(--indigo);border:1px solid rgba(99,102,241,.22);flex-shrink:0}
/* UNIFORM STATS — 2×2 grid */
.rc-stats{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px 8px;padding:0 12px;flex:1;align-content:start;
}
.rc-stat{}
.rs-l{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:1.5px}
.rs-v{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em;line-height:1.1}
.rs-u{font-size:8px;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:1px}
.rs-a{font-size:9px;font-family:'DM Mono',monospace;font-weight:500;margin-top:1px}
/* PROGRESS */
.rc-prog{padding:7px 12px 8px;flex-shrink:0}
.rc-pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.rc-pl{font-size:8px;color:var(--muted);font-weight:500}
.rc-pp{font-size:9px;font-family:'DM Mono',monospace;font-weight:700}
.rc-track{height:3.5px;background:rgba(180,185,230,.26);border-radius:2px;overflow:hidden}
.rc-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
/* HINT */
.rc-hint{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px 7px;border-top:1px solid var(--gs-bd2);flex-shrink:0;
  font-size:8.5px;color:var(--muted);font-weight:500;
  background:rgba(255,255,255,.22);
}
.rc-arr{
  width:16px;height:16px;border-radius:50%;
  background:rgba(255,255,255,.62);border:1px solid var(--gs-bd2);
  display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .18s,color .18s;
}
.rm-card:hover .rc-arr,.rm-card.active .rc-arr{transform:rotate(45deg) scale(1.1);background:var(--indigo-l);color:var(--indigo);border-color:rgba(99,102,241,.28)}

/* ════════ CENTER PANEL ════════ */

/* Team Totals (home) */
.home-panel{display:flex;flex-direction:column;gap:14px}
.home-header{
  background:var(--gs-bg-s);
  backdrop-filter:blur(28px) saturate(2);-webkit-backdrop-filter:blur(28px) saturate(2);
  border:1.5px solid rgba(255,255,255,.92);border-radius:var(--r);
  box-shadow:var(--gs-sh-s);padding:20px 22px;position:relative;overflow:hidden;
}
.home-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6,#a855f7,#8b5cf6,#6366f1);
  background-size:300%;animation:gShift 3.5s linear infinite;
}
@keyframes gShift{to{background-position:300% 0}}
.home-header::after{content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.20) 0%,transparent 55%);pointer-events:none}
.home-fy{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo);margin-bottom:4px;position:relative;z-index:1}
.home-title{font-size:22px;font-weight:800;letter-spacing:-.04em;margin-bottom:3px;position:relative;z-index:1}
.home-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;position:relative;z-index:1}

/* Quarter bar inside home */
.qtr-strip{
  display:flex;align-items:center;gap:10px;
  margin-top:14px;padding-top:14px;border-top:1px solid var(--gs-bd2);
  position:relative;z-index:1;
}
.qtr-q{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;color:var(--indigo);flex-shrink:0}
.qtr-bar{flex:1;height:5px;background:rgba(99,102,241,.14);border-radius:3px;overflow:hidden}
.qtr-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--indigo),var(--violet));transition:width .8s ease}
.qtr-days{font-size:10px;color:var(--muted);flex-shrink:0}

/* Team totals grid */
.team-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:9px;
}
.team-stat{
  background:var(--gs-bg);
  backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);
  border:1.5px solid var(--gs-bd);border-radius:var(--rs);
  box-shadow:var(--gs-sh);padding:13px 14px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.team-stat:hover{background:var(--gs-bg-h);box-shadow:var(--gs-sh-h);transform:translateX(2px)}
.ts-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.ts-row{display:flex;justify-content:space-between;align-items:baseline}
.ts-v{font-size:20px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.03em}
.ts-u{font-size:9px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:2px}
.ts-pct{font-size:9.5px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 7px;border-radius:99px}
.ts-bar{height:3px;background:rgba(180,185,230,.24);border-radius:2px;overflow:hidden;margin-top:7px}
.ts-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* Leaderboard & risk in home center */
.lb-card{
  background:var(--gs-bg);
  backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);
  border:1.5px solid var(--gs-bd);border-radius:var(--r);
  box-shadow:var(--gs-sh);padding:14px 16px;
}
.lb-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.lb-title::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:currentColor}
.lb-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(210,215,240,.35);cursor:pointer;border-radius:6px;padding:6px 6px;margin:0 -6px;transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,.55)}
.lb-rank{font-size:10px;font-weight:800;font-family:'DM Mono',monospace;width:16px;text-align:center;color:var(--muted)}
.lb-rank.g1{color:#d97706}.lb-rank.g2{color:#6b7280}.lb-rank.g3{color:#0d9488}
.lb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lb-nm{font-size:11px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-bw{width:52px;flex-shrink:0}.lb-bt{height:3px;background:rgba(180,185,230,.28);border-radius:2px;overflow:hidden}
.lb-bf{height:100%;border-radius:2px;transition:width .8s ease}
.lb-p{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;width:28px;text-align:right;flex-shrink:0}

.risk-card{
  background:var(--gs-bg);
  backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);
  border:1.5px solid var(--gs-bd);border-radius:var(--r);
  box-shadow:var(--gs-sh);padding:14px 16px;
}
.risk-item{display:flex;align-items:flex-start;gap:7px;padding:6px 8px;background:rgba(225,29,72,.07);border:1px solid rgba(225,29,72,.18);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:background .15s}
.risk-item:last-child{margin-bottom:0}
.risk-item:hover{background:rgba(225,29,72,.12)}
.risk-dot{width:5px;height:5px;border-radius:50%;background:var(--rose);flex-shrink:0;margin-top:3.5px}
.risk-txt{font-size:10px;color:var(--rose);line-height:1.4;font-weight:500}
.no-risk{font-size:10px;color:var(--teal);display:flex;align-items:center;gap:5px;padding:4px 0}

/* ════════ DETAIL PANEL (center when RM selected) ════════ */
.det-panel{display:none;flex-direction:column;gap:13px;animation:fadeUp .26s ease both}
.det-panel.show{display:flex}

/* Detail header */
.det-head{
  background:var(--gs-bg-s);
  backdrop-filter:blur(28px) saturate(2);-webkit-backdrop-filter:blur(28px) saturate(2);
  border:1.5px solid rgba(255,255,255,.92);border-radius:var(--r);
  box-shadow:var(--gs-sh-s);padding:16px 18px;position:relative;overflow:hidden;
}
.det-head::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cc,#6366f1),rgba(255,255,255,.3),transparent)}
.det-head::after{content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.18) 0%,transparent 52%);pointer-events:none}
.det-nm{font-size:19px;font-weight:800;letter-spacing:-.03em;position:relative;z-index:1}
.det-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;line-height:1.7;position:relative;z-index:1}
/* det KPI strip */
.det-kpis{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--gs-bd2);padding-top:13px;margin-top:12px;position:relative;z-index:1}
.dk:not(:first-child){padding-left:14px;border-left:1px solid var(--gs-bd2);margin-left:14px}
.dk-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}
.dk-v{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.dk-u{font-size:9px;color:var(--muted);font-family:'Outfit',sans-serif;margin-left:2px}

/* Projection row */
.proj-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pj{background:var(--gs-bg);border:1.5px solid var(--gs-bd);border-radius:var(--rs);box-shadow:var(--gs-sh);padding:10px 12px}
.pj-l{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}
.pj-v{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.02em}
.pj-s{font-size:8.5px;color:var(--muted);margin-top:1px}

/* Section */

<script>
/* ════════ STATE ════════ */
let data=[],activeLedger=[],openIdx=-1;
const COLORS=['#6366f1','#8b5cf6','#0d9488','#d97706','#e11d48','#0284c7'];
const COLORS_G=['rgba(99,102,241,.44)','rgba(139,92,246,.44)','rgba(13,148,136,.40)','rgba(217,119,6,.40)','rgba(225,29,72,.40)','rgba(2,132,199,.40)'];
const MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
const now=new Date(),curM=MO[now.getMonth()],curY=now.getFullYear();
const BOSS='Piyush Dungarpuria';

/* ════════ HELPERS ════════ */
const n=(v,d=2)=>Number(v||0).toFixed(d);
const pct=(v,t)=>(!t?0:Math.min(100,Math.round(v/t*100)));
function pc(p){return p>=90?'#059669':p>=60?'#d97706':'#e11d48'}
function pb(p){return p>=90?'rgba(5,150,105,.10)':p>=60?'rgba(217,119,6,.10)':'rgba(225,29,72,.09)'}
function probCls(p){return p>=70?'phi':p>=40?'pmd':'plo'}
function short(nm){const p=nm.trim().split(' ');return p.length>1?p[0]+' '+p[p.length-1][0]+'.':nm}
function fJ(j,kw){return(j||[]).find(m=>m.label.toLowerCase().includes(kw.toLowerCase()))||{target:0,actual:0,monthlyRunRate:0,newRunRate:0}}
function unit(l){const s=l.toLowerCase();if(s.includes('sip'))return 'L';if(s.includes('m50')||s.includes('mission'))return '';return 'Cr'}
function mRem(){const m=now.getMonth();return m>=3?3+12-m:3-m}
function projYE(a,rr){return a+rr*mRem()}
function actComp(acts){const v=acts.filter(a=>a.param!==''&&Number(a.target||0)>0);return v.length?Math.round(v.filter(a=>Number(a.gap||0)<=0).length/v.length*100):0}
function rmFlags(rm){
  const f=[];
  const acts=(rm.activity||[]).filter(a=>a.param!==''&&Number(a.target||0)>0);
  if(acts.filter(a=>Number(a.gap||0)>0).length>=3) f.push(`${acts.filter(a=>Number(a.gap||0)>0).length} activity gaps pending`);
  const j=rm.journey||[];
  const nrr=fJ(j,'aum').newRunRate||0,orr=fJ(j,'aum').monthlyRunRate||0;
  if(orr>0&&nrr>orr*1.5) f.push(`AUM run rate at ${Math.round(nrr/orr*100)}% of original`);
  const ap=pct(fJ(j,'aum').actual||rm.aum,fJ(j,'aum').target||rm.aumTarget||0);
  if(ap<40) f.push(`AUM at ${ap}% of annual target`);
  return f;
}

/* ════════ SPLASH ════════ */
setTimeout(()=>document.getElementById('splash').classList.add('gone'),1800);

/* ════════ QTR ════════ */
function buildQtr(){
  const m=now.getMonth();
  let q,qEnd;
  if(m>=3&&m<=5){q='Q1';qEnd=new Date(curY,5,30)}
  else if(m>=6&&m<=8){q='Q2';qEnd=new Date(curY,8,30)}
  else if(m>=9&&m<=11){q='Q3';qEnd=new Date(curY,11,31)}
  else{q='Q4';qEnd=new Date(curY,2,31)}
  const dL=Math.max(0,Math.ceil((qEnd-now)/(1000*60*60*24)));
  const prog=Math.min(100,Math.round((92-dL)/92*100));
  document.getElementById('qtr-chip').textContent=q+'·'+dL+'d';
  const mc=document.getElementById('month-chip');if(mc) mc.textContent=curM+' '+curY;
  document.getElementById('qtr-q').textContent=q;
  document.getElementById('qtr-days').textContent=dL+' days left';
  document.getElementById('qtr-fill').style.width=prog+'%';
}

/* ════════ UNIFORM RM CARD ════════ */
function rmCardHTML(rm,i){
  const col=COLORS[i%COLORS.length],cg=COLORS_G[i%COLORS_G.length];
  const j=rm.journey||[];
  const aj=fJ(j,'aum'),rj=fJ(j,'rev'),nj=fJ(j,'net'),sj=fJ(j,'sip');
  const at=aj.target||rm.aumTarget||0,aa=aj.actual||rm.aum;
  const rt=rj.target||rm.revTarget||0,ra=rj.actual||rm.revenue;
  const nt=nj.target||0,na=nj.actual||rm.netMob;
  const st=sj.target||0,sa=sj.actual||rm.sip;
  const aP=pct(aa,at);
  const isBoss=(rm.name===BOSS);
  return `<div class="rm-card" id="rmc-${i}" data-rmidx="${i}" style="--cc:${col};--cg:${cg}" onclick="openRM(${i})">
    <div class="rc-h">
      <div class="rc-dot" style="background:${col};color:${col}"></div>
      <div class="rc-name">${short(rm.name)}</div>
      ${isBoss?'<div class="rc-lead">Lead</div>':''}
    </div>
    <div class="rc-stats">
      <div class="rc-stat">
        <div class="rs-l">AUM Target</div>
        <div class="rs-v" style="color:${col}">${n(at)}<span class="rs-u">Cr</span></div>
        <div class="rs-a" style="color:${pc(aP)}">Act: ${n(aa)}Cr · ${aP}%</div>
      </div>
      <div class="rc-stat">
        <div class="rs-l">Revenue Target</div>
        <div class="rs-v" style="color:${col}">${n(rt)}<span class="rs-u">Cr</span></div>
        <div class="rs-a" style="color:${pc(pct(ra,rt))}">Act: ${n(ra)}Cr · ${pct(ra,rt)}%</div>
      </div>
      <div class="rc-stat">
        <div class="rs-l">Net Mob Target</div>
        <div class="rs-v" style="color:${col}">${n(nt)}<span class="rs-u">Cr</span></div>
        <div class="rs-a" style="color:${pc(pct(na,nt))}">Act: ${n(na)}Cr · ${pct(na,nt)}%</div>
      </div>
      <div class="rc-stat">
        <div class="rs-l">SIP Target</div>
        <div class="rs-v" style="color:${col}">${n(st)}<span class="rs-u">L</span></div>
        <div class="rs-a" style="color:${pc(pct(sa,st))}">Act: ${n(sa)}L · ${pct(sa,st)}%</div>
      </div>
    </div>

      <div class="rc-pr"><span class="rc-pl">AUM vs Target</span><span class="rc-pp" style="color:${pc(aP)}">${aP}%</span></div>
      <div class="rc-track"><div class="rc-fill" style="width:${aP}%;background:${pc(aP)}"></div></div>
    </div>
    <div class="rc-hint"><span>View detail</span><div class="rc-arr">+</div></div>

}

/* ════════ BUILD COLUMNS ════════ */
function buildColumns(){
  // Split 6 RMs: left=[0,2,4], right=[1,3,5]
  // But place BOSS prominently: find boss index first
  const bIdx=data.findIndex(r=>r.name===BOSS);
  // Ordered list: boss first if present, then others
  const ordered=bIdx>=0?[bIdx,...data.map((_,i)=>i).filter(i=>i!==bIdx)]:data.map((_,i)=>i);
  const left=ordered.slice(0,3);
  const right=ordered.slice(3,6);

  document.getElementById('col-l').innerHTML=left.map(i=>rmCardHTML(data[i],i)).join('');
  document.getElementById('col-r').innerHTML=right.map(i=>rmCardHTML(data[i],i)).join('');
}

/* ════════ TEAM TOTALS ════════ */
function buildTeamTotals(){
  const tot=f=>data.reduce((s,r)=>s+Number(r[f]||0),0);
  const tAUM=data.reduce((s,r)=>s+Number(fJ(r.journey||[],'aum').target||r.aumTarget||0),0);
  const tRev=data.reduce((s,r)=>s+Number(fJ(r.journey||[],'rev').target||r.revTarget||0),0);
  const tNet=data.reduce((s,r)=>s+Number(fJ(r.journey||[],'net').target||0),0);
  const tSip=data.reduce((s,r)=>s+Number(fJ(r.journey||[],'sip').target||0),0);
  const aAUM=tot('aum'),aRev=tot('revenue'),aNet=tot('netMob'),aSip=tot('sip');
  const stats=[
    {l:'Total AUM',     a:aAUM,  t:tAUM,  u:'Cr', c:'var(--indigo)'},
    {l:'Revenue YTD',   a:aRev,  t:tRev,  u:'Cr', c:'var(--violet)'},
    {l:'Net Mobilization',a:aNet,t:tNet,  u:'Cr', c:'var(--teal)'},
    {l:'SIP Book',      a:aSip,  t:tSip,  u:'L',  c:'var(--sky)'},
    {l:'Mission 50',    a:tot('m50'),t:0, u:'',   c:'var(--amber)'},
    {l:'Team Size',     a:data.length,t:0,u:'RMs', c:'var(--violet)'},
  ];
  document.getElementById('team-grid').innerHTML=stats.map(s=>{
    const p=s.t?pct(s.a,s.t):null;
    return `<div class="team-stat">
      <div class="ts-l">${s.l}</div>
      <div class="ts-row">
        <span class="ts-v" style="color:${s.c}">${n(s.a)}${s.u?`<span class="ts-u">${s.u}</span>`:''}</span>
        ${p!==null?`<span class="ts-pct" style="background:${pb(p)};color:${pc(p)}">${p}%</span>`:''}
      </div>
      ${p!==null?`<div class="ts-bar"><div class="ts-fill" style="width:${p}%;background:${pc(p)}"></div></div>`:''}
    </div>`;
  }).join('');

  // Leaderboard
  const sorted=[...data].map((rm,i)=>({rm,i,p:pct(fJ(rm.journey||[],'aum').actual||rm.aum,fJ(rm.journey||[],'aum').target||rm.aumTarget||0)})).sort((a,b)=>b.p-a.p);
  const medals=['g1','g2','g3'];
  document.getElementById('lb-card').innerHTML=`
    <div class="lb-title" style="color:var(--amber)">AUM Leaderboard</div>
    ${sorted.map((it,rank)=>`
      <div class="lb-row" onclick="openRM(${it.i})">
        <span class="lb-rank ${rank<3?medals[rank]:''}">${rank+1}</span>
        <span class="lb-dot" style="background:${COLORS[it.i%COLORS.length]}"></span>
        <span class="lb-nm">${short(it.rm.name)}</span>
        <div class="lb-bw"><div class="lb-bt"><div class="lb-bf" style="width:${it.p}%;background:${pc(it.p)}"></div></div></div>
        <span class="lb-p" style="color:${pc(it.p)}">${it.p}%</span>
      </div>`).join('')}`;

  // Risk flags
  const allFlags=data.flatMap((rm,i)=>rmFlags(rm).map(f=>({rm,i,f})));
  document.getElementById('risk-card').innerHTML=`
    <div class="lb-title" style="color:var(--rose)">Risk Flags</div>
    ${allFlags.length
      ?allFlags.slice(0,5).map(({rm,i,f})=>`<div class="risk-item" onclick="openRM(${i})"><div class="risk-dot"></div><div class="risk-txt"><strong>${short(rm.name)}:</strong> ${f}</div></div>`).join('')
      :`<div class="no-risk"><span style="width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block"></span>All clear — no risk flags</div>`}`;
}

/* ════════ SPARKLINE ════════ */
function buildSparkline(ledger){
  if(!ledger||!ledger.length) return '';
  const byM={};
  ledger.forEach(l=>{if(l.month&&l.month!=='Unspecified') byM[l.month]=(byM[l.month]||0)+Number(l.net||0)});
  const mos=Object.keys(byM);if(mos.length<2) return '';
  const recent=mos.slice(-6),vals=recent.map(m=>byM[m]);
  const maxV=Math.max(...vals.map(Math.abs),1);
  return `<div class="spk">
    <div class="spk-l">Net Mobilization Trend (Cr)</div>
    <div class="spk-w">${vals.map((v,i)=>{const h=Math.round(Math.abs(v)/maxV*22)||2;return`<div class="spk-bar" style="height:${h}px;background:${v>=0?'var(--teal)':'var(--rose)'};opacity:.82"><span class="spk-tip">${recent[i]}: ${n(v)}Cr</span></div>`;}).join('')}</div>
    <div class="spk-mr">${recent.map(m=>`<span class="spk-ml">${m.substring(0,3)}</span>`).join('')}</div>
  </div>`;
}

/* ════════ LEDGER ════════ */
function renderLedger(filter,btn){
  if(btn) btn.closest('.mf').querySelectorAll('.mp').forEach(b=>b.classList.toggle('on',b===btn));
  const rows=filter==='ALL'?activeLedger:activeLedger.filter(l=>l.month===filter);
  const tP=rows.reduce((s,l)=>s+Number(l.purchase||0),0);
  const tR=rows.reduce((s,l)=>s+Number(l.redemption||0),0);
  const tN=rows.reduce((s,l)=>s+Number(l.net||0),0);
  const html=rows.map(l=>{const net=Number(l.net||0);return`<tr><td class="l">${l.client}</td><td class="l2">${l.asset}</td><td class="l2">${l.month}</td><td class="pur">${n(l.purchase)}</td><td class="red">${n(l.redemption)}</td><td class="${net>=0?'pos':'neg'}">${n(net)}</td></tr>`;}).join('')
    +`<tr class="totr"><td class="l" colspan="3">${filter==='ALL'?'Grand Total':filter+' Total'}</td><td class="pur">${n(tP)}</td><td class="red">${n(tR)}</td><td class="${tN>=0?'pos':'neg'}">${n(tN)}</td></tr>`;
  document.querySelectorAll('.led-tbody').forEach(el=>el.innerHTML=html);
}

/* ════════ COLLAPSIBLE ════════ */
function toggleSec(hdr){
  const body=hdr.nextElementSibling,btn=hdr.querySelector('.ch2-b');
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  btn.textContent=open?'+':'×';
  btn.classList.toggle('open',!open);
}

/* ════════ SHARE IMAGE ════════ */
function doShare(){
  if(openIdx<0) return;
  const rm=data[openIdx],col=COLORS[openIdx%COLORS.length];
  const plan=rm.plan||[];
  const curLed=(rm.ledger||[]).filter(l=>l.month===curM);
  const ledP=curLed.reduce((s,l)=>s+Number(l.purchase||0),0);
  const ledR=curLed.reduce((s,l)=>s+Number(l.redemption||0),0);
  const ledN=curLed.reduce((s,l)=>s+Number(l.net||0),0);
  const netMob=Number(rm.netMob||0);
  const W=860,ROW=30;

  // Compute exact canvas height by tracing the same y increments as drawing
  // Header block: name(56) + subtitle(76) + strip(84..106) = ends at y=116
  let yCalc=116;
  yCalc+=22; // plan section label
  yCalc+=24; // plan header row
  yCalc+=Math.max(plan.length,1)*ROW; // plan data rows
  yCalc+=ROW; // plan total row
  yCalc+=20; // gap
  yCalc+=22; // ledger section label
  yCalc+=24; // ledger header row
  yCalc+=Math.max(curLed.length,1)*ROW; // ledger data rows
  yCalc+=ROW; // ledger total row
  yCalc+=10; // small gap before footer
  yCalc+=28; // footer
  const H=yCalc+28; // 28px bottom padding inside card

  const cv=document.getElementById('share-cv');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');

  // BG gradient
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#f0f4ff');bg.addColorStop(.4,'#f5f0ff');bg.addColorStop(.7,'#fff0f9');bg.addColorStop(1,'#fff8f0');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // White card
  ctx.fillStyle='rgba(255,255,255,.92)';rrect(ctx,20,20,W-40,H-40,12);ctx.fill();

  // Accent bar
  const acc=ctx.createLinearGradient(20,0,W-20,0);
  acc.addColorStop(0,col);acc.addColorStop(.5,'#8b5cf6');acc.addColorStop(1,'transparent');
  ctx.fillStyle=acc;rrect(ctx,20,20,W-40,4,3);ctx.fill();

  // RM name + subtitle
  ctx.fillStyle=col;ctx.font='700 20px Outfit,system-ui,sans-serif';ctx.fillText(rm.name,38,56);
  ctx.fillStyle='#8884a8';ctx.font='500 11.5px Outfit,system-ui,sans-serif';
  ctx.fillText(`${curM} ${curY}  ·  Monthly Plan & Net Mob Ledger`,38,76);

  // Net mob strip
  const nmCol=netMob>=0?'#059669':'#e11d48';
  ctx.fillStyle=netMob>=0?'rgba(13,148,136,.10)':'rgba(225,29,72,.09)';
  rrect(ctx,38,84,W-76,22,6);ctx.fill();
  ctx.fillStyle=nmCol;ctx.font='600 11px Outfit,system-ui,sans-serif';ctx.fillText('Net Mobilization MTD:',48,100);
  ctx.font='700 11.5px DM Mono,monospace,sans-serif';ctx.fillText(`₹${n(netMob)} Cr`,208,100);

  // ── PLAN SECTION ──
  let y=116;
  ctx.fillStyle='#1e1b2e';ctx.font='700 11.5px Outfit,system-ui,sans-serif';
  ctx.fillText('Monthly Plan',38,y+13);y+=22;

  const pCols=[{x:38,l:'Client'},{x:232,l:'Asset'},{x:364,l:'Exp Amt'},{x:464,l:'Redemp'},{x:564,l:'Net Plan'},{x:660,l:'Probability'}];
  ctx.fillStyle='rgba(210,215,240,.48)';ctx.fillRect(38,y,W-76,24);
  ctx.fillStyle='#8884a8';ctx.font='700 8.5px Outfit,system-ui,sans-serif';
  pCols.forEach(c=>ctx.fillText(c.l.toUpperCase(),c.x+3,y+16));y+=24;

  plan.forEach((p,ri)=>{
    if(ri%2===1){ctx.fillStyle='rgba(210,215,240,.14)';ctx.fillRect(38,y,W-76,ROW)}
    ctx.fillStyle='#1e1b2e';ctx.font='600 10.5px Outfit,system-ui,sans-serif';
    ctx.fillText(String(p.client||'').substring(0,22),pCols[0].x+3,y+ROW/2+4);
    ctx.fillStyle='#4a4870';ctx.font='400 10px Outfit,system-ui,sans-serif';
    ctx.fillText(String(p.asset||'').substring(0,12),pCols[1].x+3,y+ROW/2+4);
    ctx.font='500 10.5px DM Mono,monospace,sans-serif';
    ctx.fillText(`₹${n(p.expectedAmt||p.amt||0)}Cr`,pCols[2].x+3,y+ROW/2+4);
    ctx.fillText(`₹${n(p.expectedRedemption||0)}Cr`,pCols[3].x+3,y+ROW/2+4);
    ctx.fillText(`₹${n(p.netPlan||0)}Cr`,pCols[4].x+3,y+ROW/2+4);
    const prob=p.prob||0;
    const pC=prob>=70?'#059669':prob>=40?'#d97706':'#e11d48';
    const pBg=prob>=70?'rgba(5,150,105,.12)':prob>=40?'rgba(217,119,6,.12)':'rgba(225,29,72,.10)';
    ctx.fillStyle=pBg;rrect(ctx,pCols[5].x+2,y+ROW/2-9,60,18,4);ctx.fill();
    ctx.fillStyle=pC;ctx.font='700 10.5px DM Mono,monospace,sans-serif';
    ctx.fillText(`${prob}%`,pCols[5].x+9,y+ROW/2+4);
    y+=ROW;
  });

  // Plan total row
  ctx.fillStyle='rgba(210,215,240,.32)';ctx.fillRect(38,y,W-76,ROW);
  ctx.strokeStyle='rgba(210,215,240,.6)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(38,y);ctx.lineTo(W-38,y);ctx.stroke();
  ctx.fillStyle='#1e1b2e';ctx.font='700 10.5px Outfit,system-ui,sans-serif';
  ctx.fillText('Total',pCols[0].x+3,y+ROW/2+4);
  ctx.font='700 10.5px DM Mono,monospace,sans-serif';
  ctx.fillText(`₹${n(rm.planTotalAmt||0)}Cr`,pCols[2].x+3,y+ROW/2+4);
  ctx.fillText(`₹${n(rm.planTotalRedemption||0)}Cr`,pCols[3].x+3,y+ROW/2+4);
  ctx.fillText(`₹${n(rm.planNetTotal||0)}Cr`,pCols[4].x+3,y+ROW/2+4);
  ctx.fillStyle='#8884a8';ctx.font='500 9px Outfit,system-ui,sans-serif';
  ctx.fillText(`Wtd ₹${n(rm.planWeighted||0)}Cr`,pCols[5].x,y+ROW/2+4);
  y+=ROW+20;

  // ── LEDGER SECTION ──
  ctx.fillStyle='#1e1b2e';ctx.font='700 11.5px Outfit,system-ui,sans-serif';
  ctx.fillText(`${curM} Ledger — Net Mobilization`,38,y+13);y+=22;

  const lCols=[{x:38,l:'Client'},{x:232,l:'Asset'},{x:364,l:'Month'},{x:464,l:'Purchase'},{x:564,l:'Redemption'},{x:674,l:'Net Total'}];
  ctx.fillStyle='rgba(210,215,240,.48)';ctx.fillRect(38,y,W-76,24);
  ctx.fillStyle='#8884a8';ctx.font='700 8.5px Outfit,system-ui,sans-serif';
  lCols.forEach(c=>ctx.fillText(c.l.toUpperCase(),c.x+3,y+16));y+=24;

  if(curLed.length===0){
    ctx.fillStyle='#8884a8';ctx.font='400 10.5px Outfit,system-ui,sans-serif';
    ctx.fillText('No ledger entries for '+curM,lCols[0].x+3,y+ROW/2+4);
    y+=ROW;
  } else {
    curLed.forEach((l,ri)=>{
      if(ri%2===1){ctx.fillStyle='rgba(210,215,240,.12)';ctx.fillRect(38,y,W-76,ROW)}
      ctx.fillStyle='#1e1b2e';ctx.font='500 10.5px Outfit,system-ui,sans-serif';
      ctx.fillText(String(l.client||'').substring(0,22),lCols[0].x+3,y+ROW/2+4);
      ctx.fillStyle='#4a4870';ctx.font='400 10px Outfit,system-ui,sans-serif';
      ctx.fillText(String(l.asset||'').substring(0,12),lCols[1].x+3,y+ROW/2+4);
      ctx.fillText(String(l.month||''),lCols[2].x+3,y+ROW/2+4);
      ctx.fillStyle='#059669';ctx.font='500 10.5px DM Mono,monospace,sans-serif';
      ctx.fillText(`${n(l.purchase)}`,lCols[3].x+3,y+ROW/2+4);
      ctx.fillStyle='#e11d48';
      ctx.fillText(`${n(l.redemption)}`,lCols[4].x+3,y+ROW/2+4);
      const nv=Number(l.net||0);
      ctx.fillStyle=nv>=0?'#059669':'#e11d48';ctx.font='700 10.5px DM Mono,monospace,sans-serif';
      ctx.fillText(`${n(nv)}`,lCols[5].x+3,y+ROW/2+4);
      y+=ROW;
    });
  }

  // Ledger total row — now always has room because H is computed correctly
  ctx.fillStyle='rgba(210,215,240,.32)';ctx.fillRect(38,y,W-76,ROW);
  ctx.strokeStyle='rgba(210,215,240,.6)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(38,y);ctx.lineTo(W-38,y);ctx.stroke();
  ctx.fillStyle='#1e1b2e';ctx.font='700 10.5px Outfit,system-ui,sans-serif';
  ctx.fillText(`${curM} Total`,lCols[0].x+3,y+ROW/2+4);
  ctx.fillStyle='#059669';ctx.font='700 10.5px DM Mono,monospace,sans-serif';
  ctx.fillText(`${n(ledP)}`,lCols[3].x+3,y+ROW/2+4);
  ctx.fillStyle='#e11d48';
  ctx.fillText(`${n(ledR)}`,lCols[4].x+3,y+ROW/2+4);
  ctx.fillStyle=ledN>=0?'#059669':'#e11d48';
  ctx.fillText(`${n(ledN)}`,lCols[5].x+3,y+ROW/2+4);
  y+=ROW+10;

  // Footer watermark
  ctx.fillStyle='rgba(136,132,168,.42)';ctx.font='500 9px Outfit,system-ui,sans-serif';
  ctx.fillText('Team Piyush · Private Banking · FY 2026–27',38,y+14);
  ctx.fillText(new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}),W-110,y+14);

  // ── Share via Web Share API (native share sheet) or fallback to download ──
  const fileName=`${rm.name.replace(/ /g,'_')}_${curM}${curY}.jpg`;
  cv.toBlob(async blob=>{
    if(navigator.canShare&&navigator.canShare({files:[new File([blob],fileName,{type:'image/jpeg'})]})){
      try{
        await navigator.share({
          title:`${rm.name} — ${curM} ${curY} Plan`,
          text:`Monthly Plan & Net Mob Ledger for ${rm.name}`,
          files:[new File([blob],fileName,{type:'image/jpeg'})]
        });
        return;
      }catch(e){
        if(e.name==='AbortError') return; // user cancelled — don't fallback to download
      }
    }
    // Fallback: download
    const link=document.createElement('a');
    link.download=fileName;
    link.href=URL.createObjectURL(blob);
    link.click();
    setTimeout(()=>URL.revokeObjectURL(link.href),60000);
  },'image/jpeg',0.94);
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

      <span class="mob-tab-dot" style="background:${COLORS[i%COLORS.length]}"></span>${short(rm.name)}

}
function openMobRM(idx){
  activeLedger=data[idx].ledger||[];
  openIdx=idx;
  document.querySelectorAll('.mob-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('mob-content').innerHTML=buildMobDet(data[idx],idx);
  document.getElementById('mob-scr').scrollTo({top:0,behavior:'smooth'});

      </div>
    </div>

}

/* ════════ LOAD ════════ */
async function load(silent=false){
  try{
    const res=await fetch('data/performance.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    data=Array.isArray(json)?json:(json.rms||[]);
    if(!data.length) throw new Error('Empty');
    buildQtr(); buildColumns(); buildTeamTotals(); buildTabs();
    if(!silent) openMobRM(0);
    const d=data[0]?.lastUpdated?new Date(data[0].lastUpdated):new Date();
    document.getElementById('upd-tag').innerHTML=`<span class="ld"></span>${isNaN(d)?'Live':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){console.error(e)}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')goHome()});
load();
setInterval(()=>load(true),300000);
</script>
</body>
</html>
