<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Piyush | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s ease; cursor: pointer; }
        .glass-card:hover { border-color: #60a5fa; transform: translateY(-4px); }
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); z-index: 50; overflow-y: auto; padding: 2rem 1rem; }
    </style>
</head>
<body class="text-slate-100">
    
    <div class="p-6 md:p-12 max-w-6xl mx-auto">
        <nav class="flex justify-between items-end mb-12 border-b border-slate-800 pb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">TEAM PIYUSH</h1>
                <p id="current-month-display" class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-1"></p>
            </div>
            <div class="text-right"><p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Performance Center</p></div>
        </nav>

        <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <div id="detail-modal" class="modal-bg">
        <div class="max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-500 hover:text-white font-bold text-xl uppercase tracking-tighter">&times; Close</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        let cachedData = [];
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('current-month-display').innerText = `${months[new Date().getMonth()]} FY 2026-27`;

        async function init() {
            const res = await fetch('data/performance.json?t=' + Date.now());
            cachedData = await res.json();
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = cachedData.map((rm, i) => `
                <div class="glass-card p-8 rounded-[2rem]" onclick="openModal(${i})">
                    <h2 class="text-2xl font-extrabold mb-8">${rm.name}</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">AUM</p><p class="text-xl font-bold">${Number(rm.aum).toFixed(2)}<span class="text-xs text-blue-400 ml-1">Cr</span></p></div>
                        <div><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Revenue</p><p class="text-xl font-bold">${Number(rm.revenue).toFixed(2)}<span class="text-xs text-indigo-400 ml-1">L</span></p></div>
                        <div><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Net Mob</p><p class="text-xl font-bold">${Number(rm.netMob).toFixed(2)}<span class="text-xs text-emerald-400 ml-1">Cr</span></p></div>
                        <div><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">M50</p><p class="text-xl font-bold">${rm.m50}</p></div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(index) {
            const rm = cachedData[index];
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 class="text-4xl font-black mb-10 text-blue-400 tracking-tighter">${rm.name}</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div>
                        <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest mb-4">Activity & Audit Tracker</h3>
                        <table class="w-full text-sm">
                            <thead><tr class="text-left border-b border-slate-800 text-slate-600"><th class="pb-2">Parameter</th><th class="pb-2 text-right">Target</th><th class="pb-2 text-right">Actual</th></tr></thead>
                            <tbody class="divide-y divide-slate-800/50">
                                ${rm.activity.map(a => `<tr><td class="py-2">${a.param}</td><td class="text-right">${a.target}</td><td class="text-right text-blue-400 font-bold">${a.actual}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="space-y-12">
                        <div class="bg-slate-800/30 p-6 rounded-2xl border border-slate-800">
                            <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest mb-4">Leverage Status</h3>
                            <div class="flex justify-between items-end">
                                <div><p class="text-xs text-slate-600">Total Done</p><p class="text-2xl font-bold text-white">₹${Number(rm.leverage.total).toLocaleString()} L</p></div>
                                <div class="text-right"><p class="text-xs text-slate-600">AUM Penetration</p><p class="text-2xl font-black text-emerald-400">${(rm.leverage.pct * 100).toFixed(2)}%</p></div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest mb-4">Pipeline for the Month</h3>
                            <div class="space-y-3">
                                ${rm.plan.length ? rm.plan.map(p => `
                                    <div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-xl">
                                        <div><p class="font-bold text-white">${p.client}</p><p class="text-[10px] text-slate-500 uppercase">${p.asset}</p></div>
                                        <div class="text-right"><p class="font-bold text-blue-400">₹${p.amt} L</p><p class="text-[10px] text-slate-500">${p.prob * 100}% Prob.</p></div>
                                    </div>
                                `).join('') : '<p class="text-slate-600 italic text-sm">No items in pipeline.</p>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detail-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
</body>
</html>
